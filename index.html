function renderProgress(){let x=progressSnapshot();let due=dueItems();$('progress').innerHTML=`<div class="hero"><div class="sectionLabel">Progress · stable release</div><h1>Trust conversation progress, not vanity numbers.</h1><p class="muted">This screen separates exposure from true field readiness so you do not walk into a real conversation overconfident.</p><div class="grid2"><button class="btn primary" onclick="startDaily()">Practice Today’s 5</button><button class="btn" onclick="nav('more')">Open Settings</button></div></div>${journeySummaryPanel()}${confidenceDashboardPanel()}${progressivePathMapCard()}${progressionContractPanel()}${confidenceMinimumChecklistCard()}${returnNudgeCard()}${realConversationStatsPanel()}${conversationMemoryStatsPanel()}${livingGreeceStatsPanel()}${a2GrammarGapStatsPanel()}${progressionContractPanel()}${coverageProgressPanel()}${stageForecastPanel()}${onTrackProgressPanel()}${progressTruthPanel()}${levelProgressPanel()}${dialogueReviewProgressPanel()}${verificationPipelinePanel()}${releaseEmptyStatesPanel()}<div class="card"><div class="sectionLabel">Next action</div><h2>${due.length?'Handle Due Now':'No reviews due now'}</h2><p class="muted">${due.length?'You have '+due.length+' due cards. Do these before browsing.':'Nothing is due right now. Today’s 5 will keep your conversation practice moving.'}</p><div class="grid2"><button class="btn primary" onclick="startDaily()">Today’s 5</button><button class="btn" onclick="startDue()">Due Now (${due.length})</button></div></div>`;renderCountdown()}
function reminderSettingsPanel(){return `<div class="settingsGroup"><div class="sectionLabel">Reminder rhythm</div><h3>Gentle nudges</h3><p class="muted">Use reminders only to return to Today’s 5. iPhone PWA notification support depends on iOS/browser settings.</p><div class="nudgeStatus"><span class="dot ${state.settings.remindersEnabled?'ok':'warn'}"></span><span><b>${state.settings.remindersEnabled?'Reminders on':'Reminders off'}</b> · ${reminderSupportText()}</span></div><div class="grid2" style="margin-top:10px"><input id="reminderTime" class="input" type="time" value="${esc(state.settings.reminderTime||'09:00')}"><button class="btn" onclick="saveReminderTime()">Save time</button></div><div class="grid2" style="margin-top:10px">${state.settings.remindersEnabled?'<button class="btn warn" onclick="disableReminders()">Turn reminders off</button>':'<button class="btn primary" onclick="enableReminders()">Enable reminder</button>'}<button class="btn" onclick="installApp()">Install / Add to Home</button></div></div>`}
function depthSettingsPanel(){return `<div class="settingsGroup"><div class="sectionLabel">Practice depth</div><h3>Optional support</h3><label class="toggleRow"><span><b>Hear-your-progress comparison</b><br><span class="muted">Record yourself and compare with native audio.</span></span><input type="checkbox" ${state.settings.recordCompare?'checked':''} onchange="toggleSetting('recordCompare',this.checked)"></label><label class="toggleRow"><span><b>Optional Greek-script track</b><br><span class="muted">Show Greek letters and quick sound hints below cards.</span></span><input type="checkbox" ${state.settings.scriptTrack?'checked':''} onchange="toggleSetting('scriptTrack',this.checked)"></label></div>`}
function tripSettingsPanel(){let d=daysUntilTrip(),g=goalLabel();return `<div class="settingsGroup"><div class="sectionLabel">Milestone</div><h3>${d===null?'Daily rhythm':d>0?d+' days until '+esc(g):d===0?esc(g)+' today':'Daily rhythm'}</h3><p class="muted">A date compresses reviews only while it is in the future. Without a future date, the app uses the full SRS ladder for long-term conversation.</p><div class="grid2"><input class="input" id="settingsGoalLabel" placeholder="next visit, meeting the family, moving…" value="${esc(g)}"><input class="input" id="settingsTripInput" type="date" value="${esc(state.tripDate||'')}"><button class="btn primary" onclick="state.goalLabel=($('settingsGoalLabel').value||'next visit').trim()||'next visit';state.tripDate=$('settingsTripInput').value;state.dailyIds=[];save();renderMore();renderCountdown()">Save milestone</button><button class="btn" onclick="state.tripDate='';state.dailyIds=[];save();renderMore();renderCountdown()">Use daily rhythm</button></div></div>`}

function openSearch(){nav('more');setTimeout(()=>{let input=$('searchInput');if(input){input.focus();input.scrollIntoView({block:'center'});}},80)}
function searchText(it){return [it.english,it.greek,it.casual,it.formal,it.category,it.pron,it.note].filter(Boolean).join(' ').toLowerCase()}
function searchAll(q){let box=$('searchResults');if(!box)return;let term=String(q||'').trim().toLowerCase();if(!term){box.innerHTML='';return}let arr=ITEMS.filter(it=>searchText(it).includes(term)).slice(0,40);box.innerHTML=arr.map(searchResultRow).join('')||'<div class="empty">No matches yet. Try English, Greek, or a category.</div>'}
function searchResultRow(it){let custom=it.kind==='custom'?'<span class="reviewBadge warn">My Phrase · verify</span>':'';return `<div class="itemRow"><div><b>${esc(it.english)}</b> ${custom}<br><span class="phrase smallGreek">${gr(it.greek)}</span><br><span class="muted">${esc(it.category)}${it.pron?' · '+esc(it.pron):''}</span></div><div class="rowActions"><button class="btn small" data-audio-id="${it.id}" aria-label="Play Greek audio for ${esc(it.english)}" onclick="speak('${it.id}')">🔊</button><button class="btn small primary" onclick="practiceItem('${it.id}')">Practice</button></div></div>`}
function practiceItem(id){let it=byId(id);if(!it){toast('Phrase not found.');return}currentMode='recall';startSession([it],'search')}

function todayKey(){return iso(today())}
function ensureConversationCaptureState(){state.checkins=state.checkins&&typeof state.checkins==='object'?state.checkins:{};state.captures=Array.isArray(state.captures)?state.captures:[];state.custom=Array.isArray(state.custom)?state.custom:[];state.itemMeta=state.itemMeta&&typeof state.itemMeta==='object'?state.itemMeta:{};state.captures=state.captures.map(normalizeCapture)}
function conversationStreak(){ensureConversationCaptureState();let n=0,d=today();while(true){let k=iso(d);if(state.checkins[k]?.spoke){n++;d=new Date(d.getTime()-86400000)}else break}return n}
function winsThisWeek(){ensureConversationCaptureState();let total=0,d=today();for(let i=0;i<7;i++){let k=iso(new Date(d.getTime()-i*86400000));total+=Number(state.checkins[k]?.wins||0)}return total}
function markSpokeToday(){ensureConversationCaptureState();let k=todayKey();state.checkins[k]=Object.assign({spoke:false,wins:0},state.checkins[k]||{});state.checkins[k].spoke=true;save();toast('Real conversation logged.');renderHome()}
function addConversationWin(){ensureConversationCaptureState();let k=todayKey();state.checkins[k]=Object.assign({spoke:false,wins:0},state.checkins[k]||{});state.checkins[k].spoke=true;state.checkins[k].wins=Number(state.checkins[k].wins||0)+1;save();toast('Win saved.');renderHome()}
function normalizeCapture(c){c=c&&typeof c==='object'?c:{};let id=c.id||('cap'+Date.now()+Math.floor(Math.random()*1000));let greek=c.greek||c.gr||'';let addedId=c.addedItemId||c.translatedTo||'';let status=c.status||'';if(!status)status=addedId?'added-to-practice':greek?'machine-translated':'needs-greek';return {id,english:c.english||'',greek,created:c.created||Date.now(),status,addedItemId:addedId,addedAt:c.addedAt||c.translatedAt||0,sourceNote:c.sourceNote||''}}
function pendingCaptures(){ensureConversationCaptureState();return state.captures.filter(c=>!c.addedItemId)}
function translatedCaptures(){ensureConversationCaptureState();return (state.captures||[]).filter(c=>String(c.greek||'').trim()&&String(c.english||'').trim())}
function phraseOfDayCapture(){let rows=translatedCaptures();if(!rows.length)return null;let seed=todayKey().split('-').join('');let n=parseInt(seed,10)||0;return rows[n%rows.length]}
function phraseOfDayPanel(){let c=phraseOfDayCapture();if(!c)return `<div class="card"><div class="sectionLabel">Phrase from your life</div><h3>Save a phrase you wished you could say today.</h3><p class="muted">When a captured gap has Greek added, one will appear here as your phrase of the day.</p><button class="btn" onclick="reviewConversationGaps()">Open captured gaps</button></div>`;let status=captureStatusLabel(c);let practice=c.addedItemId?`<button class="btn primary" onclick="practiceItem('${esc(c.addedItemId).replace(/'/g,'&#39;')}')">Practice this</button>`:`<button class="btn primary" onclick="reviewConversationGaps()">Add to Practice</button>`;return `<div class="card"><div class="sectionLabel">Phrase from your life today</div><h3>${esc(c.english||'')}</h3><div class="phrase">${gr(c.greek||'')}</div><p class="muted">${esc(status)} · drawn from your captured conversation gaps.</p><div class="grid2"><button class="btn" onclick="speakGreekText('${esc(c.greek||'').replace(/'/g,'&#39;')}',.82)">🔊 Listen</button>${practice}</div></div>`}
function todayDialogueReviewLine(){let st=dialogueReviewStats();return `<div class="card tight"><div class="row"><span class="muted"><b>Dialogue review:</b> ${st.reviewed} of ${st.total} native-reviewed.</span><button class="btn small" onclick="nav('more');setTimeout(()=>reviewNextUnreviewedDialogue(),50)">Review next</button></div></div>`}

function captureStatusLabel(c){if(c.addedItemId)return 'Added to practice';if(c.status==='tutor-reviewed')return 'Tutor/native reviewed';if(c.status==='machine-translated')return 'Machine-translated — verify';return 'Needs Greek'}
function captureStatusClass(c){if(c.addedItemId||c.status==='tutor-reviewed')return 'ok';if(c.status==='machine-translated')return 'warn';return 'blue'}
function captureWantedPhrase(){ensureConversationCaptureState();let el=$('wantedPhraseInput')||$('quickGapInput'),english=(el?.value||'').trim();if(!english){toast('Write what you wished you could say first.');return}state.captures.unshift({id:'cap'+Date.now(),english,greek:'',created:Date.now(),status:'needs-greek',addedItemId:'',addedAt:0,sourceNote:'real-life conversation gap'});if(el)el.value='';save();toast('Conversation gap saved. Add natural Greek when ready.');renderHome()}
function reviewConversationGaps(){nav('more');setTimeout(()=>{let target=$('conversationGapsPanel');if(target&&target.scrollIntoView)target.scrollIntoView({behavior:'smooth',block:'start'})},80)}
function openTranslateCapture(id){ensureConversationCaptureState();let c=state.captures.find(x=>x.id===id);if(!c)return;window.open('https://translate.google.com/?sl=en&tl=el&text='+encodeURIComponent(c.english||'')+'&op=translate','_blank','noopener')}
function addCustomPhraseFromParts(english,greek,source,sourceStatus){ensureConversationCaptureState();english=String(english||'').trim();greek=String(greek||'').trim();if(!english||!greek)return null;let id='c'+Date.now();let reviewed=sourceStatus==='tutor-reviewed';let note=reviewed?'tutor/native reviewed':'machine-translated — verify';let item=normalizeCustomItem({id,kind:'custom',category:'My Phrases',english,greek,casual:greek,formal:greek,pron:'',note,created:Date.now(),source:source||'capture'},0);state.custom.push(item);state.itemMeta=state.itemMeta||{};state.itemMeta[id]={level:null,verified:reviewed,grammarNote:'',source:reviewed?'tutor-checked':'unreviewed',sourceNote:reviewed?'Added from reviewed conversation gap':'Added from conversation gap; verify before real use'};state.dailyIds=[];buildItems();return item}
function saveCaptureTranslation(id){ensureConversationCaptureState();let c=state.captures.find(x=>x.id===id);if(!c)return;let greek=($('capGreek_'+id)?.value||'').trim();let status=($('capStatus_'+id)?.value||'machine-translated').trim();if(!greek){toast('Paste or type the Greek first.');return}c.greek=greek;c.status=status==='tutor-reviewed'?'tutor-reviewed':'machine-translated';c.sourceNote=status==='tutor-reviewed'?'Reviewed by tutor/native speaker':'Needs verification before real use';save();toast('Greek saved. Add it to practice when ready.');renderMore()}
function addCaptureToPractice(id){ensureConversationCaptureState();let c=state.captures.find(x=>x.id===id);if(!c)return;if(!String(c.greek||'').trim()){toast('Add Greek before turning this into practice.');return}let item=addCustomPhraseFromParts(c.english,c.greek,'conversation-capture',c.status);if(!item){toast('Could not add this to practice.');return}c.addedItemId=item.id;c.addedAt=Date.now();c.status='added-to-practice';save();toast('Added to practice. It will now appear in SRS and quizzes.');renderMore()}
function deleteCapture(id){ensureConversationCaptureState();if(!confirm('Remove this conversation gap?'))return;state.captures=state.captures.filter(x=>x.id!==id);save();toast('Conversation gap removed.');renderMore()}
function captureRow(c){let cls=captureStatusClass(c),label=captureStatusLabel(c),disabled=c.addedItemId?'disabled':'';return `<div class="itemRow captureRow"><div><div class="row"><b>${esc(c.english||'')}</b><span class="reviewBadge ${cls}">${esc(label)}</span></div><span class="muted">Captured ${new Date(c.created||Date.now()).toLocaleDateString()} · real-life gap</span><input id="capGreek_${esc(c.id)}" class="input" value="${esc(c.greek||'')}" placeholder="Add the natural Greek here" style="margin-top:8px"><select id="capStatus_${esc(c.id)}" class="input" style="margin-top:8px"><option value="machine-translated" ${c.status==='machine-translated'?'selected':''}>Machine-translated — verify</option><option value="tutor-reviewed" ${c.status==='tutor-reviewed'?'selected':''}>Tutor/native reviewed</option></select></div><div class="rowActions"><button class="btn small" onclick="openTranslateCapture('${esc(c.id)}')">Open Translate</button><button class="btn small" onclick="saveCaptureTranslation('${esc(c.id)}')">Save Greek</button><button class="btn small primary" onclick="addCaptureToPractice('${esc(c.id)}')" ${disabled}>Add to Practice</button><button class="btn small warn" onclick="deleteCapture('${esc(c.id)}')">Delete</button></div></div>`}
function capturesToTranslatePanel(){ensureConversationCaptureState();let captures=state.captures||[],pending=pendingCaptures();let counts={needs:captures.filter(c=>c.status==='needs-greek').length,verify:captures.filter(c=>c.status==='machine-translated').length,reviewed:captures.filter(c=>c.status==='tutor-reviewed').length,added:captures.filter(c=>c.addedItemId||c.status==='added-to-practice').length};return `<div class="card capturePanel" id="conversationGapsPanel"><div class="sectionLabel">Conversation gaps (${pending.length})</div><h2>Real-life gaps become study cards only after Greek is added.</h2><p class="muted">Write the phrase you wished you could say, add natural Greek later, then choose Add to Practice. Nothing is marked verified unless it is tutor/native reviewed.</p><div class="grid2"><div class="stat"><b>${counts.needs}</b>Needs Greek</div><div class="stat"><b>${counts.verify}</b>Verify Greek</div><div class="stat"><b>${counts.reviewed}</b>Reviewed</div><div class="stat"><b>${counts.added}</b>Added to practice</div></div><div class="list" style="margin-top:12px">${captures.map(captureRow).join('')||'<div class="empty">No conversation gaps yet. Use the Home prompt when real life gives you a phrase you cannot say.</div>'}</div></div>`}
function conversationCaptureCard(){ensureConversationCaptureState();let k=todayKey(),ci=Object.assign({spoke:false,wins:0},state.checkins[k]||{}),st=conversationStreak(),pending=pendingCaptures().length,custom=(state.custom||[]).length;return `<div class="card captureLoop"><div class="sectionLabel">Conversation capture</div><h2>What did you wish you could say today?</h2><p class="muted">Save the English, rough idea, or situation now. Add the natural Greek later, then turn it into practice.</p><textarea id="wantedPhraseInput" class="input" rows="3" placeholder="Example: I needed a quiet moment, but I did not know how to say it."></textarea><div class="grid2" style="margin-top:10px"><button class="btn primary" onclick="captureWantedPhrase()">Save gap</button><button class="btn" onclick="reviewConversationGaps()">Review captured gaps (${pending})</button></div><div class="divider"></div><div class="sectionLabel">Real-life check-in</div><div class="grid2"><button class="btn ${ci.spoke?'primary':''}" onclick="markSpokeToday()">${ci.spoke?'✓ Spoke Greek today':'I spoke Greek today'}</button><button class="btn" onclick="addConversationWin()">+ I said a real win</button></div><div class="streakLine"><span class="streakChip">🗣️ ${st} real-conversation day${st===1?'':'s'} in a row</span><span class="streakChip">✨ ${Number(ci.wins||0)} win${Number(ci.wins||0)===1?'':'s'} today</span><span class="streakChip">📝 ${pending} gap${pending===1?'':'s'} waiting</span><span class="streakChip">📚 ${custom} captured phrase${custom===1?'':'s'}</span></div></div>`}
function realConversationStatsPanel(){ensureConversationCaptureState();let pending=pendingCaptures().length,custom=(state.custom||[]).length,st=conversationStreak(),wins=winsThisWeek();return `<div class="card"><div class="sectionLabel">Real-world conversation</div><h2>${st} spoke-Greek day${st===1?'':'s'} in a row</h2><div class="grid3"><div class="stat"><b>${st}</b>Real streak</div><div class="stat"><b>${wins}</b>Wins this week</div><div class="stat"><b>${pending}</b>Waiting to translate</div></div><p class="muted tight">${custom} captured phrase${custom===1?'':'s'} are now learnable. Captured phrases are machine-translated and stay flagged for verification.</p></div>`}

function phraseBuilderPanel(){state.custom=Array.isArray(state.custom)?state.custom:[];let rows=state.custom.map(customPhraseRow).join('')||'<div class="empty">No custom phrases yet. Capture one sentence you wanted to say to your partner or their family.</div>';return `<div class="card customBuilder"><div class="sectionLabel">My Phrases · Phrase Builder</div><h2>I wanted to say…</h2><p class="muted">Use Google Translate as a helper, then paste the Greek back here. This needs internet and the result is machine-translated — double-check with a Greek speaker before using it in an important conversation.</p><label class="sectionLabel" for="customEnglish">English phrase</label><input id="customEnglish" class="input" placeholder="Example: Can we sit outside?"><div class="grid2" style="margin-top:10px"><button class="btn" onclick="openTranslateForCustom()">Open in Google Translate</button><button class="btn" onclick="clearCustomInputs()">Clear</button></div><label class="sectionLabel" for="customGreek" style="margin-top:12px">Greek result to paste back</label><input id="customGreek" class="input" placeholder="Paste Greek translation here"><button class="btn primary" style="margin-top:10px" onclick="saveCustomPhrase()">Save to My Phrases</button><div class="notice warn"><b>Machine-translated — verify.</b> Custom phrases are learnable and searchable, but they are not native-reviewed.</div><div class="divider"></div><h3>Saved custom phrases</h3><div class="list">${rows}</div></div>`}
function customPhraseRow(it){return `<div class="itemRow customRow"><div><b>${esc(it.english)}</b><br><span class="phrase smallGreek">${gr(it.greek)}</span><br><span class="muted">${esc(it.note||'machine-translated — verify')} · ${masteryLabel(it.id)}</span></div><div class="rowActions"><button class="btn small" data-audio-id="${it.id}" aria-label="Play custom Greek phrase" onclick="speak('${it.id}')">🔊</button><button class="btn small" onclick="practiceItem('${it.id}')">Practice</button><button class="btn small" onclick="editCustomPhrase('${it.id}')">Edit</button><button class="btn small warn" onclick="deleteCustomPhrase('${it.id}')">Delete</button></div></div>`}
function openTranslateForCustom(){let english=($('customEnglish')?.value||'').trim();if(!english){toast('Type the English phrase first.');return}window.open('https://translate.google.com/?sl=en&tl=el&text='+encodeURIComponent(english)+'&op=translate','_blank','noopener')}
function clearCustomInputs(){if($('customEnglish'))$('customEnglish').value='';if($('customGreek'))$('customGreek').value=''}
function saveCustomPhrase(){let english=($('customEnglish')?.value||'').trim(),greek=($('customGreek')?.value||'').trim();if(!english||!greek){toast('Add both English and Greek before saving.');return}let item=addCustomPhraseFromParts(english,greek,'phrase-builder');if(!item){toast('Could not save custom phrase.');return}save();toast('Custom phrase saved.');renderMore();setTimeout(()=>{let input=$('searchInput');if(input){input.value=english;searchAll(english)}},50)}
function editCustomPhrase(id){state.custom=Array.isArray(state.custom)?state.custom:[];let idx=state.custom.findIndex(x=>x.id===id);if(idx<0)return;let old=state.custom[idx];let english=prompt('Edit English phrase:',old.english||'');if(english===null)return;let greek=prompt('Edit Greek phrase:',old.greek||'');if(greek===null)return;english=english.trim();greek=greek.trim();if(!english||!greek){toast('Both English and Greek are required.');return}state.custom[idx]=normalizeCustomItem(Object.assign({},old,{english,greek,casual:greek,formal:greek,note:'machine-translated — verify'}),idx);state.dailyIds=[];buildItems();save();toast('Custom phrase updated.');renderMore()}
function deleteCustomPhrase(id){if(!confirm('Delete this custom phrase? Practice progress for this phrase may remain in backup history.'))return;state.custom=(state.custom||[]).filter(x=>x.id!==id);state.dailyIds=[];buildItems();save();toast('Custom phrase deleted.');renderMore()}

function examVerifiedBadge(x){let ok=x&&x.verified===true;return `<span class="examBadge ${ok?'ok':'warn'}">${ok?'verified':'unverified'}</span>`}
function sourceLabel(x){let src=(x&&x.source)||((x&&x.verified===true)?'tutor-checked':'unreviewed');if((x&&String(x.id||'').includes('practice'))||(x&&String(x.title||'').includes('PRACTICE ONLY')))src='practice-only';return src}
function verificationStats(){let core=ITEMS||[],examKinds=['grammar','reading','listening','writing','speaking','mock'],exam=examKinds.flatMap(k=>examItems(k).map(x=>Object.assign({examKind:k},x)));let all=[...core,...exam],verified=all.filter(x=>x.verified===true).length,official=all.filter(x=>sourceLabel(x)==='official-source').length,tutor=all.filter(x=>sourceLabel(x)==='tutor-checked'||x.verified===true).length,practice=all.filter(x=>sourceLabel(x)==='practice-only').length;return {coreTotal:core.length,coreVerified:core.filter(x=>x.verified===true).length,examTotal:exam.length,examVerified:exam.filter(x=>x.verified===true).length,total:all.length,verified,official,tutor,practice,unreviewed:Math.max(0,all.length-verified-practice)}}
function verificationPipelinePanel(){let v=verificationStats();return `<div class="card"><div class="sectionLabel">Content verification pipeline</div><h2>Better engine, not new fuel yet</h2><p class="muted">Quizzes and mocks make your current material more practiceable. They are not a verified Ellinomatheia readiness score until official or tutor-checked content is loaded.</p><div class="truthGrid"><div class="truthStat"><b>${v.coreVerified}/${v.coreTotal}</b><small>core cards verified</small></div><div class="truthStat"><b>${v.examVerified}/${v.examTotal}</b><small>exam scaffold verified</small></div><div class="truthStat"><b>${v.practice}</b><small>practice-only items</small></div><div class="truthStat"><b>${v.official}</b><small>official-source items</small></div></div><div class="notice warn"><b>Current boundary:</b> verified:true may still be 0. That is okay. It means the engine is ready and the verified fuel still needs to be added from official papers, published books, or a tutor/native reviewer.</div><div class="stepList"><div class="stepItem"><div class="stepIcon">1</div><div><b>Review current cards</b><br><span class="muted">Mark unreviewed, tutor-checked, official-source, or practice-only in Content Review.</span></div></div><div class="stepItem"><div class="stepIcon">2</div><div><b>Load verified exam content</b><br><span class="muted">Only set verified:true when the content came from a trusted source or tutor.</span></div></div><div class="stepItem"><div class="stepIcon">3</div><div><b>Quiz preference</b><br><span class="muted">When verified cards exist, quizzes prefer them before filling with practice-only or unreviewed material.</span></div></div></div></div>`}
function levelProgress(level){let arr=ITEMS.filter(x=>x.level===level);return {level,total:arr.length,ready:arr.filter(x=>fieldReady(x.id)).length}}
function levelProgressPanel(){let a=levelProgress('A1'),b=levelProgress('A2');return `<div class="card"><div class="sectionLabel">A1/A2 exam readiness</div><h2>Field-ready by level</h2><div class="grid2"><div class="stat"><b>A1: ${a.ready} of ${a.total}</b>field-ready</div><div class="stat"><b>A2: ${b.ready} of ${b.total}</b>field-ready</div></div><p class="muted tight">Counts use the existing fieldReady(id) delayed-recall rule. Items without A1/A2 level tags are not counted here.</p></div>`}
function examId(skill,id){return 'exam_'+skill+'_'+id}
function examStaticIsPlaceholder(item){let t=String((item&&item.title)||'');let p=String((item&&item.prompt)||'');let id=String((item&&item.id)||'');return t.startsWith('REPLACE WITH VERIFIED CONTENT')||p.startsWith('REPLACE WITH VERIFIED CONTENT')||id.includes('replace-with-verified')}
function examItems(kind){let base=Array.isArray(DATA[kind])?DATA[kind]:[];let extra=(state&&state.examContent&&Array.isArray(state.examContent[kind]))?state.examContent[kind]:[];if(extra.length){base=base.filter(x=>!examStaticIsPlaceholder(x))}let seen=new Set(),out=[];extra.concat(base).forEach(x=>{let id=x&&x.id;if(!id||seen.has(id))return;seen.add(id);out.push(x)});return out}
function importedExamCount(kind){return (state&&state.examContent&&Array.isArray(state.examContent[kind]))?state.examContent[kind].length:0}
function examImportStats(){ensureExamContentState();let kinds=['grammar','reading','listening','writing','speaking','mock'];let loaded=kinds.reduce((n,k)=>n+state.examContent[k].length,0),verified=kinds.reduce((n,k)=>n+state.examContent[k].filter(x=>x&&x.verified===true).length,0);return {loaded,verified,kinds}}
function examImportPanel(){let st=examImportStats(),tmpl=esc(JSON.stringify(examImportTemplate(),null,2));return `<div class="card examLoader" id="examImportLoader"><div class="sectionLabel">Import verified exam content</div><h2>Paste official exam JSON here.</h2><p class="muted">This is the safe loader for official/tutor-checked A1/A2 content. Paste the JSON object we prepared, then tap Import. The app will save it locally under state.examContent and show it in the skill lists below.</p><div class="grid2"><div class="stat"><b>${st.loaded}</b>imported exam items</div><div class="stat"><b>${st.verified}</b>imported verified items</div></div><div class="notice"><b>Import format:</b> top-level arrays named grammar, reading, listening, writing, speaking, and/or mock. IDs must use g-, r-, l-, w-, s-, or mock- prefixes. Bad JSON is rejected safely.</div><div class="grid2" style="margin-top:10px"><button class="btn" onclick="showExamTemplate()">Show import template</button><button class="btn" onclick="copyExamTemplate()">Copy template</button></div><textarea id="examTemplateBox" class="input csvBox" rows="7" readonly placeholder="Click Show import template.">${tmpl}</textarea><div class="divider"></div><h3>Paste completed verified-content JSON</h3><textarea id="examImportBox" class="input csvBox" rows="10" placeholder="Paste your completed JSON here, for example the verified A1 Reading Task 1 item."></textarea><div class="grid2" style="margin-top:10px"><button class="btn primary" onclick="importExamContentJson()">Import exam content</button><button class="btn warn" onclick="clearImportedExamContent()">Clear imported exam content</button></div><p class="muted small tight">After import, scroll to Four skills → Reading/Listening/Writing/Speaking to open the item. Imported content is included in backup/restore.</p><div id="examImportStatus" class="muted small tight"></div></div>`}
function showExamTemplate(){let box=$('examTemplateBox');if(box)box.value=JSON.stringify(examImportTemplate(),null,2)}
async function copyExamTemplate(){let txt=JSON.stringify(examImportTemplate(),null,2),box=$('examTemplateBox');if(box)box.value=txt;try{await navigator.clipboard.writeText(txt);toast('Exam import template copied.')}catch(e){toast('Template shown. Copy manually.')}}
function cleanExamItem(kind,x){if(!x||typeof x!=='object')throw new Error(kind+' item is not an object.');let id=String(x.id||'').trim();if(!id)throw new Error(kind+' item is missing id.');let prefix={grammar:'g-',reading:'r-',listening:'l-',writing:'w-',speaking:'s-',mock:'mock-'}[kind];if(prefix&&!id.startsWith(prefix))throw new Error(id+' must start with '+prefix);let level=x.level==null?null:String(x.level);if(level&&!['A1','A2','B1','B2'].includes(level))throw new Error(id+' has unsupported level.');let source=x.source?String(x.source):((x.verified===true)?'tutor-checked':'unreviewed'),sourceNote=x.sourceNote?String(x.sourceNote):'';let verified=x.verified===true;if(kind==='grammar')return {id,level,title:String(x.title||''),explanation:String(x.explanation||''),examples:Array.isArray(x.examples)?x.examples.map(e=>({gr:String(e?.gr||''),en:String(e?.en||''),note:String(e?.note||'')})):[],verified,source,sourceNote};if(kind==='reading')return {id,level,title:String(x.title||''),passage:String(x.passage||''),questions:Array.isArray(x.questions)?x.questions.map(q=>({q:String(q?.q||''),options:Array.isArray(q?.options)?q.options.map(o=>String(o)):[],answer:Number.isFinite(Number(q?.answer))?Number(q.answer):0})):[],verified,source,sourceNote};if(kind==='listening')return {id,level,title:String(x.title||''),audioText:String(x.audioText||''),audioUrl:String(x.audioUrl||''),questions:Array.isArray(x.questions)?x.questions.map(q=>({q:String(q?.q||''),options:Array.isArray(q?.options)?q.options.map(o=>String(o)):[],answer:Number.isFinite(Number(q?.answer))?Number(q.answer):0})):[],verified,source,sourceNote};if(kind==='writing')return {id,level,prompt:String(x.prompt||''),modelAnswer:String(x.modelAnswer||''),checklist:Array.isArray(x.checklist)?x.checklist.map(c=>String(c)):[],verified,source,sourceNote};if(kind==='speaking')return {id,level,prompt:String(x.prompt||''),modelAnswer:String(x.modelAnswer||''),verified,source,sourceNote};if(kind==='mock')return {id,level,title:String(x.title||''),timeMinutes:Number.isFinite(Number(x.timeMinutes))?Number(x.timeMinutes):0,sections:Array.isArray(x.sections)?x.sections.map(sec=>({skill:String(sec?.skill||''),items:Array.isArray(sec?.items)?sec.items.map(i=>String(i)):[]})):[],verified,source,sourceNote};throw new Error('Unsupported exam kind '+kind)}
function parseExamImport(raw){let obj=JSON.parse(raw),kinds=['grammar','reading','listening','writing','speaking','mock'],out={grammar:[],reading:[],listening:[],writing:[],speaking:[],mock:[]},seen=new Set();ensureExamContentState();let staticIds=new Set(kinds.flatMap(k=>(Array.isArray(DATA[k])?DATA[k]:[]).map(x=>x.id)));kinds.forEach(k=>{(Array.isArray(obj[k])?obj[k]:[]).forEach(x=>{let item=cleanExamItem(k,x);if(staticIds.has(item.id))throw new Error(item.id+' already exists in static DATA. Use a new unique id.');if(seen.has(item.id))throw new Error('Duplicate id in import: '+item.id);seen.add(item.id);out[k].push(item)})});return out}
function importExamContentJson(){try{let raw=($('examImportBox')?.value||'').trim();if(!raw){toast('Paste completed exam JSON first.');return}let incoming=parseExamImport(raw);let total=Object.keys(incoming).reduce((n,k)=>n+incoming[k].length,0);if(!total)throw new Error('No importable arrays found. Use reading, listening, writing, speaking, grammar, or mock.');ensureExamContentState();let existing=new Set(Object.keys(state.examContent).flatMap(k=>state.examContent[k].map(x=>x.id)));let summary=[];Object.keys(incoming).forEach(k=>{incoming[k].forEach(item=>{if(existing.has(item.id)){state.examContent[k]=state.examContent[k].filter(x=>x.id!==item.id)}state.examContent[k].push(item);existing.add(item.id)});if(incoming[k].length)summary.push(k+': '+incoming[k].length)});save();state.lastExamImport=new Date().toISOString();toast('Exam content imported: '+summary.join(' · '));alert('Imported exam content:\n'+summary.join('\n')+'\n\nNow open Four skills below and choose the skill list.');renderExamPrep()}catch(e){alert('Import failed: '+(e.message||'invalid JSON'))}}
function clearImportedExamContent(){if(!confirm('Clear locally imported exam content? Static placeholders and practice bank remain.'))return;state.examContent={grammar:[],reading:[],listening:[],writing:[],speaking:[],mock:[]};save();toast('Imported exam content cleared.');renderExamPrep()}
function renderExamPrep(){if(!$('practice').classList.contains('active'))nav('practice');$('practiceArea').innerHTML=`<div class="hero"><div class="sectionLabel">Ellinomatheia A1/A2 · import loader</div><h1>Import verified official exam items.</h1><p class="muted">Paste the cleaned JSON here, then open the skill list below. This is separate from Today’s guided session and does not invent Greek.</p></div>${examImportPanel()}<div class="card livingGreeceCard"><div class="sectionLabel">Living in Greece</div><h2>Daily-life scene library</h2><p class="muted">Practice home, family, supermarket, bakery, pharmacy, taxi, neighbors, doctor, beach, and repair phrases.</p><button class="btn primary" onclick="renderLivingGreeceLibrary()">Open Living in Greece Mode</button></div>${skillHubPanel()}${mockExamPanel()}${grammarPanel()}${levelProgressPanel()}${verificationPipelinePanel()}`}
function grammarPanel(){let units=examItems('grammar');let groups=['A1','A2',null].map(l=>{let arr=units.filter(u=>(u.level||null)===l);if(!arr.length)return '';return `<h3>${esc(l||'No level')}</h3><div class="list">${arr.map(grammarUnitCard).join('')}</div>`}).join('');return `<div class="card"><div class="sectionLabel">Grammar reference</div><h2>Rules and “why” notes</h2><p class="muted">Add verified grammar explanations here. Vocabulary cards can also carry a small grammar note from Content Review.</p>${groups||'<div class="empty">No grammar units yet.</div>'}</div>`}
function grammarUnitCard(u){return `<details class="examPanel"><summary><b>${esc(u.title||'Untitled grammar unit')}</b> ${examVerifiedBadge(u)} <span class="examBadge">${esc(u.level||'No level')}</span></summary><p class="muted">${esc(u.explanation||'')}</p><div class="list">${(u.examples||[]).map(ex=>`<div class="examQuestion"><div class="phrase smallGreek">${gr(ex.gr||'')}</div><div>${esc(ex.en||'')}</div><p class="muted tight">${esc(ex.note||'')}</p></div>`).join('')}</div></details>`}
function skillHubPanel(){return `<div class="card"><div class="sectionLabel">Four skills</div><h2>Practice by exam skill</h2><div class="grid2"><button class="btn" onclick="renderSkillList('reading')">Reading</button><button class="btn" onclick="renderSkillList('listening')">Listening</button><button class="btn" onclick="renderSkillList('writing')">Writing</button><button class="btn" onclick="renderSkillList('speaking')">Speaking</button></div><div id="skillArea"></div></div>`}
function renderSkillList(skill){let area=$('skillArea');if(!area)return;let imported=importedExamCount(skill),items=examItems(skill);let rows=items.map(x=>{let isImported=!!(state&&state.examContent&&Array.isArray(state.examContent[skill])&&state.examContent[skill].some(y=>y&&y.id===x.id));let sourceLine=[x.level||'No level',skill,isImported?'imported official item':(x.source||'practice bank')].filter(Boolean).join(' · ');return `<div class="itemRow ${isImported?'officialImported':''}"><div><b>${esc(x.title||x.prompt||x.id)}</b> ${examVerifiedBadge(x)}${isImported?'<span class="rcBadge">imported</span>':''}<br><span class="muted">${esc(sourceLine)}</span></div><div class="rowActions"><button class="btn small primary" onclick="startSkillItem('${skill}','${esc(x.id).replace(/'/g,'&#39;')}')">Start</button></div></div>`}).join('')||'<div class="empty">No items yet.</div>';let note=imported?`<p class="notice"><b>${imported}</b> imported ${esc(skill)} item${imported===1?'':'s'} shown first. Placeholder verified-content cards are hidden while imported content exists.</p>`:'';area.innerHTML=`<div class="divider"></div><h3>${esc(skill[0].toUpperCase()+skill.slice(1))}</h3>${note}<div class="list">${rows}</div>`}
function startSkillItem(skill,id){let item=examItems(skill).find(x=>x.id===id);if(!item)return;let area=$('skillArea')||$('practiceArea');if(skill==='reading')area.innerHTML=readingCard(item);if(skill==='listening')area.innerHTML=listeningCard(item);if(skill==='writing')area.innerHTML=writingCard(item);if(skill==='speaking')area.innerHTML=speakingCard(item)}
function mcqBlock(skill,item){return (item.questions||[]).map((q,qi)=>`<div class="examQuestion"><b>${esc(q.q||'Question')}</b>${(q.options||[]).map((op,oi)=>`<label class="examOption"><input type="radio" name="${skill}_${item.id}_${qi}" value="${oi}"><span>${esc(op)}</span></label>`).join('')}</div>`).join('')}
function gradeMcq(skill,id){let item=examItems(skill).find(x=>x.id===id);if(!item)return;let qs=item.questions||[],right=0;qs.forEach((q,qi)=>{let chosen=document.querySelector(`input[name="${skill}_${id}_${qi}"]:checked`);if(chosen&&Number(chosen.value)===Number(q.answer))right++});let ok=right===qs.length&&qs.length>0;nextDueDate(examId(skill,id),ok,ok?5:1);state.examAnswers[examId(skill,id)]={skill,id,right,total:qs.length,updated:Date.now()};save();toast(`${right}/${qs.length} correct. ${ok?'Moved forward.':'Will resurface.'}`);renderSkillResult(skill,item,right,qs.length,ok)}
function renderSkillResult(skill,item,right,total,ok){let area=$('skillArea')||$('practiceArea');area.innerHTML=`<div class="card"><div class="sectionLabel">${esc(skill)} result</div><h2>${right}/${total} correct</h2><p class="muted">${ok?'This item moved forward in the same SRS.':'This item was missed and will resurface via the same SRS.'}</p><button class="btn primary" onclick="renderExamPrep()">Back to Exam prep</button></div>`}
function readingCard(item){return `<div class="card"><div class="sectionLabel">Reading · ${esc(item.level||'No level')}</div><h2>${esc(item.title||item.id)} ${examVerifiedBadge(item)}</h2><p class="muted">${esc(item.passage||'')}</p>${mcqBlock('reading',item)}<button class="btn primary" onclick="gradeMcq('reading','${esc(item.id).replace(/'/g,'&#39;')}')">Grade reading</button></div>`}
function listeningCard(item){let sid=esc(item.id).replace(/'/g,'&#39;');let audio=item.audioUrl?`<audio controls src="${esc(item.audioUrl)}" id="listenAudio_${sid}" onerror="handleAudioLoadError('${sid}')"></audio><div class="notice warn" id="listenAudioFallback_${sid}" style="display:none"><b>Audio link unavailable.</b> The linked recording could not be loaded — using TTS fallback instead.</div><button class="btn" id="listenTtsBtn_${sid}" style="display:none" onclick="speakExamListening('${sid}')">🔊 Play TTS fallback</button>`:`<div class="notice warn"><b>Synthetic audio.</b> No verified recording attached yet. TTS fallback reads the supplied script.</div><button class="btn" onclick="speakExamListening('${sid}')">🔊 Play TTS fallback</button>`;return `<div class="card"><div class="sectionLabel">Listening · ${esc(item.level||'No level')}</div><h2>${esc(item.title||item.id)} ${examVerifiedBadge(item)}</h2>${audio}${mcqBlock('listening',item)}<button class="btn primary" onclick="gradeMcq('listening','${sid}')">Grade listening</button></div>`}
function handleAudioLoadError(id){let a=$('listenAudio_'+id);if(a)a.style.display='none';let f=$('listenAudioFallback_'+id);if(f)f.style.display='block';let b=$('listenTtsBtn_'+id);if(b)b.style.display='inline-block'}
function speakExamListening(id){let item=examItems('listening').find(x=>x.id===id);if(!item)return;let tmp={id:examId('listening',id),greek:item.audioText||''};let old=ITEMS;ITEMS=[...ITEMS,tmp];speakWithFeedback(tmp.id,.82);ITEMS=old}
function writingCard(item){let ans=(state.examAnswers[examId('writing',item.id)]||{}).answer||'';return `<div class="card"><div class="sectionLabel">Writing · ${esc(item.level||'No level')}</div><h2>${esc(item.prompt||item.id)} ${examVerifiedBadge(item)}</h2><textarea id="write_${item.id}" class="input examTextarea" placeholder="Type your answer here. Prose is not auto-graded.">${esc(ans)}</textarea><button class="btn primary" onclick="revealWriting('${esc(item.id).replace(/'/g,'&#39;')}')">Reveal model + self-check</button><div id="writeResult"></div></div>`}
function revealWriting(id){let item=examItems('writing').find(x=>x.id===id);if(!item)return;let answer=$('write_'+id)?.value||'';state.examAnswers[examId('writing',id)]={answer,updated:Date.now()};save();$('writeResult').innerHTML=`<div class="notice"><b>Model answer:</b><br>${esc(item.modelAnswer||'')}</div><div class="selfCheck">${(item.checklist||[]).map(c=>`<label><input type="checkbox">${esc(c)}</label>`).join('')}</div><p class="muted">Self-comparison only. Have a tutor mark a few written answers.</p><div class="grid3"><button class="btn good" onclick="selfGradeExam('writing','${esc(id).replace(/'/g,'&#39;')}',true,5)">Correct</button><button class="btn" onclick="selfGradeExam('writing','${esc(id).replace(/'/g,'&#39;')}',true,3)">Partly</button><button class="btn warn" onclick="selfGradeExam('writing','${esc(id).replace(/'/g,'&#39;')}',false,1)">Again</button></div>`}
function speakingCard(item){return `<div class="card"><div class="sectionLabel">Speaking · ${esc(item.level||'No level')}</div><h2>${esc(item.prompt||item.id)} ${examVerifiedBadge(item)}</h2><p class="muted">Use the existing speak/record-compare habit. Self-score against the model or a tutor note.</p><div class="notice"><b>Model / tutor note:</b><br>${esc(item.modelAnswer||'')}</div>${recordComparePanel({id:examId('speaking',item.id),greek:item.prompt||''})}<div class="grid3"><button class="btn good" onclick="selfGradeExam('speaking','${esc(item.id).replace(/'/g,'&#39;')}',true,5)">Correct</button><button class="btn" onclick="selfGradeExam('speaking','${esc(item.id).replace(/'/g,'&#39;')}',true,3)">Partly</button><button class="btn warn" onclick="selfGradeExam('speaking','${esc(item.id).replace(/'/g,'&#39;')}',false,1)">Again</button></div></div>`}
function selfGradeExam(skill,id,ok,quality){nextDueDate(examId(skill,id),ok,quality);state.examAnswers[examId(skill,id)]=Object.assign(state.examAnswers[examId(skill,id)]||{},{skill,id,self:quality,ok,updated:Date.now()});save();toast(ok?'Saved to SRS.':'Marked again; will resurface.');renderExamPrep()}
function mockExamPanel(){let rows=examItems('mock').map(m=>`<div class="itemRow"><div><b>${esc(m.title||m.id)}</b> ${examVerifiedBadge(m)}<br><span class="muted">${esc(m.level||'No level')} · ${Number(m.timeMinutes||0)} minutes · ${(m.sections||[]).length} sections</span></div><div class="rowActions"><button class="btn small primary" onclick="startMock('${esc(m.id).replace(/'/g,'&#39;')}')">Start mock</button></div></div>`).join('')||'<div class="empty">No mock exams yet.</div>';return `<div class="card"><div class="sectionLabel">Mock exams</div><h2>Timed four-skill run</h2><p class="muted">Practice mocks can run Speaking → Listening → Reading → Writing. Objective sections auto-score; productive sections self-score.</p><div class="list">${rows}</div><div id="mockArea"></div></div>`}
function startMock(id){let m=examItems('mock').find(x=>x.id===id);if(!m)return;window.mockSession={mock:m,sectionIndex:0,started:Date.now(),scores:[]};renderMockStep()}

function normalizeXlateText(t){return String(t||'').replace(/\s+/g,' ').replace(/[“”]/g,'"').replace(/[‘’]/g,"'").trim().replace(/^[\s"'«»“”‘’]+|[\s"'«»“”‘’]+$/g,'')}
function xlateKey(t){return normalizeXlateText(t).toLocaleLowerCase('el-GR').replace(/[.!;:;,?¿¡·…]+$/g,'').trim()}
function containsGreek(t){return /[\u0370-\u03ff\u1f00-\u1fff]/.test(String(t||''))}
function addTranslationPair(list,english,greek,meta){english=normalizeXlateText(english);greek=normalizeXlateText(greek);if(!english||!greek)return;list.push(Object.assign({english,greek,itemId:'',source:'app content',verified:false},meta||{}))}

  try{(PARTNER_MISSIONS||[]).forEach(m=>{addTranslationPair(list,'Their line',m.their,{source:'partner mission',verified:false});addTranslationPair(list,'Your answer',m.you,{source:'partner mission',verified:false});addTranslationPair(list,'Follow-up',m.follow,{source:'partner mission',verified:false})})}catch(e){}

  try{(LIVING_GREECE_SCENES||[]).forEach(m=>{addTranslationPair(list,'Other person says',m.partnerLine,{source:'living in Greece',verified:false});addTranslationPair(list,'You answer',m.youLine,{source:'living in Greece',verified:false});addTranslationPair(list,'Follow-up',m.follow,{source:'living in Greece',verified:false});addTranslationPair(list,'Repair phrase',m.repair,{source:'living in Greece',verified:false})})}catch(e){}
  try{(ITEMS||[]).forEach(it=>{if(!it)return;addTranslationPair(list,it.english,it.greek,{itemId:it.id,source:it.source||it.kind||'card',verified:it.verified===true});if(it.casual&&it.casual!==it.greek)addTranslationPair(list,it.english,it.casual,{itemId:it.id,source:'casual card line',verified:it.verified===true});if(it.formal&&it.formal!==it.greek)addTranslationPair(list,it.english,it.formal,{itemId:it.id,source:'formal card line',verified:it.verified===true})})}catch(e){}

function translationPairs(){return collectTranslationPairs()}
function findTranslationMatch(raw){let q=normalizeXlateText(raw);if(!q||q.length<2)return null;let key=xlateKey(q),isGreek=containsGreek(q),pairs=translationPairs();
  let exact=pairs.find(p=>xlateKey(isGreek?p.greek:p.english)===key);if(exact)return Object.assign({direction:isGreek?'el-en':'en-el',query:q,exact:true},exact);
  let contained=pairs.filter(p=>{let side=xlateKey(isGreek?p.greek:p.english);return side.includes(key)||key.includes(side)}).sort((a,b)=>Math.abs(xlateKey(isGreek?a.greek:a.english).length-key.length)-Math.abs(xlateKey(isGreek?b.greek:b.english).length-key.length))[0];
  if(contained)return Object.assign({direction:isGreek?'el-en':'en-el',query:q,exact:false},contained);

/* === V14.0.5 Unknown Words + Post-answer Review Queue ===
   Keeps English hidden before answering, then turns the post-answer reveal into a review queue. */
function v1404DEnsureUnknownWords(){
  state.unknownWords=Array.isArray(state.unknownWords)?state.unknownWords:[];
  state.unknownWordEvents=Array.isArray(state.unknownWordEvents)?state.unknownWordEvents:[];
  return state.unknownWords;
}
function v1404DWordKey(greek,english){return xlateKey(String(greek||'')+'|'+String(english||''));}
function v1404DReasonLabel(reason){return reason==='context'?'understood by context':reason==='guess'?'guessed':reason==='review'?'requested review':reason==='manual'?'marked unknown':'needs review';}
function v1404DActiveUnknownWords(){v1404DEnsureUnknownWords();return state.unknownWords.filter(w=>w&&w.status!=='known');}
function v1404DAddUnknownWord(greek,english,sourceId,reason){
  greek=normalizeXlateText(greek);english=normalizeXlateText(english);if(!greek&&!english)return false;
  v1404DEnsureUnknownWords();let key=v1404DWordKey(greek,english);let row=state.unknownWords.find(w=>w.key===key);
  if(row){row.count=Number(row.count||1)+1;row.last=Date.now();row.status='active';row.reason=reason||row.reason||'review';row.sourceId=sourceId||row.sourceId||'';}
  else{state.unknownWords.unshift({key,greek,english,sourceId:sourceId||'',reason:reason||'review',status:'active',count:1,created:Date.now(),last:Date.now(),version:APP_VERSION});}
  state.unknownWords=state.unknownWords.slice(0,300);
  state.unknownWordEvents.unshift({key,greek,english,sourceId:sourceId||'',reason:reason||'review',ts:Date.now(),date:iso(today()),version:APP_VERSION});
  state.unknownWordEvents=state.unknownWordEvents.slice(0,500);
  return true;
}
function v1404DListeningGlossary(id){let item=(examItems('listening')||[]).find(x=>x.id===id);let reveal=v1404CListeningRevealData(item);return (reveal&&Array.isArray(reveal.glossary))?reveal.glossary:[];}
function v1404DQueueListeningGlossary(id,reason){let rows=v1404DListeningGlossary(id),n=0;rows.forEach(g=>{if(v1404DAddUnknownWord(g[0],g[1],id,reason))n++});save();return n;}
function v1404DAddListeningGlossaryWord(id,idx){let rows=v1404DListeningGlossary(id),g=rows[Number(idx)];if(!g){toast('Word not found.');return}v1404DAddUnknownWord(g[0],g[1],id,'manual');save();toast('Added to Unknown Words: '+g[0]);}
function v1404DMarkKnown(key){v1404DEnsureUnknownWords();let row=state.unknownWords.find(w=>w.key===key);if(row){row.status='known';row.knownAt=Date.now();save();toast('Marked known.');renderProgress();}}
function v1404DForgetWord(key){v1404DEnsureUnknownWords();state.unknownWords=state.unknownWords.filter(w=>w.key!==key);save();toast('Removed from Unknown Words.');renderProgress();}
function v1404DUnknownStats(){let all=(state.unknownWords||[]),active=v1404DActiveUnknownWords(),context=active.filter(w=>w.reason==='context').length,guess=active.filter(w=>w.reason==='guess').length,manual=active.filter(w=>w.reason==='manual'||w.reason==='review').length;return {all:all.length,active:active.length,context,guess,manual,known:all.filter(w=>w.status==='known').length};}
function v1404DUnknownWordsPanel(){
  v1404DEnsureUnknownWords();let st=v1404DUnknownStats(),rows=v1404DActiveUnknownWords().slice(0,12);
  let list=rows.length?rows.map(w=>`<div class="unknownWordRow"><div><b>${gr(w.greek||'')}</b><small>${esc(w.english||'')} · ${esc(v1404DReasonLabel(w.reason))} · seen ${Number(w.count||1)} time${Number(w.count||1)===1?'':'s'}</small></div><div class="rowActions"><button class="btn miniBtn" onclick="speakGreekText(${attrJs(w.greek||'')},.82)">🔊 Hear</button><button class="btn miniBtn good" onclick="v1404DMarkKnown(${attrJs(w.key)})">Known</button><button class="btn miniBtn" onclick="v1404DForgetWord(${attrJs(w.key)})">Remove</button></div></div>`).join(''):`<div class="notice good"><b>No unknown words waiting.</b><br>After a graded listening step, choose “I used context,” “I guessed,” or tap a word to add it here.</div>`;

  };
  function v1405CleanGreek(s){return normalizeXlateText(s).replace(/[·!?;:,.]+$/g,'').trim()}
  window.v1405MeaningForGreek=function(value,q){let raw=normalizeXlateText(value),clean=v1405CleanGreek(raw);if(V1405_KNOWN_MEANINGS[raw])return V1405_KNOWN_MEANINGS[raw];if(V1405_KNOWN_MEANINGS[clean])return V1405_KNOWN_MEANINGS[clean];let it=null;if(q&&q.itemId)it=byId(q.itemId);if(it&&[v1405CleanGreek(v14GreekOf(it)),v1405CleanGreek(v14GreekOf(it).replace(/^(ο|η|το|οι|τα)\s+/i,''))].includes(clean))return it.english||'';it=(ITEMS||[]).find(x=>{let g=v1405CleanGreek(v14GreekOf(x)),bare=g.replace(/^(ο|η|το|οι|τα)\s+/i,'');return g===clean||bare===clean});return it&&it.english?it.english:''};
  window.v1405QuestionGreek=function(q){if(q.itemId){let it=byId(q.itemId);if(it&&v14GreekOf(it))return v14GreekOf(it)}if(q.mode==='article')return `${q.answer} ${String(q.prompt||'').replace('___','').trim()}`.trim();if(q.mode==='sound')return q.prompt||'';if(q.mode==='meaning'&&/[\u0370-\u03ff\u1f00-\u1fff]/i.test(String(q.answer||'')))return q.answer;return q.answer||q.prompt||''};
  window.v1405QuestionEnglish=function(q){if(q.itemId){let it=byId(q.itemId);if(it&&it.english)return it.english}let ex=String(q.explain||''),eq=ex.indexOf('=');if(eq>=0&&ex.slice(eq+1).trim())return ex.slice(eq+1).trim();let g=v1405QuestionGreek(q),m=v1405MeaningForGreek(g,q);if(m)return m;if(q.mode==='meaning'&&q.prompt&&!/^Which |^Choose |^Answer /i.test(q.prompt))return q.prompt;return q.mode==='sound'?'Pronunciation practice for this Greek model.':'Meaning shown after grading.'};
  window.v1405ChoiceTranslationHtml=function(q){return (q.options||[]).map(op=>{let meaning=v1405MeaningForGreek(op,q)||((op===q.answer)?'correct answer':'alternative answer');return `<div class="choiceTranslation"><b>${/[\u0370-\u03ff\u1f00-\u1fff]/i.test(String(op))?gr(op):esc(op)}</b> — ${esc(meaning)}</div>`}).join('')||'<div class="muted">No multiple-choice translations for this item.</div>'};
  window.v1405WorksheetGlossary=function(w){let out=[],seen=new Set();function add(g,e,source){g=normalizeXlateText(g);e=normalizeXlateText(e);if(!g||!/[\u0370-\u03ff\u1f00-\u1fff]/i.test(g))return;let key=v1404DWordKey(g,e);if(seen.has(key))return;seen.add(key);out.push({greek:g,english:e||'Review this Greek form',sourceId:source||w.conceptId})} (w.questions||[]).forEach(q=>{let g=v1405QuestionGreek(q),e=v1405QuestionEnglish(q);add(g,e,q.itemId||w.conceptId);let tokens=(String(g).match(/[\u0370-\u03ff\u1f00-\u1fff]+/gi)||[]);tokens.forEach(t=>{let m=v1405MeaningForGreek(t,q);if(m)add(t,m,q.itemId||w.conceptId)})});return out.slice(0,40)};
  window.v1405AddWorksheetGlossaryWord=function(i){let g=(window.v1405LastWorksheetGlossary||[])[Number(i)];if(!g)return;v1404DAddUnknownWord(g.greek,g.english,g.sourceId,'manual');save();toast('Added to Review: '+g.greek)};
  window.v1405AddAllWorksheetGlossary=function(){let rows=window.v1405LastWorksheetGlossary||[],added=0;rows.forEach(g=>{if(v1404DAddUnknownWord(g.greek,g.english,g.sourceId,'review'))added++});save();toast((added||rows.length)+' glossary item'+((added||rows.length)===1?'':'s')+' added to Review.')};
  window.v1405WorksheetReviewItem=function(q,given,i){let ok=given===q.answer,g=v1405QuestionGreek(q),e=v1405QuestionEnglish(q),open=!ok||i===0?' open':'';return `<details class="worksheetReviewItem"${open}><summary><span class="resultBadge ${ok?'ok':'bad'}">${ok?'Correct':'Wrong'}</span> Question ${i+1}</summary><div class="worksheetReviewBody"><div class="revealBlock"><div class="sectionLabel">Greek transcript or sentence</div><div class="revealGreek">${gr(g)}</div></div><div class="revealBlock"><div class="sectionLabel">English meaning</div><div>${esc(e)}</div></div><div class="revealBlock"><div class="sectionLabel">Your answer</div><div>${given===undefined?'<span class="muted">No answer</span>':(/[\u0370-\u03ff\u1f00-\u1fff]/i.test(String(given))?gr(given):esc(given))}</div>${!ok?`<div class="muted" style="margin-top:5px">Correct answer: ${/[\u0370-\u03ff\u1f00-\u1fff]/i.test(String(q.answer))?gr(q.answer):esc(q.answer)}</div>`:''}</div><div class="revealBlock"><div class="sectionLabel">Answer-choice translations</div><div class="choiceTranslationList">${v1405ChoiceTranslationHtml(q)}</div></div></div></details>`};

  window.renderV14Worksheet=function(){let w=window.v14Worksheet;if(!w||!w.questions)return renderPractice();let c=v1405FindConcept(w.conceptId)||v14CurrentConcept(),q=v14WorksheetCurrent();if(!q)return v14FinishWorksheet();let n=w.index+1,total=w.questions.length,hasAnswer=Object.prototype.hasOwnProperty.call(w.answers,w.index),answered=w.answers[w.index];let opts=(q.options||[]).map(op=>{let cls=hasAnswer?(op===q.answer?' correct':op===answered&&op!==q.answer?' wrong':''):'';let label=q.mode==='meaning'||q.mode==='sound'?gr(op):esc(op);return `<button class="worksheetChoice${cls}" ${hasAnswer?'disabled':''} onclick="v14AnswerWorksheet(${attrJs(op)})">${label}</button>`}).join('');let feedback=hasAnswer?`<div class="${answered===q.answer?'notice':'correctionBox'}"><b>${answered===q.answer?'Correct.':'Correction required.'}</b><br>${esc(q.explain||'Review the correct answer, then continue.')}<div class="muted" style="margin-top:6px">English support is now visible because you answered.</div></div><button class="btn primary" style="margin-top:10px" onclick="v14NextWorksheetQ()">${n>=total?'Grade worksheet':'Next question →'}</button>`:'';let prompt=q.mode==='meaning'?esc(q.prompt):q.mode==='sound'?gr(q.prompt):esc(q.prompt),hear=q.itemId?`<button class="btn" onclick="speak('${esc(q.itemId).replace(/'/g,'&#39;')}')">🔊 Hear related Greek</button>`:q.mode==='sound'?`<button class="btn" onclick="speakGreekText(${attrJs(q.prompt)},.82)">🔊 Hear model</button>`:'',rec=q.mode==='sound'?recordComparePanel({id:'v14_sound_'+safeDomId(String(q.prompt)),greek:q.prompt,english:c.title}):'';$('practice').innerHTML=`<div id="practiceArea"><div class="worksheetShell"><div class="sectionLabel">Worksheet · ${esc(v1402ConceptTitleForLearner(c))}</div><div class="row"><span class="pill">Question ${n}/${total}</span><span class="pill">English after answer</span><span class="pill">Wrong → Review</span></div><h2>${q.mode==='sound'?'Say this clearly':'Answer this'}</h2><div class="worksheetQ"><div class="phrase smallGreek">${prompt}</div>${hear?`<div style="margin-top:10px">${hear}</div>`:''}${rec}${opts?`<div style="margin-top:12px">${opts}</div>`:''}${feedback}</div><button class="btn" onclick="v1402OpenLibraryForConcept('${c.id}')">Exit and study this lesson</button></div></div>`};

  window.v14FinishWorksheet=function(){let w=window.v14Worksheet;if(!w)return renderPractice();let total=w.questions.length,wrong=w.wrong.length,right=total-wrong,acc=Math.round(right/Math.max(1,total)*100),c=v1405FindConcept(w.conceptId)||v14CurrentConcept();v14EnsureMastery();let st=state.mastery.concepts[c.id]||{rounds:0,passed:0,accuracy:0};st.rounds=(st.rounds||0)+1;st.accuracy=Math.round(((st.accuracy||0)*(st.rounds-1)+acc)/st.rounds);st.last=Date.now();if(acc>=95){st.passed=(st.passed||0)+1;if(st.passed>=3)st.mastered=true}else st.needsCorrection=true;state.mastery.concepts[c.id]=st;state.mastery.worksheets.push({conceptId:c.id,total,right,wrong,acc,t:Date.now(),version:APP_VERSION});state.mastery.worksheets=state.mastery.worksheets.slice(-300);state.mastery.mistakes=(state.mastery.mistakes||[]).concat((w.wrong||[]).map(x=>Object.assign({conceptId:c.id,t:Date.now()},x))).slice(-300);(w.wrong||[]).forEach(x=>{if(x.itemId)state.marks[x.itemId]='review'});if(st.mastered&&state.mastery.currentConceptId===c.id){let next=(V14_CONCEPTS||[]).find(x=>x.status!=='locked'&&x.id!==c.id&&!(state.mastery.concepts[x.id]&&state.mastery.concepts[x.id].mastered));if(next){state.mastery.currentConceptId=next.id;state.mastery.currentConceptExplicit=false}}save();let action=wrong===0?'All answers were correct.':wrong<=1?'Strong round; the missed item remains visible below.':wrong<=3?'Review the missed items, then use a correction round.':'Study the reveal and repeat this concept later.',review=(w.questions||[]).map((q,i)=>v1405WorksheetReviewItem(q,w.answers[i],i)).join(''),gloss=v1405WorksheetGlossary(w);window.v1405LastWorksheetGlossary=gloss;let glossHtml=gloss.length?`<div class="worksheetGlossary">${gloss.map((g,i)=>`<button class="btn" onclick="v1405AddWorksheetGlossaryWord(${i})">+ ${esc(g.greek)} · ${esc(g.english)}</button>`).join('')}</div><button class="btn primary" style="margin-top:12px" onclick="v1405AddAllWorksheetGlossary()">Add all unknown words to Review</button>`:'<p class="muted">No glossary items were generated for this worksheet.</p>',correction=wrong?`<button class="btn primary" onclick="v14StartCorrectionRound()">Correct missed items now</button>`:`<button class="btn primary" onclick="v14StartWorksheet('${c.id}',12)">Do another variation</button>`;$('practice').innerHTML=`<div id="practiceArea"><div class="card worksheetResultHero"><div class="sectionLabel">Worksheet result · ${esc(v1402ConceptTitleForLearner(c))}</div><h2>${right}/${total} correct · ${acc}%</h2><p class="muted">${esc(action)}</p><div class="grid2">${correction}<button class="btn" onclick="renderPractice()">Worksheets menu</button></div></div><div class="card translationRevealCard"><div class="sectionLabel">Post-grade translation reveal</div><h2>Now review what every answer meant.</h2><p class="muted">Greek, English meaning, choice translations, and mistakes appear only after grading.</p><div class="worksheetReviewList">${review}</div></div><div class="card"><div class="sectionLabel">Glossary · mark only what is unknown</div><h2>Add unknown words to Review</h2><p class="muted">Tap individual words or add the full glossary. Review remains recommended, never required before the next lesson.</p>${glossHtml}</div><div class="grid2"><button class="btn" onclick="nav('progress')">Open Review</button><button class="btn good" onclick="renderPractice()">Continue in Worksheets</button></div></div>`;renderCountdown()};

  window.v1405StartMistakesReview=function(){v14EnsureMastery();let rows=(state.mastery.mistakes||[]).slice().reverse().slice(0,12);if(!rows.length){toast('No worksheet mistakes yet.');return}let conceptId=rows[0].conceptId||v14CurrentConcept().id;v1405SetCurrentConcept(conceptId,true);window.v14Worksheet={conceptId,questions:rows.map(x=>Object.assign({},x,{given:null})),index:0,answers:[],wrong:[],started:Date.now(),correctionOnly:true};save();nav('practice',{noRender:true});renderV14Worksheet()};
  window.v1405RecordingsHtml=function(){let rows=Object.entries(state.recordings||{}).filter(([,m])=>m&&m.saved).sort((a,b)=>(b[1].t||0)-(a[1].t||0));if(!rows.length)return '<p class="muted">No saved recordings yet.</p>';setTimeout(()=>rows.slice(0,10).forEach(([id])=>hydrateSavedRecording(id)),30);return `<div class="reviewMiniList">${rows.slice(0,10).map(([id,m])=>`<div class="reviewMiniRow recordingReviewRow"><b>${esc(m.modelGreek||'Saved pronunciation recording')}</b><div class="muted small">${m.t?new Date(m.t).toLocaleString():'Saved on this device'}</div><audio id="recordAudio_${safeDomId(id)}" controls style="display:none"></audio><div class="grid2" style="margin-top:8px"><button class="btn" onclick="hydrateSavedRecording('${safeDomId(id)}')">Load recording</button><button class="btn warn" onclick="deleteRecordingClip('${safeDomId(id)}').then(()=>renderProgress())">Delete</button></div></div>`).join('')}</div>`};
  window.renderProgress=function(){v14EnsureMastery();v1404DEnsureUnknownWords();let unknown=v1404DActiveUnknownWords(),weak=v1405ActualWeakIds().length,due=0;try{due=dueItems().length||0}catch(e){}let mistakes=state.mastery.mistakes||[],recordings=Object.values(state.recordings||{}).filter(x=>x&&x.saved),mastered=V14_CONCEPTS.filter(c=>v14ConceptStats(c.id).mastered),worksheets=state.mastery.worksheets||[],ready=0;try{ready=(ITEMS||[]).filter(x=>fieldReady(x.id)).length}catch(e){}let mistakeRows=mistakes.slice().reverse().slice(0,5).map(m=>`<div class="reviewMiniRow"><b>${esc(v1405QuestionGreek(m)||m.prompt||'Worksheet item')}</b><div class="muted small">${esc(v1405QuestionEnglish(m))}</div></div>`).join(''),completedRows=worksheets.slice().reverse().slice(0,5).map(w=>{let c=v1405FindConcept(w.conceptId);return `<div class="reviewMiniRow"><b>${esc(c?v1402ConceptTitleForLearner(c):w.conceptId)}</b><div class="muted small">${w.right}/${w.total} · ${w.acc}% · ${new Date(w.t).toLocaleString()}</div></div>`}).join('');$('progress').innerHTML=`<div class="masteryHero"><span class="masteryBadge">Review · optional support</span><h1>Review what needs attention.</h1><p class="muted">These queues support the study path. They never block Today, Library, or a new worksheet.</p></div><div class="reviewOptionalNote"><b>Recommended, not required.</b> Start the next lesson whenever you are ready.</div><div class="card reviewSectionCard">${v1404DUnknownWordsPanel()}</div><div class="card reviewSectionCard"><div class="sectionLabel">Weak Spots</div><div class="reviewCount">${weak}</div><p class="muted">Cards marked for practice or returned by recent performance. ${due} are due now.</p><button class="btn primary" onclick="startWeakSpotReview()" ${weak?'':'disabled'}>Review weak spots</button></div><div class="card reviewSectionCard"><div class="sectionLabel">Mistakes</div><div class="reviewCount">${mistakes.length}</div><p class="muted">Wrong worksheet answers saved for correction.</p>${mistakeRows?`<div class="reviewMiniList">${mistakeRows}</div>`:''}<button class="btn primary" style="margin-top:12px" onclick="v1405StartMistakesReview()" ${mistakes.length?'':'disabled'}>Correct recent mistakes</button></div><div class="card reviewSectionCard"><div class="sectionLabel">Recordings</div><div class="reviewCount">${recordings.length}</div><p class="muted">Pronunciation recordings saved on this device.</p>${v1405RecordingsHtml()}</div><div class="card reviewSectionCard"><div class="sectionLabel">Completed Items</div><div class="auditGrid"><div class="auditBox"><b>${mastered.length}</b><span class="muted">mastered concepts</span></div><div class="auditBox"><b>${worksheets.length}</b><span class="muted">worksheet rounds</span></div><div class="auditBox"><b>${ready}</b><span class="muted">field-ready cards</span></div></div>${completedRows?`<div class="reviewMiniList">${completedRows}</div>`:'<p class="muted" style="margin-top:10px">No completed worksheets yet.</p>'}<button class="btn" style="margin-top:12px" onclick="nav('survival')">View completed concepts on Levels</button></div><div class="footerNote">${APP_VERSION} · Review: Unknown Words · Weak Spots · Mistakes · Recordings · Completed Items.</div>`;renderCountdown()};

  document.addEventListener('pointerdown',function(e){let el=e.target&&e.target.closest?e.target.closest('button,.conceptDetails>summary'):null;if(!el||el.disabled)return;el.classList.remove('tapFeedback');void el.offsetWidth;el.classList.add('tapFeedback');setTimeout(()=>el.classList.remove('tapFeedback'),260)},{passive:true});
  try{let active=document.querySelector('.view.active');if(active){if(active.id==='home')renderHome();else if(active.id==='more')renderMore();else if(active.id==='practice')renderPractice();else if(active.id==='survival')renderSurvival();else if(active.id==='progress')renderProgress()}}catch(e){console.error('V14.0.5 initial render failed',e)}
})();

</script>

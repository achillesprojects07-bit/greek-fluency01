function buildItems(){state.custom=Array.isArray(state.custom)?state.custom.map(normalizeCustomItem):[];ITEMS=[...DATA.phrases.map((p,i)=>applyItemMeta({id:'p'+i,kind:'phrase',category:p.category||'Phrases',english:p.english,greek:p.formal||p.casual||p.greek,casual:p.casual,formal:p.formal,pron:p.pronFormal||p.pronCasual||p.pron,note:p.note||'',level:p.level||null,verified:p.verified===true,grammarNote:p.grammarNote||''})),...DATA.vocab.map((v,i)=>applyItemMeta({id:'v'+i,kind:'vocab',category:v.category||'Vocabulary',english:v.english,greek:v.greek,pron:v.pron,note:v.clue||'',level:v.level||null,verified:v.verified===true,grammarNote:v.grammarNote||''})),...dialogueTurnItems(),...state.custom];return ITEMS}
buildItems();

function ensureReviewState(){state.reviewMeta=state.reviewMeta||{};if(typeof state.reviewSafeOnly==='undefined')state.reviewSafeOnly=true;return state.reviewMeta}
function inferSituation(item){let txt=((item.category||'')+' '+(item.english||'')).toLowerCase();for(let k of Object.keys(SURVIVAL_CATS||{})){let meta=SURVIVAL_CATS[k];if(meta.terms.some(t=>txt.includes(t.toLowerCase())))return k}return isSurvival(item)?'General survival':'General practice'}
function inferRegister(item){if(item.casual&&item.formal&&item.casual!==item.formal)return 'formal + casual split';if(item.kind==='vocab')return 'neutral vocabulary';return 'neutral'}
function reviewFor(id){ensureReviewState();let m=state.reviewMeta[id]||{};return {confidence:m.confidence||'Needs review',notes:m.notes||'',suggested:m.suggested||'',reviewer:m.reviewer||'',updated:m.updated||0}}
function isVerified(id){return reviewFor(id).confidence==='Verified'}
function isFieldSafe(id){let c=reviewFor(id).confidence;return c==='Verified'||(!state.reviewSafeOnly&&c!=='Avoid in field')}
function confidenceClass(c){if(c==='Verified')return 'ok';if(c==='Avoid in field')return 'bad';return 'warn'}
function reviewRecord(item){let r=reviewFor(item.id);return {id:item.id,kind:item.kind,category:item.category,situation:inferSituation(item),english:item.english,greek:item.greek,greek_script:item.greek,romanization:item.pron||'',register:inferRegister(item),survival_priority:isSurvival(item)?survivalWeight(item):99,current_confidence:r.confidence,review_notes:r.notes,suggested_replacement:r.suggested,reviewer:r.reviewer,updated:r.updated}}
function csvEscape(v){v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function reviewRows(){return ITEMS.map(reviewRecord)}
function reviewCsv(){let cols=['id','kind','category','situation','english','greek','greek_script','romanization','register','survival_priority','current_confidence','review_notes','suggested_replacement','reviewer','updated'];return [cols.join(','),...reviewRows().map(r=>cols.map(c=>csvEscape(r[c])).join(','))].join('\n')}
function downloadText(filename,text,type){let blob=new Blob([text],{type:type||'text/plain'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},200)}
function exportReviewJson(){downloadText('gta-v12-6-phrase-review.json',JSON.stringify({app:'GTA',version:APP_VERSION,exportedAt:new Date().toISOString(),rows:reviewRows()},null,2),'application/json');toast('Native review JSON exported.')}
function exportReviewCsv(){let csv=reviewCsv();downloadText('gta-v12-6-phrase-review.csv',csv,'text/csv');let b=$('reviewExportBox');if(b)b.value=csv.slice(0,6000);toast('Native review CSV exported.')}
function copyReviewCsv(){let csv=reviewCsv();if(navigator.clipboard){navigator.clipboard.writeText(csv).then(()=>toast('Review CSV copied.')).catch(()=>{$('reviewExportBox').value=csv})}else{$('reviewExportBox').value=csv}}
function parseReviewImport(raw){let obj=JSON.parse(raw);let rows=Array.isArray(obj)?obj:(obj.rows||[]);if(!Array.isArray(rows))throw new Error('Import must contain a rows array.');return rows}
function importReviewFile(){let raw=$('reviewImportBox')?.value||'';if(!raw.trim()){alert('Paste reviewed JSON first.');return}try{let rows=parseReviewImport(raw);ensureReviewState();let updated=0;rows.forEach(r=>{if(!r.id||!byId(r.id))return;let confidence=r.current_confidence||r.confidence||'Needs review';if(!REVIEW_CONFIDENCE.includes(confidence))confidence='Needs review';state.reviewMeta[r.id]={confidence,notes:r.review_notes||r.notes||'',suggested:r.suggested_replacement||r.suggested||'',reviewer:r.reviewer||'native review',updated:Date.now()};updated++});save();toast(updated+' review records imported.');renderMore()}catch(e){alert('Could not import review: '+(e.message||'invalid JSON'))}}
function setReviewSafeOnly(v){state.reviewSafeOnly=!!v;save();renderSurvival();toast(state.reviewSafeOnly?'Survival now prioritizes verified/safe phrases.':'Survival includes unverified phrases again.')}
function saveReview(id){ensureReviewState();ensureItemMetaState();let conf=$('conf_'+id)?.value||'Needs review';let notes=$('notes_'+id)?.value||'';let suggested=$('sugg_'+id)?.value||'';let reviewer=$('rev_'+id)?.value||'';let level=$('level_'+id)?.value||'';let verified=$('verified_'+id)?.checked===true;let grammarNote=$('grammar_'+id)?.value||'';let source=$('source_'+id)?.value||'unreviewed';let sourceNote=$('sourceNote_'+id)?.value||'';state.reviewMeta[id]={confidence:conf,notes,suggested,reviewer,updated:Date.now()};state.itemMeta[id]={level:(level==='A1'||level==='A2')?level:null,verified,grammarNote,source,sourceNote,updated:Date.now()};buildItems();save();toast('Review saved.');renderContentReview()}
function reviewSummary(){ensureReviewState();let rows=reviewRows();let verified=rows.filter(r=>r.current_confidence==='Verified').length;let avoid=rows.filter(r=>r.current_confidence==='Avoid in field').length;let needs=rows.length-verified-avoid;let survival=rows.filter(r=>r.survival_priority<99);let safeSurvival=survival.filter(r=>r.current_confidence==='Verified').length;return {total:rows.length,verified,needs,avoid,survival:survival.length,safeSurvival}}
function renderContentReview(){let host=$('contentReviewArea');if(!host)return;let q=($('reviewSearch')?.value||'').toLowerCase().trim();let filter=$('reviewFilter')?.value||'all';let arr=ITEMS.filter(it=>{let r=reviewFor(it.id);let hay=(it.id+' '+it.category+' '+it.english+' '+it.greek+' '+(it.pron||'')).toLowerCase();if(q&&!hay.includes(q))return false;if(filter==='survival'&&!isSurvival(it))return false;if(filter==='needs'&&r.confidence!=='Needs review')return false;if(filter==='verified'&&r.confidence!=='Verified')return false;if(filter==='avoid'&&r.confidence!=='Avoid in field')return false;return true}).slice(0,60);host.innerHTML=`<div class="list">${arr.map(reviewCard).join('')||'<div class="empty">No review items match.</div>'}</div>`}
function reviewCard(it){let r=reviewFor(it.id);let rec=reviewRecord(it);let meta=itemMetaFor(it.id);let opts=REVIEW_CONFIDENCE.map(c=>`<option value="${esc(c)}" ${r.confidence===c?'selected':''}>${esc(c)}</option>`).join('');let levelOpts=['','A1','A2'].map(l=>`<option value="${esc(l)}" ${meta.level===l?'selected':''}>${l?esc(l):'No level yet'}</option>`).join('');let sourceOpts=['unreviewed','tutor-checked','official-source','practice-only'].map(v=>`<option value="${esc(v)}" ${meta.source===v?'selected':''}>${esc(v)}</option>`).join('');return `<div class="reviewCard"><div class="row"><div><div class="sectionLabel">${esc(it.id)} · ${esc(rec.situation)} · ${esc(rec.register)}</div><h3>${esc(it.english)}</h3></div><span class="reviewBadge ${confidenceClass(r.confidence)}">${esc(r.confidence)}</span></div><div><div class="phrase">${gr(it.greek)}</div><div class="pron">${esc(it.pron||'')}</div><p class="muted tight">${esc(it.category)} · ${it.kind==='phrase'?'Phrase':'Vocabulary'} · level ${esc(meta.level||'unset')} · ${meta.verified?'verified flag':'unverified flag'} · source ${esc(meta.source)} · survival priority ${rec.survival_priority}</p></div><div class="reviewForm"><select class="input" id="conf_${it.id}">${opts}</select><select class="input" id="level_${it.id}">${levelOpts}</select><select class="input" id="source_${it.id}">${sourceOpts}</select><label class="toggleRow"><span>Verified content flag</span><input type="checkbox" id="verified_${it.id}" ${meta.verified?'checked':''}></label><textarea class="input" id="sourceNote_${it.id}" placeholder="Source note: tutor initials, book/page, official paper, or practice-only reason">${esc(meta.sourceNote)}</textarea><textarea class="input" id="grammar_${it.id}" placeholder="Optional grammar / why note shown on the card">${esc(meta.grammarNote)}</textarea><textarea class="input" id="notes_${it.id}" placeholder="Native speaker notes: unnatural, too formal, wrong context...">${esc(r.notes)}</textarea><textarea class="input" id="sugg_${it.id}" placeholder="Suggested replacement phrase">${esc(r.suggested)}</textarea><input class="input" id="rev_${it.id}" placeholder="Reviewer name / initials" value="${esc(r.reviewer)}"><button class="btn primary" onclick="saveReview('${it.id}')">Save review</button></div></div>`}
function contentReviewPanel(){let s=reviewSummary();return `<div class="card reviewPanel"><div class="sectionLabel">Content trust layer</div><h2>Native Review + Field-Safe Content</h2><p class="muted">This is for a fluent/native Greek reviewer. It does not erase learner progress. It records phrase confidence, source status, notes, and suggested corrections.</p><div class="truthGrid"><div class="truthStat"><b>${s.verified}</b><small>Verified</small></div><div class="truthStat"><b>${s.needs}</b><small>Needs review / nuanced</small></div><div class="truthStat"><b>${s.safeSurvival}/${s.survival}</b><small>Verified survival phrases</small></div><div class="truthStat"><b>${s.avoid}</b><small>Avoid in field</small></div></div><label class="safeOnly" style="margin-top:12px"><input type="checkbox" ${state.reviewSafeOnly?'checked':''} onchange="setReviewSafeOnly(this.checked)"> In “I’m here now,” prioritize field-safe phrases first</label><div class="reviewTools"><input id="reviewSearch" class="input" placeholder="Search review content" oninput="renderContentReview()"><select id="reviewFilter" class="input" onchange="renderContentReview()"><option value="all">All content</option><option value="survival">Survival only</option><option value="needs">Needs review</option><option value="verified">Verified</option><option value="avoid">Avoid in field</option></select></div><div class="grid2" style="margin-top:10px"><button class="btn primary" onclick="renderContentReview()">Open content review</button><button class="btn" onclick="exportReviewCsv()">Export review CSV</button><button class="btn" onclick="exportReviewJson()">Export review JSON</button><button class="btn" onclick="copyReviewCsv()">Copy CSV</button></div><textarea id="reviewExportBox" class="input csvBox" placeholder="CSV preview appears here after export/copy."></textarea><div class="divider"></div><h3>Import reviewed JSON</h3><p class="muted">Paste a reviewed JSON export. This updates only phrase review metadata and suggested corrections, not SRS progress.</p><textarea id="reviewImportBox" class="input csvBox" placeholder='{"rows":[{"id":"p0","current_confidence":"Verified","review_notes":"Natural.","suggested_replacement":""}]}'></textarea><button class="btn warn" onclick="importReviewFile()">Import review metadata only</button><div id="contentReviewArea" style="margin-top:12px"></div></div>`}

function byId(id){return ITEMS.find(x=>x.id===id)}
function categories(){return [...new Set(ITEMS.map(x=>x.category))].sort()}
function survivalWeight(item){let idx=SURVIVAL_PRIORITY.findIndex(c=>(item.category||'').toLowerCase().includes(c.toLowerCase()));return idx<0?99:idx}
function isSurvival(item){return survivalWeight(item)<15}
function dayKeyFromTime(t){return t?iso(new Date(t)):''}
function dueItems(){let now=Date.now();return ITEMS.filter(it=>state.srs[it.id]&&state.srs[it.id].due<=now).sort((a,b)=>state.srs[a.id].due-state.srs[b.id].due)}
function recentMissPenalty(it){let h=(state.history||[]).slice(-60).reverse().find(x=>x.id===it.id);return h&&!h.ok?-80:0}
function deadlineScore(item){let d=daysUntilTrip(), score=0;if(d!==null&&d>=0&&d<=7&&isSurvival(item))score-=120;else if(d!==null&&d>7&&d<=21&&isSurvival(item))score-=70;if(state.marks[item.id]==='review')score-=60;if(!fieldReady(item.id))score-=20;score+=survivalWeight(item)*3;score+=recentMissPenalty(item);return score}
function poolForToday(){let due=dueItems();let rest=ITEMS.filter(x=>!due.some(d=>d.id===x.id)&&!fieldReady(x.id)).sort((a,b)=>deadlineScore(a)-deadlineScore(b));return [...due,...rest].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i)}
function getDailyIds(){let key=iso(today())+'|'+(state.tripDate||'')+'|'+goalLabel()+'|'+dueItems().map(x=>x.id).slice(0,5).join(',');if(state.dailyKey!==key||!state.dailyIds?.length){state.dailyKey=key;state.dailyIds=poolForToday().slice(0,5).map(x=>x.id);save()}return state.dailyIds}
function goalLabel(){return (state.goalLabel||'next visit').trim()||'next visit'}
function isFutureGoal(){let d=daysUntilTrip();return d!==null&&d>0}
function compressedSrsDays(level){let days=SRS_LADDER[level];let left=daysUntilTrip();if(left===null||left<=0)return days;if(left<=7)return Math.min(days,Math.max(1,Math.ceil(left/2)));if(left<=21)return Math.min(days,Math.max(2,Math.ceil(left/3)));return Math.min(days,left)}
function nextDueDate(id, ok, quality){let previous=state.srs[id]||null;let lvl=ok?Math.min(((previous&&previous.level)||0)+1,SRS_LADDER.length-1):0;let days=compressedSrsDays(lvl);let due=new Date();due.setDate(due.getDate()+days);let delayed=!!(ok&&previous&&previous.last&&dayKeyFromTime(previous.last)!==iso(today()));state.srs[id]={level:lvl,due:due.getTime(),last:Date.now(),quality:quality||0};state.seen[id]=state.seen[id]||Date.now();if(ok){state.recall[id]={ok:true,day:iso(today()),delayed:delayed||!!(state.recall[id]&&state.recall[id].delayed)};state.marks[id]=delayed?'field-ready':'remembered'}else{state.marks[id]='review'}state.history.push({t:Date.now(),id,ok,quality,delayed});save();}
function fieldReady(id){let r=state.recall[id];return !!(r&&r.ok&&r.delayed)}
function masteryLabel(id){if(fieldReady(id))return 'Field-ready';if(state.recall[id]?.ok||state.marks[id]==='remembered'||state.marks[id]==='mastered')return 'Remembered';if(state.understood[id])return 'Understood';if(state.seen[id]||state.srs[id])return 'Seen';return 'New'}
function reasonForToday(it){if(dueItems().some(x=>x.id===it.id))return 'Due now';if(state.marks[it.id]==='review')return 'Weak phrase';if((state.history||[]).slice(-30).some(x=>x.id===it.id&&!x.ok))return 'Recently missed';if(isSurvival(it))return daysUntilTrip()!==null&&daysUntilTrip()<=7?'Final-week survival':'Survival first';return 'New useful Greek'}
function nav(id,opts){opts=opts||{};if(id==='library')id='more';if(id==='levels')id='survival';if(id==='worksheets')id='practice';if(id==='review')id='progress';document.querySelectorAll('.view').forEach(v=>{v.classList.remove('active');v.removeAttribute('role')});$(id).classList.add('active');$(id).setAttribute('role','main');document.querySelectorAll('.nav button').forEach(b=>{let on=b.dataset.view===id;b.classList.toggle('active',on);if(on)b.setAttribute('aria-current','page');else b.removeAttribute('aria-current')});requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'instant'}));if(opts.noRender)return;if(id==='home')renderHome();if(id==='practice')renderPractice();if(id==='survival')renderSurvival();if(id==='progress')renderProgress();if(id==='more')renderMore();}
function renderPracticeDirect(html){nav('practice',{noRender:true});$('practice').innerHTML=`<div id="practiceArea">${html}</div>`;requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'instant'}));}
function practiceBackBar(){return `<div class="grid2" style="margin-bottom:12px"><button class="btn" onclick="renderPractice()">← Extra Practice menu</button><button class="btn" onclick="nav('home')">Back to Today</button></div>`}

function soundDrillCard(d,i){let ex=(d.examples||[]).map((e,ei)=>{let grw=e[0]||'',en=e[1]||'';return `<div class="soundExample"><div><b>${gr(grw)}</b><br><span class="soundMini">${esc(en)}</span></div><div class="grid2"><button class="btn" onclick="speakGreekText(${attrJs(grw)},.78)">🔊 Hear</button><button class="btn primary" onclick="startSoundCheck(${i},${ei})">🎙 Say</button></div></div>`}).join('');let badges=`<span class="soundBadge">${esc(d.type==='letter'?'Letter':'Sound combo')}</span>${d.difficulty==='hard'?'<span class="soundBadge hard">Hard</span>':''}${d.family?'<span class="soundBadge family">'+esc(d.family)+'</span>':''}${d.focus==='gavros'?'<span class="soundBadge gavros">Gavros focus</span>':''}`;let rid=safeDomId('sound_'+i);return `<div class="soundCard ${(d.focus==='gavros'||d.difficulty==='hard')?'focusSound':''}" id="soundCard_${rid}"><div class="row"><div><div>${badges}</div><div class="soundLetter">${esc(d.letter)}</div><div><span class="soundName">${esc(d.name)}</span><span class="soundIPA">${esc(d.sound||'')}</span></div></div><button class="btn" style="width:auto" onclick="speakGreekText(${attrJs((d.examples&&d.examples[0]&&d.examples[0][0])||d.target||'')},.72)">🔊 Model</button></div><p class="muted tight">${esc(d.tip||'')}</p><div class="soundExamples">${ex}</div><div class="soundCheck" id="soundCheck_${rid}" data-target="${esc(d.target||'')}" data-model-greek="${esc(d.target||'')}"><div class="sectionLabel">Record + check target</div><p class="muted tight">Target: <b>${gr(d.target||'')}</b></p><div class="soundButtons"><button class="btn primary" id="soundRecordBtn_${rid}" onclick="startSoundCheck(${i},-1)">🎙 Record + check</button><button class="btn stopBtn" id="soundStopBtn_${rid}" style="display:none" onclick="stopSoundCheck('${rid}')">⏹ Stop</button><button class="btn" onclick="speakGreekText(${attrJs(d.target||'')},.72)">🔊 Hear target</button><button class="btn warn" onclick="deleteSoundRecording('${rid}')">🗑 Delete</button></div><a function stripGreekMarks(t){try{return String(t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ς/g,'σ').replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim()}catch(e){return String(t||'').toLowerCase().replace(/[.,;·!?]/g,' ').replace(/\s+/g,' ').trim()}}
function similarity(a,b){a=stripGreekMarks(a);b=stripGreekMarks(b);if(!a||!b)return 0;if(a===b||a.includes(b)||b.includes(a))return 1;let m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>[i]);for(let j=1;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1))}}return 1-dp[m][n]/Math.max(m,n)}
function soundTargetVariants(txt){let base=stripGreekMarks(txt);let arr=[base];if(base.endsWith('σ'))arr.push(base.slice(0,-1));if(base==='γαυροσ')arr.push('γαυρο','γαβροσ','γαβρο');if(base==='ευχαριστω')arr.push('εφχαριστω','ευχαριστο');if(base==='χαιρε')arr.push('χερε');return arr.filter(Boolean)}

 try{if(mediaRecorder&&mediaRecorder.state==='recording'){try{mediaRecorder.stop()}catch(e){}}if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)throw new Error('Microphone recording is not available.');if(!window.MediaRecorder)throw new Error('MediaRecorder is not available.');let stream=await navigator.mediaDevices.getUserMedia({audio:true});recordingChunks=[];let mime=mediaRecorderMime();mediaRecorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size)recordingChunks.push(e.data)};mediaRecorder.onstop=async()=>{try{stream.getTracks().forEach(x=>x.stop())}catch(e){}setSoundRecordingUi(rid,false);let type=mime||(recordingChunks[0]&&recordingChunks[0].type)||'audio/webm';let blob=new Blob(recordingChunks,{type});recordingBlobs[rid]=blob;if(recordingUrls[rid])URL.revokeObjectURL(recordingUrls[rid]);recordingUrls[rid]=URL.createObjectURL(blob);let audio=$('recordAudio_'+rid);if(audio){audio.src=recordingUrls[rid];audio.style.display='block'}showRecordActions(rid,'ready');let h=$('recordHint_'+rid);if(h)h.textContent='Recording ready. If the result says redo, tap Record again. You can also save or delete.';if(!SR){let el=$('soundResult_'+rid);if(el){el.className='soundResult wait';el.textContent='Auto accept/reject is not available in this browser. Play your recording and compare with the model.'}}};mediaRecorder.start();setSoundRecordingUi(rid,true);setTimeout(()=>stopSoundCheck(rid),4000)}catch(e){setSoundRecordingUi(rid,false);setRecordHint(rid,(e&&e.message?e.message:'Microphone not available.')+' You can still listen and repeat aloud.',false)}}

function paceStats(){const DAYS=14,since=Date.now()-DAYS*86400000;ensureCoverageState();let introRecent=ITEMS.filter(it=>{let s=state.seen[it.id];return s&&s>=since}).length;let readyRecent=(state.history||[]).filter(h=>h&&h.ok===true&&h.delayed===true&&(h.t||0)>=since).length;let hasData=introRecent>=5;let introPerDay=Math.max(1,introRecent/DAYS);let readyPerDay=Math.max(0.5,readyRecent/DAYS);return {introPerDay,readyPerDay,introRecent,readyRecent,windowDays:DAYS,hasData}}

muted">Projected from your real last-${p.windowDays}-day pace: ~${p.introPerDay.toFixed(1)} new cards introduced/day and ~${p.readyPerDay.toFixed(1)} reaching field-ready/day.</p>${caution}<div class="coveragePath">${rows.map(r=>`<div class="coverageStage"><b><span>${esc(coverageStageLabel(r.stage))}</span><span>${r.remaining?fmt(r.eta):'done'}</span></b><small>${r.remaining} of ${r.total} still to introduce${r.remaining?' · projected finish '+fmt(r.eta):' · all introduced ✓'}</small></div>`).join('')}</div><div class="notice"><b>Full mastery (everything field-ready):</b> ~${masterMonths} month${masterMonths===1?'':'s'} · around <b>${fmt(masterEta)}</b> at your current pace.</div>${examLine}<p class="muted small tight">Forecast is a guide, not a grade. It re-computes daily from delayed-recall history — increase your daily minutes on the Today tab to pull the dates closer.</p></div>`}

function buildAdaptiveSession(minutes){
  let minChoice=Number(minutes)||20,budget=Math.max(5,minChoice)*60,remaining=budget,steps=[],used=new Set(),usedDialogues=new Set(),surprise=!!(state.settings&&state.settings.adaptiveSurprise),seed=Date.now(),caps=progressionReviewCaps(minChoice),warmupWeakIds=adaptiveWeakWarmupIds(minChoice);
  function add(step,force){if(force||remaining>=step.seconds||!steps.length){steps.push(Object.assign({id:'as_'+Date.now()+'_'+steps.length,done:false,started:false},step));remaining-=step.seconds;return true}return false}
  function addItems(kind,arr,sec,limit,forceFirst){let pool=uniqueAdaptiveItems(surprise?adaptiveShuffle(arr,seed+steps.length):arr,used),added=0;for(let it of pool){if(limit&&added>=limit)break;if(remaining<sec&&steps.length&&!forceFirst)break;let sub=kind==='new'?'New useful Greek':kind==='coverage'?'Next step in your course':kind==='weak'?'You marked this for practice':'Review so you do not forget';add({type:kind==='weak'?'review':kind,title:it.english||it.category||it.id,subtitle:sub,seconds:sec,ref:it.id});added++;forceFirst=false}return added}
  function addDialogueRehearsals(max){if(max<=0)return 0;let rows=adaptiveCoverageDialogues().filter(x=>!usedDialogues.has(x.i));let pool=rows.length?rows:(DATA.dialogues||[]).map((d,i)=>({d,i,stage:2})).filter(x=>!dialogueNativeReviewed(x.d)&&!usedDialogues.has(x.i));let added=0;for(let pick of pool){if(added>=max||remaining<180&&steps.length)break;usedDialogues.add(pick.i);add({type:'rehearse',title:(pick.d.title||pick.d.domain||'Dialogue rehearsal'),subtitle:'Practice a real exchange',seconds:180,dialogueIndex:pick.i});added++}return added}

  // Guardrail 1: due review comes first, but weak spots are handled before the timer and do not reduce the session budget.
  addItems('review',dueItems(),20,caps.due,false);

  // Guardrail 2: every day reserves space for the next course step in stage order.
  let coverageAdded=addItems('coverage',adaptiveCoverageItems(),35,caps.coverage,true);

  // Guardrail 3: the four skills rotate through the path after the coverage step.
  addDailyConfidenceSteps(add,remaining,minChoice);

  // Guardrail 4: conversation appears after enough foundation/review, not as a hidden extra.
  addDialogueRehearsals(caps.dialogues);

  if(remaining>=125&&caps.quiz){let qCount=Math.max(5,Math.min(caps.quiz,Math.floor(remaining/25)));add({type:'quiz',title:minChoice>=45?'Mixed recall check':'Quick recall check',subtitle:qCount+' questions from due, recent, and weak cards',seconds:qCount*25,quizKind:adaptiveWeakItems().length?'weak':'daily',questionCount:qCount})}

  // Only add extra new cards if there is still time after the required course step and skills.
  addItems('new',adaptiveNewItems(),30,minChoice>=60?8:minChoice>=45?5:minChoice>=30?2:0,false);
  if(!coverageAdded&&steps.length<3)addItems('coverage',adaptiveCoverageItems(),35,1,true);
  if(!steps.length)addItems('coverage',ITEMS.filter(adaptiveItemText),35,Math.max(1,caps.coverage),true);

  return {key:adaptiveSessionTodayKey(),dayKey:iso(today()),minutes:minChoice,budgetSeconds:budget,created:Date.now(),started:false,ended:false,dismissed:false,currentIndex:0,preflightWeakIds:warmupWeakIds,preflightWeakIndex:0,preflightWeakDone:!warmupWeakIds.length,steps}
}

function ensureAdaptiveSession(){state.adaptiveSession=state.adaptiveSession&&typeof state.adaptiveSession==='object'?state.adaptiveSession:{};let key=adaptiveSessionTodayKey(),s=state.adaptiveSession;if(guidedSessionIsLocked(s)){s.currentIndex=Math.max(0,Math.min(Number(s.currentIndex||0),Math.max(0,(s.steps||[]).length-1)));if(!Array.isArray(s.preflightWeakIds)){s.preflightWeakIds=[];s.preflightWeakDone=true;s.preflightWeakIndex=0}return s}if(s.key!==key||!Array.isArray(s.steps)||!s.steps.length){state.adaptiveSession=buildAdaptiveSession(adaptiveSessionMinutes());save()}state.adaptiveSession.currentIndex=Number(state.adaptiveSession.currentIndex||0);if(!Array.isArray(state.adaptiveSession.preflightWeakIds)){state.adaptiveSession.preflightWeakIds=adaptiveWeakWarmupIds(state.adaptiveSession.minutes);state.adaptiveSession.preflightWeakDone=!state.adaptiveSession.preflightWeakIds.length;state.adaptiveSession.preflightWeakIndex=0;save()}return state.adaptiveSession}

function finishConversationMemory(mode,rating){ensureConversationMemoryState();let m=todayConversationMemory(),k=iso(today());state.conversationMemoryLog.push({date:k,ts:Date.now(),scene:m.scene,mode,rating,next:m.next});if(['repeat','froze','partial'].includes(rating)){state.conversationWeakLines.unshift({id:'weak_'+Date.now(),date:k,scene:m.scene,line:m.you[0]||'',reason:rating,done:false})}state.checkins[k]=Object.assign({},state.checkins[k]||{},{spoke:true,conversationMemory:true,partnerPractice:mode==='partner'||!!(state.checkins[k]||{}).partnerPractice,appSoloPractice:mode==='app'||!!(state.checkins[k]||{}).appSoloPractice});save();toast('Conversation memory saved.');nav('home')}
function renderWeakConversationLines(){ensureConversationMemoryState();let host=$('conversationMemoryArea')||$('practiceArea');if(!host)return;let rows=state.conversationWeakLines.filter(x=>!x.done).slice(0,5);host.innerHTML=rows.length?`<div class="examPanel"><div class="sectionLabel">Weak speaking lines</div><h3>Bring these back tomorrow.</h3>${rows.map((x,i)=>`<div class="notice"><b>${esc(x.scene)}</b><br>${gr(x.line||'Repeat the scene again.')}<br><span class="muted">Reason: ${esc(x.reason||'needs review')}</span><div class="grid2" style="margin-top:8px"><button class="btn" onclick="speakMissionText('${esc(x.line||'').replace(/'/g,'&#39;')}')">🔊 Hear</button><button class="btn primary" onclick="markWeakConversationLineDone('${esc(x.id)}')">I can say this now</button></div></div>`).join('')}</div>`:`<div class="notice good"><b>No weak speaking lines waiting.</b><br>Finish a conversation memory round and any line you froze on will appear here.</div>`}
function markWeakConversationLineDone(id){ensureConversationMemoryState();let row=state.conversationWeakLines.find(x=>x.id===id);if(row){row.done=true;row.doneAt=Date.now()}save();renderWeakConversationLines()}

function todayRealGreekListeningScene(){let i=Math.floor(Date.now()/86400000)%REAL_GREEK_LISTENING_SCENES.length;return REAL_GREEK_LISTENING_SCENES[i]}
function ensureListeningLadderState(){state.listeningLadderLog=Array.isArray(state.listeningLadderLog)?state.listeningLadderLog:[];return state.listeningLadderLog}
function listeningLadderStats(){ensureListeningLadderState();let since=Date.now()-7*86400000,rows=state.listeningLadderLog.filter(x=>(x.ts||0)>=since);return {total:rows.length,words:rows.filter(x=>x.rating==='words').length,idea:rows.filter(x=>x.rating==='idea').length,most:rows.filter(x=>x.rating==='most').length}}
function speakGreekListeningText(text,rate){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(text||'');u.lang='el-GR';u.rate=rate||0.85;u.pitch=1;speechSynthesis.speak(u)}catch(e){toast('Audio playback unavailable on this browser.')}}
function realGreekListeningCard(){let m=todayRealGreekListeningScene(),st=listeningLadderStats();return `<div class="card realListenCard"><div class="sectionLabel">Understanding Real Greek</div><h2>Today’s listening ladder</h2><p class="muted">Train your ear from slow Greek to more natural Greek. The goal is not perfection — catch words, then the main idea, then most of it.</p><div class="notice"><b>${esc(m.title)}</b><br><span class="muted">Level: ${esc(m.level)} · focus words: ${m.words.map(esc).join(' · ')}</span></div><div class="stepList"><div class="stepItem"><div class="stepIcon">1</div><div><b>Slow, no pressure</b><br><span class="muted">Listen for familiar words.</span></div></div><div class="stepItem"><div class="stepIcon">2</div><div><b>Normal speed</b><br><span class="muted">Try to catch the main idea without reading.</span></div></div><div class="stepItem"><div class="stepIcon">3</div><div><b>Reveal Greek text</b><br><span class="muted">Replay and repeat one sentence aloud.</span></div></div></div><div class="grid2"><button class="btn" onclick="renderRealGreekListening('slow')">Slow listening</button><button class="btn primary" onclick="renderRealGreekListening('normal')">Normal speed</button><button class="btn" onclick="renderRealGreekListening('reveal')">Reveal text + questions</button><button class="btn" onclick="startRealGreekListeningPractice()">Open full drill</button></div><p class="muted tight">This week: ${st.total} listening ladder run${st.total===1?'':'s'} · main idea/most: ${st.idea+st.most}.</p><div id="realGreekListeningArea"></div></div>`}
function renderRealGreekListening(mode){let host=$('realGreekListeningArea')||$('practiceArea');if(!host)return;let m=todayRealGreekListeningScene();let isReveal=mode==='reveal';let rate=mode==='normal'?0.95:0.72;let text=mode==='normal'?m.normal:m.slow;let qHtml=isReveal?m.questions.map((q,qi)=>`<div class="examQuestion"><b>${esc(q.q)}</b>${q.options.map((op,oi)=>`<label class="examOption"><input type="radio" name="rl_${qi}" value="${oi}"><span>${esc(op)}</span></label>`).join('')}</div>`).join(''):'';host.innerHTML=`<div class="examPanel"><div class="sectionLabel">Listening ladder · ${esc(mode)}</div><h3>${esc(m.title)}</h3><p class="muted">${isReveal?'Read the Greek, answer the questions, then repeat one sentence aloud.':'Do not read yet. Listen and notice what words you catch.'}</p><button class="btn primary" onclick="speakGreekListeningText('${esc(text).replace(/'/g,'&#39;')}',${rate})">🔊 Play ${mode==='normal'?'normal':'slow'} Greek</button>${isReveal?`<div class="phrase smallGreek" style="margin-top:12px">${gr(m.normal)}</div><p class="muted tight">Focus words: ${m.words.map(esc).join(' · ')}</p>${qHtml}`:''}<div class="grid2" style="margin-top:12px"><button class="btn" onclick="finishRealGreekListening('words')">I caught words</button><button class="btn" onclick="finishRealGreekListening('idea')">I got the main idea</button><button class="btn good" onclick="finishRealGreekListening('most')">I understood most</button></div></div>`}
function finishRealGreekListening(rating){ensureListeningLadderState();let m=todayRealGreekListeningScene();let right=0,total=(m.questions||[]).length;(m.questions||[]).forEach((q,qi)=>{let chosen=document.querySelector(`input[name="rl_${qi}"]:checked`);if(chosen&&Number(chosen.value)===Number(q.answer))right++});state.listeningLadderLog.push({date:iso(today()),ts:Date.now(),title:m.title,rating,right,total});state.checkins[iso(today())]=Object.assign({},state.checkins[iso(today())]||{},{listened:true,listeningLadder:true});save();toast('Listening saved.');renderHome()}
function startRealGreekListeningPractice(){nav('practice');let m=todayRealGreekListeningScene();$('practiceArea').innerHTML=`<div class="card realListenCard"><div class="sectionLabel">Understanding Real Greek · full drill</div><h2>${esc(m.title)}</h2><p class="muted">Follow the ladder: slow first, normal second, then reveal text and answer.</p><div class="grid2"><button class="btn" onclick="renderRealGreekListening('slow')">1 · Slow no-text</button><button class="btn" onclick="renderRealGreekListening('normal')">2 · Normal no-text</button><button class="btn primary" onclick="renderRealGreekListening('reveal')">3 · Reveal + answer</button><button class="btn" onclick="nav('home')">Back to Today</button></div><div id="realGreekListeningArea"></div></div>`;renderRealGreekListening('slow')}


function ensureA2GrammarGapState(){state.a2GrammarGapLog=Array.isArray(state.a2GrammarGapLog)?state.a2GrammarGapLog:[];return state.a2GrammarGapLog}
function a2GrammarGapUnits(){return (Array.isArray(DATA.grammar)?DATA.grammar:[]).filter(u=>String(u.id||'').startsWith('g-gap-a2-'))}
function todayA2GrammarGapUnit(){let arr=a2GrammarGapUnits();if(!arr.length)return null;let idx=Math.abs(daysBetween(new Date('2026-01-01'),today()))%arr.length;return arr[idx]}
function a2GrammarGapStats(){ensureA2GrammarGapState();let week=state.a2GrammarGapLog.filter(x=>x&&x.date&&daysBetween(new Date(x.date),today())<7),touched=new Set(state.a2GrammarGapLog.map(x=>x.id)).size,clear=week.filter(x=>x.rating==='used').length,needs=week.filter(x=>x.rating==='confused').length;return {week:week.length,touched,clear,needs,total:a2GrammarGapUnits().length}}
function a2GrammarGapCard(){let u=todayA2GrammarGapUnit(),st=a2GrammarGapStats();if(!u)return '';let done=state.a2GrammarGapLog.some(x=>x.date===iso(today())&&x.id===u.id);return `<div class="card grammarGapCard"><div class="sectionLabel">Living in Greece Mode</div><h2>${esc(u.title)} ${done?'<span class="tag good">done today</span>':''}</h2><p class="muted">A tiny daily pattern closes the A2 gaps that block real conversation: genitive, prepositions, -μαι verbs, object pronouns, and natural follow-up questions.</p><div class="notice"><b>Today’s pattern:</b> ${esc(u.explanation||'')}<br><b>Use it aloud:</b> choose one example, say it, then change one detail.</div><div class="grid2"><button class="btn primary" onclick="startA2GrammarGap('${esc(u.id).replace(/'/g,'&#39;')}')">Learn today’s pattern</button><button class="btn" onclick="renderA2GrammarGapLibrary()">Open A2 gap library</button></div><p class="muted tight">This week: ${st.week} grammar-gap practice${st.week===1?'':'s'} · ${st.touched}/${st.total} gap units touched.</p></div>`}
function a2GrammarExampleHtml(u){return `<div class="list">${(u.examples||[]).map((ex,i)=>`<div class="examQuestion"><b>${i+1}. ${gr(ex.gr||'')}</b><div>${esc(ex.en||'')}</div><p class="muted tight">${esc(ex.note||'')}</p><button class="btn" onclick="speakText('${esc(ex.gr||'').replace(/'/g,'&#39;')}',0.9)">🔊 Hear example</button></div>`).join('')}</div>`}
function startA2GrammarGap(id){nav('practice');ensureA2GrammarGapState();let u=a2GrammarGapUnits().find(x=>x.id===id)||todayA2GrammarGapUnit();if(!u){$('practiceArea').innerHTML='<div class="card"><h2>No A2 gap units found.</h2></div>';return}$('practiceArea').innerHTML=`<div class="card grammarGapCard"><div class="sectionLabel">Living in Greece Mode · daily pattern</div><h2>${esc(u.title)}</h2><p class="muted">Practice this as a speaking pattern, not as a textbook rule. Read once, listen once, say one example aloud, then change one detail.</p><div class="notice"><b>Rule:</b> ${esc(u.explanation||'')}</div>${a2GrammarExampleHtml(u)}<div class="notice"><b>Speaking mini-task:</b> Say one example aloud. Then change the person, place, food, time, or feeling.</div><div class="grid2"><button class="btn good" onclick="finishA2GrammarGap('${esc(u.id).replace(/'/g,'&#39;')}','used')">I used it in a sentence</button><button class="btn warn" onclick="finishA2GrammarGap('${esc(u.id).replace(/'/g,'&#39;')}','confused')">I need this again</button><button class="btn" onclick="renderA2GrammarGapLibrary()">Open all A2 gaps</button><button class="btn" onclick="nav('home')">Back to Today</button></div></div>`}
function finishA2GrammarGap(id,rating){ensureA2GrammarGapState();state.a2GrammarGapLog.unshift({id,date:iso(today()),rating:rating||'used',ts:Date.now()});state.a2GrammarGapLog=state.a2GrammarGapLog.slice(0,120);save();toast(rating==='confused'?'Saved for more grammar practice.':'A2 grammar pattern logged.');renderHome()}
function renderA2GrammarGapLibrary(){nav('practice');let arr=a2GrammarGapUnits(),st=a2GrammarGapStats();$('practiceArea').innerHTML=`<div class="card grammarGapCard"><div class="sectionLabel">Living in Greece Mode</div><h2>Close the A2 blockers one pattern at a time.</h2><p class="muted">These are practice-only grammar units. Use them in speech and ask your partner/tutor to correct anything that sounds unnatural.</p><div class="truthGrid"><div class="truthStat"><b>${st.touched}/${st.total}</b><small>gap units touched</small></div><div class="truthStat"><b>${st.week}</b><small>this week</small></div><div class="truthStat"><b>${st.clear}</b><small>used in speech</small></div><div class="truthStat"><b>${st.needs}</b><small>need again</small></div></div><div class="list">${arr.map(u=>`<div class="itemRow"><div><b>${esc(u.title)}</b><br><span class="muted">${esc(u.explanation||'').slice(0,150)}...</span></div><button class="btn primary" onclick="startA2GrammarGap('${esc(u.id).replace(/'/g,'&#39;')}')">Practice</button></div>`).join('')}</div></div>`}
function a2GrammarGapStatsPanel(){let st=a2GrammarGapStats();return `<div class="card grammarGapCard"><div class="sectionLabel">Living in Greece Mode</div><h2>${st.touched}/${st.total} A2 gap patterns touched</h2><p class="muted">This tracks the specific grammar blockers for A2 conversation: genitive, prepositions, -μαι verbs, object pronouns, connectors, past/future pairs, and follow-up questions.</p><div class="truthGrid"><div class="truthStat"><b>${st.week}</b><small>this week</small></div><div class="truthStat"><b>${st.clear}</b><small>used in speech</small></div><div class="truthStat"><b>${st.needs}</b><small>need again</small></div><div class="truthStat"><b>${st.total-st.touched}</b><small>untouched</small></div></div><div class="notice"><b>Next action:</b> ${st.needs?'Repeat one confusing pattern aloud.':'Do today’s A2 grammar gap pattern.'}</div></div>`}

function ensureConfidenceEngineState(){state.confidenceEngine=Object.assign({targetSpeaking:7,targetListening:5,targetPartner:3,targetGrammar:4},state.confidenceEngine||{});state.confidenceEngineLog=Array.isArray(state.confidenceEngineLog)?state.confidenceEngineLog:[];return state.confidenceEngineLog}
function withinLastDaysLog(row,days=7){let ts=row&&row.ts?row.ts:(row&&row.date?new Date(row.date).getTime():0);return ts>=Date.now()-days*86400000}
function confidenceEngineStats(days=7){ensureConfidenceEngineState();ensureListeningLadderState();ensureConversationMemoryState();ensureLivingGreeceState();ensureA2GrammarGapState();let coach=(state.conversationCoachLog||[]).filter(x=>withinLastDaysLog(x,days));let memory=(state.conversationMemoryLog||[]).filter(x=>withinLastDaysLog(x,days));let living=(state.livingGreeceLog||[]).filter(x=>withinLastDaysLog(x,days));let listening=(state.listeningLadderLog||[]).filter(x=>withinLastDaysLog(x,days));let grammar=(state.a2GrammarGapLog||[]).filter(x=>withinLastDaysLog(x,days));let pulse=(state.confidenceEngineLog||[]).filter(x=>withinLastDaysLog(x,days));let speaking=[...coach,...memory,...living,...pulse.filter(x=>x.type==='speaking'||x.type==='partner'||x.type==='solo')];let partner=[...coach,...memory,...living].filter(x=>x.mode==='partner').length+pulse.filter(x=>x.type==='partner').length;let solo=[...coach,...memory,...living].filter(x=>x.mode==='app').length+pulse.filter(x=>x.type==='solo').length;let listenTotal=listening.length+pulse.filter(x=>x.type==='listening').length;let grammarTotal=grammar.length+pulse.filter(x=>x.type==='grammar').length;let realWorld=pulse.filter(x=>x.type==='real-world').length+living.length;let clearRatings=['natural','clear','most','used','understood','partner-clear','solo-clear'];let freezeRatings=['froze','again','try-again','repeat','partial','confused'];let clear=speaking.filter(x=>clearRatings.includes(x.rating)).length+pulse.filter(x=>clearRatings.includes(x.rating)).length;let freeze=speaking.filter(x=>freezeRatings.includes(x.rating)).length+pulse.filter(x=>freezeRatings.includes(x.rating)).length;let scenes=new Set([...(coach.map(x=>x.scene)),...(memory.map(x=>x.scene)),...(living.map(x=>x.place)),...(pulse.map(x=>x.scene||x.type))].filter(Boolean));let targets=state.confidenceEngine||{};let score=Math.round(Math.min(100,(Math.min(1,speaking.length/(targets.targetSpeaking||7))*35)+(Math.min(1,listenTotal/(targets.targetListening||5))*25)+(Math.min(1,partner/(targets.targetPartner||3))*20)+(Math.min(1,grammarTotal/(targets.targetGrammar||4))*10)+(Math.min(1,realWorld/3)*10)));let trend=score>=80?'on track':score>=55?'building':'needs more speaking/listening';return {days,speaking:speaking.length,partner,solo,listening:listenTotal,grammar:grammarTotal,realWorld,clear,freeze,scenes:scenes.size,score,trend,pulse:pulse.length,targets}}

function confidenceDashboardPanel(){let st=confidenceEngineStats(7);let p=(n,d)=>Math.min(100,Math.round((n/Math.max(1,d))*100));return `<div class="card confidenceEngineCard"><div class="sectionLabel">Confidence Engine</div><h2>Conversation readiness, not just cards completed</h2><p class="muted">Your 6-month goal needs weekly evidence: speaking, listening, partner practice, grammar used aloud, and fewer freeze moments.</p><div class="truthGrid"><div class="truthStat"><b>${st.score}%</b><small>weekly readiness signal</small></div><div class="truthStat"><b>${st.clear}</b><small>clear / natural wins</small></div><div class="truthStat"><b>${st.freeze}</b><small>freeze / repeat signals</small></div><div class="truthStat"><b>${st.scenes}</b><small>scenes touched</small></div><p class="whenNote">These move from your quick-logs and guided speak/listen steps — card reviews alone never move them.</p></div><div class="coveragePath"><div class="coverageStage"><b><span>Speaking</span><span>${st.speaking}/${st.targets.targetSpeaking}</span></b><div class="progressbar"><span style="width:${p(st.speaking,st.targets.targetSpeaking)}%"></span></div><small>Record, answer, continue, or rehearse at least once daily.</small></div><div class="coverageStage"><b><span>Listening</span><span>${st.listening}/${st.targets.targetListening}</span></b><div class="progressbar"><span style="width:${p(st.listening,st.targets.targetListening)}%"></span></div><small>Use slow → normal → no text → reveal Greek text.</small></div><div class="coverageStage"><b><span>Partner practice</span><span>${st.partner}/${st.targets.targetPartner}</span></b><div class="progressbar"><span style="width:${p(st.partner,st.targets.targetPartner)}%"></span></div><small>Short 10–15 minute partner sessions count.</small></div><div class="coverageStage"><b><span>Grammar in speech</span><span>${st.grammar}/${st.targets.targetGrammar}</span></b><div class="progressbar"><span style="width:${p(st.grammar,st.targets.targetGrammar)}%"></span></div><small>Not textbook grammar — one pattern used aloud.</small></div></div><div class="grid2" style="margin-top:12px"><button class="btn primary" onclick="renderConfidenceEngine()">Open weekly controls</button><button class="btn" onclick="nav('home')">Back to Today</button></div></div>`}

function pathRingBlock(day){let c=overallCompletion();let t=targetInfo();let st=streakStats();let C1=2*Math.PI*52,C2=2*Math.PI*40;let o1=C1*(1-c.pctIntro/100),o2=C2*(1-c.pctReady/100);return `<div class="pathRingWrap"><svg class="pathRing" viewBox="0 0 130 130" role="img" aria-label="${c.pctIntro}% of content introduced, ${c.pctReady}% field-ready"><circle class="ringTrack" cx="65" cy="65" r="52"/><circle class="ringTrack" cx="65" cy="65" r="40"/><circle class="ringArc ringIntro" cx="65" cy="65" r="52" stroke-dasharray="${C1}" stroke-dashoffset="${o1}" style="--c:${C1}"/><circle class="ringArc ringReady" cx="65" cy="65" r="40" stroke-dasharray="${C2}" stroke-dashoffset="${o2}" style="--c:${C2}"/><text class="ringCenter" x="65" y="62" text-anchor="middle">${c.pctIntro}%</text><text class="ringSub" x="65" y="78" text-anchor="middle">DAY ${day} · OF ~180</text></svg><div class="ringLegend"><span><i class="dotIntro"></i><b>${c.intro}</b> of ${c.total} introduced</span><span><i class="dotReady"></i><b>${c.ready}</b> field-ready (the honest number)</span><span>🔥 <b>${st.streak}</b>-day streak</span><span class="muted2">${esc(t.line)}</span></div></div>`}
function journeySummaryPanel(){let c=overallCompletion();let t=targetInfo();let st=streakStats();return `<div class="card"><div class="sectionLabel">Your journey · all content</div><h2>${c.pctIntro}% of the library introduced</h2><div class="journeyBar"><i style="width:${c.pctIntro}%"></i></div><div class="journeyRow"><span><b>${c.intro}</b>/${c.total} introduced</span><span><b>${c.ready}</b> field-ready</span><span>🔥 <b>${st.streak}</b>-day streak</span></div><p class="whenNote">${esc(t.line)}</p><p class="whenNote">Introduced counts exposure. Field-ready counts delayed recall — it starts moving after your first next-day correct reviews.</p></div>`}

function renderHome(){if(!state.onboarded){renderOnboarding();return}
let s=ensureAdaptiveSession(),steps=s.steps||[],done=steps.filter(x=>x.done).length,total=steps.length;
let sessionActive=!!s.started&&!s.ended&&!s.dismissed&&!s.paused&&total>0&&done<total;
if(sessionActive){let idx=Math.min(Number(s.currentIndex||0),Math.max(0,total-1));let pct=total?Math.round((done/total)*100):0;let left=Math.ceil(adaptiveRemainingSeconds()/60);
$('home').innerHTML=`<div class="card tight focusBar"><div class="row"><b>Step ${Math.min(idx+1,total)} of ${total}</b><span class="muted">~${left} min left</span></div><div class="progressbar" style="margin-top:8px"><span style="width:${pct}%"></span></div></div>${renderGuidedAdaptiveTask(s)}<div class="grid2" style="margin-top:10px"><button class="btn ghost" onclick="skipAdaptiveStep()">Skip this step</button><button class="btn ghost" onclick="pauseAdaptiveSession()">Pause session</button></div>`;
renderCountdown();return}
let due=dueItems().length,info=progressivePathStageInfo(),mins=adaptiveSessionMinutes(),st=streakStats();
let left=Math.ceil(adaptiveRemainingSeconds()/60);

let preview=steps.map(x=>`<div class="check"><span class="dot ${x.done?'ok':'blue'}"></span><span>${esc(x.title||adaptiveStepTypeLabel(x.type))}</span></div>`).join('');
let paused=!!s.paused&&!!s.started&&!s.ended&&!s.dismissed&&total>0&&done<total;
let startBtn=paused?`<button class="btn primary bigStart" onclick="resumeAdaptiveSession()">Continue Today\u2019s Path \u2192</button><p class="muted tight" style="margin-top:8px">Paused at step ${Math.min(Number(s.currentIndex||0)+1,total)} of ${total}. Your place is saved.</p>`:`<button class="btn primary bigStart" onclick="beginAdaptiveSession()">Start Today\u2019s Path \u2192</button>`;
let core=(s.ended||s.dismissed||(total>0&&done>=total&&s.started))?adaptiveSessionPanel():`<div class="card oneButtonPath" id="startPath"><div class="sectionLabel">Today</div><h2>Stage ${info.stage} \u00b7 ${esc(info.label)}</h2>${startBtn}<p class="muted tight" style="margin-top:10px">${mins} min session \u00b7 <a href="#" onclick="toggleMinutePicker(event)">change</a></p><div id="minutePicker" class="chips" style="display:none;margin-top:8px">${[20,30,45,60].map(v=>`<button class="chip ${mins===v?'active':''}" onclick="setTodayMinutes(${v})">${v} min</button>`).join('')}</div><details class="howTo" style="margin-top:12px"><summary>Today includes \u00b7 ${total} task${total===1?'':'s'} \u00b7 ~${left} min</summary><div><p class="muted tight">${esc(summary)}</p><div class="statusLine">${preview}</div></div></details></div>`;
$('home').innerHTML=`${core}<div class="card tight"><div class="row"><span class="muted">\ud83d\udd25 ${st.streak}-day streak \u00b7 ${due} due</span><button class="btn" style="width:auto;min-height:40px;padding:8px 12px" onclick="nav('progress')">Progress \u2192</button></div></div>`;renderCountdown()}

function pauseAdaptiveSession(){let s=ensureAdaptiveSession();s.paused=true;save();renderHome();window.scrollTo({top:0,behavior:'smooth'})}
function resumeAdaptiveSession(){let s=ensureAdaptiveSession();s.paused=false;s.started=true;s.ended=false;s.dismissed=false;save();renderHome();scrollToGuidedTask()}
function toggleMinutePicker(e){if(e&&e.preventDefault)e.preventDefault();let el=document.getElementById('minutePicker');if(el)el.style.display=el.style.display==='none'?'flex':'none'}
function historyDayCount(){return new Set((state.history||[]).map(h=>h&&h.t?dayKeyFromTime(h.t):'').filter(Boolean)).size}
function stepHowTo(type){let m={
review:['This card protects your memory.','1) Read the English prompt. 2) Say the Greek OUT LOUD from memory before revealing. 3) Reveal and compare. 4) Grade honestly \u2014 Again if wrong, Hard if slow, Easy if instant.','Prompt \u201cthank you\u201d \u2192 you say \u00ab\u03b5\u03c5\u03c7\u03b1\u03c1\u03b9\u03c3\u03c4\u03ce\u00bb aloud \u2192 reveal \u2192 it matched \u2192 tap Easy.'],
coverage:['You are meeting a new phrase.','1) Play the audio and read it once. 2) Say it aloud twice, copying the rhythm. 3) Cover the Greek and rebuild it from the English.','\u00ab\u0398\u03ad\u03bb\u03c9 \u03ad\u03bd\u03b1\u03bd \u03ba\u03b1\u03c6\u03ad\u00bb \u2014 say it, hide it, rebuild it from \u201cI want a coffee.\u201d'],
new:['You are meeting a new phrase.','1) Play the audio and read it once. 2) Say it aloud twice, copying the rhythm. 3) Cover the Greek and rebuild it from the English.','\u00ab\u0398\u03ad\u03bb\u03c9 \u03ad\u03bd\u03b1\u03bd \u03ba\u03b1\u03c6\u03ad\u00bb \u2014 say it, hide it, rebuild it from \u201cI want a coffee.\u201d'],
quiz:['A short check, not a test.','1) Read the question and ALL options. 2) Eliminate one clearly wrong option first. 3) Choose. Wrong answers are learning \u2014 the card returns automatically.','If the question asks WHERE and one option is a time, that option is out.'],
rehearse:['Conversation practice, three passes.','1) Play the whole conversation once, just listening. 2) Play again and repeat YOUR lines aloud. 3) Rehearse: the app says their line, you answer without looking.','You hear \u00ab\u03a0\u03ce\u03c2 \u03ae\u03c4\u03b1\u03bd \u03b7 \u03bc\u03ad\u03c1\u03b1 \u03c3\u03bf\u03c5;\u00bb \u2192 you answer aloud \u00ab\u0389\u03c4\u03b1\u03bd \u03ba\u03b1\u03bb\u03ae, \u03b1\u03bb\u03bb\u03ac \u03b5\u03af\u03bc\u03b1\u03b9 \u03ba\u03bf\u03c5\u03c1\u03b1\u03c3\u03bc\u03ad\u03bd\u03b7.\u00bb'],
grammar:['One tiny rule, used aloud.','1) Read the rule once. 2) Say every example OUT LOUD. 3) Prove it: swap ONE word to make your own example. Tap \u201cI understand\u201d only when your swap works.','Rule \u03bf\u2192\u03bf\u03b9: given \u00ab\u03bf \u03b4\u03c1\u03cc\u03bc\u03bf\u03c2 \u2192 \u03bf\u03b9 \u03b4\u03c1\u03cc\u03bc\u03bf\u03b9\u00bb, now try it on \u00ab\u03bf \u03c6\u03af\u03bb\u03bf\u03c2\u00bb.'],
listening:['Ears first, text never.','1) Read the QUESTIONS first \u2014 they tell you what to listen for. 2) Decode the options (\u03b4\u03af\u03c0\u03bb\u03b1 = next to, \u03bc\u03ad\u03c3\u03b1 = inside, \u03c0\u03af\u03c3\u03c9 = behind). 3) Play once, eyes off the screen. 4) Play again to confirm. 5) Answer and GRADE \u2014 wrong + graded still counts and unlocks tomorrow.','Question \u00ab\u03a0\u03bf\u03cd \u03b5\u03af\u03bd\u03b1\u03b9;\u00bb = \u201cWhere is it?\u201d \u2192 you are hunting for ONE location word.'],
reading:['Hunt answers, not every word.','1) Read the questions first. 2) Read the passage fast once for the topic. 3) Read again slowly, hunting each answer. You do NOT need every word.','If a question asks for a date, scan for numbers and months like \u00ab25 \u039c\u03b1\u0390\u03bf\u03c5\u00bb.'],
partner:['Speaking only works out loud.','1) Read the mission. 2) Say the line at FULL voice \u2014 alone is fine. 3) Say it again changing one word. If your partner is around: they ask fast once, slow once.','\u00ab\u0398\u03ad\u03bb\u03c9 \u03bd\u03b5\u03c1\u03cc, \u03c0\u03b1\u03c1\u03b1\u03ba\u03b1\u03bb\u03ce\u00bb \u2192 again with \u03ba\u03b1\u03c6\u03ad.']
};let x=m[type]||['Do this step actively.','Say things out loud, grade honestly, and move on. Done imperfectly beats skipped.','Wrong + graded still counts.'];
return `<details class="howTo"><summary>\u2753 How to do this step</summary><div><b>${esc(x[0])}</b><p class="muted tight">${esc(x[1])}</p><p class="tight"><b>Example:</b> ${esc(x[2])}</p></div></details>`}
function practiceModeHowTo(){return `<details class="howTo" style="margin-top:10px"><summary>\u2753 What each mode means</summary><div><p class="muted tight"><b>Listen</b> = audio first, text hidden \u2014 pick the meaning, then reveal. <b>Recognize</b> = see Greek, recall the English. <b>Recall</b> = see English, say the Greek aloud before revealing. <b>Speak</b> = say it aloud and let the app check you. <b>Converse</b> = answer their line without a script.</p><p class="tight"><b>In every mode:</b> grade honestly \u2014 wrong + graded beats skipped.</p></div></details>`}
function cardMini(it){return `<div class="tight"><b>${esc(it.english)}</b><br><span class="muted">${esc(it.category)} · ${masteryLabel(it.id)}</span><br><span class="whyTag">${reasonForToday(it)}</span></div>`}

function quizHubPanel(){let recent=(state.quizRuns||[]).slice(-1)[0];let last=recent?`Last quiz: ${recent.right}/${recent.total} · ${new Date(recent.finished).toLocaleDateString()}`:'No quiz run yet.';let passes=state.milestonePasses&&typeof state.milestonePasses==='object'?Object.keys(state.milestonePasses).map(k=>`${k} ready`).join(' · '):'';return `<div class="card"><div class="sectionLabel">Quizzes</div><h2>Daily, milestone, and weak-spots quizzes</h2><p class="muted">Short quizzes reuse your existing cards and the same SRS. Learning mode now gives instant feedback after each answer.</p><div class="grid2"><button class="btn primary" onclick="startDailyQuiz()">Today’s Quiz</button><button class="btn" onclick="startQuiz('weak')">Weak Spots Quiz</button><button class="btn" onclick="startQuiz('milestone','A1')">A1 Milestone Quiz</button><button class="btn" onclick="startQuiz('milestone','A2')">A2 Milestone Quiz</button><button class="btn" onclick="startQuiz('consolidated')">Consolidated Review</button><button class="btn" onclick="renderExamPrep()">Exam Prep</button></div><p class="muted tight">${esc(last)}${passes?' · '+esc(passes):''}</p><div id="quizArea"></div></div>`}
function startDailyQuiz(){startQuiz('daily')}
function quizItemText(it){return {greek:(it.greek||it.formal||it.casual||'').trim(),english:(it.english||'').trim()}}
function quizEligibleItems(kind,level){let base=ITEMS.filter(it=>{let t=quizItemText(it);return t.greek&&t.english});if(level)base=base.filter(it=>it.level===level);let due=new Set(dueItems().map(x=>x.id));let daily=new Set(getDailyIds());let weak=new Set((state.history||[]).filter(h=>h&&h.ok===false).map(h=>h.id));let picked=[];if(kind==='daily')picked=base.filter(it=>due.has(it.id)||daily.has(it.id)||weak.has(it.id));
else if(kind==='weak')picked=base.filter(it=>due.has(it.id)||weak.has(it.id)||state.marks[it.id]==='review'||!fieldReady(it.id));
else if(kind==='milestone')picked=base.filter(it=>!level||it.level===level);
else picked=base.filter(it=>due.has(it.id)||weak.has(it.id)||!fieldReady(it.id));
let pool=picked.length>=5?picked:base;let verifiedPool=pool.filter(it=>it.verified===true);let rest=pool.filter(it=>it.verified!==true);return verifiedPool.length?[...verifiedPool,...rest]:pool}
function quizShuffle(arr,seed){let out=arr.slice();let n=seed||Date.now();for(let i=out.length-1;i>0;i--){n=(n*9301+49297)%233280;let j=Math.floor((n/233280)*(i+1));[out[i],out[j]]=[out[j],out[i]]}return out}
function quizDistractors(correct,all,field){let opts=[correct];for(let it of quizShuffle(all,correct.length+field.length)){let t=quizItemText(it)[field];if(t&&t!==correct&&!opts.includes(t))opts.push(t);if(opts.length>=4)break}return quizShuffle(opts,correct.length*17+opts.length).map((text,i)=>({text,correct:text===correct}))}
function buildQuizQuestions(kind,level){let candidates=quizEligibleItems(kind,level),all=ITEMS.filter(it=>{let t=quizItemText(it);return t.greek&&t.english});let count=kind==='daily'?10:kind==='weak'?15:kind==='milestone'?25:30;let picked=quizShuffle(candidates,Date.now()).slice(0,Math.min(count,candidates.length));return picked.map((it,i)=>{let t=quizItemText(it),mode=i%2?'englishToGreek':'greekToEnglish',field=mode==='greekToEnglish'?'english':'greek',correct=mode==='greekToEnglish'?t.english:t.greek,opts=quizDistractors(correct,all,field);return {id:it.id,mode,prompt:mode==='greekToEnglish'?t.greek:t.english,options:opts.map(o=>o.text),answer:opts.findIndex(o=>o.correct),level:it.level||'',category:it.category||'',verified:it.verified===true,source:sourceLabel(it)}})}
function startQuiz(kind,level){if(!$('practice').classList.contains('active'))nav('practice');let questions=buildQuizQuestions(kind||'daily',level||'');window.quizSession={kind:kind||'daily',level:level||'',questions,started:Date.now(),answers:{}};renderQuizSession()}
function renderQuizSession(){let s=window.quizSession,area=$('quizArea')||$('practiceArea');if(!s||!area)return;if(!s.questions.length){area.innerHTML=`<div class="card"><div class="sectionLabel">Quiz</div><h2>No quiz items available yet</h2><p class="muted">Add level tags or practice more cards, then try again.</p></div>`;return}let title=s.kind==='daily'?'Today’s Quiz':s.kind==='weak'?'Weak Spots Quiz':s.kind==='milestone'?`${s.level||''} Milestone Quiz`:'Consolidated Review';area.innerHTML=`<div class="card"><div class="sectionLabel">${esc(title)}</div><h2>${esc(title)}</h2><p class="muted">${s.questions.length} questions · instant feedback · final score feeds the same SRS.</p><div class="quizMeta"><span>${esc(s.level||'mixed levels')}</span><span>${esc(s.kind)}</span><span>${s.questions.some(q=>q.verified)?'verified preferred':'practice only'}</span></div>${s.questions.map((q,i)=>`<div class="examQuestion" id="quizCard_${i}"><b>${i+1}. ${q.mode==='greekToEnglish'?'Choose the English meaning':'Choose the Greek phrase'}</b><p class="phrase smallGreek">${q.mode==='greekToEnglish'?gr(q.prompt):esc(q.prompt)}</p>${q.options.map((op,oi)=>`<label class="examOption"><input type="radio" name="quiz_${i}" value="${oi}" onclick="answerQuizQuestion(${i},${oi})"><span>${q.mode==='englishToGreek'?gr(op):esc(op)}</span></label>`).join('')}<div id="quizFeedback_${i}"></div><p class="muted tight">${esc(q.level||'No level')} · ${esc(q.category||'General')}</p></div>`).join('')}<button class="btn primary" onclick="finishQuiz()">Finish quiz</button></div>`}
function answerQuizQuestion(i,oi){let s=window.quizSession;if(!s||!s.questions||!s.questions[i])return;let q=s.questions[i];s.answers=s.answers||{};s.answers[i]=Number(oi);let ok=Number(oi)===Number(q.answer),fb=$('quizFeedback_'+i),card=$('quizCard_'+i);if(fb){let answer=q.options[q.answer]||'';fb.className='quizFeedback '+(ok?'ok':'no');fb.innerHTML=ok?'Correct.':'Review: correct answer is '+(q.mode==='englishToGreek'?gr(answer):esc(answer));}if(card){card.querySelectorAll('input').forEach(inp=>{inp.disabled=true});card.querySelectorAll('.examOption').forEach((lab,idx)=>{if(idx===Number(q.answer))lab.style.borderColor='rgba(8,116,67,.45)';else if(idx===Number(oi)&&!ok)lab.style.borderColor='rgba(181,71,8,.45)'})}}
function milestonePassText(level){return level==='A2'?'A2 ready — a calm milestone marker. Keep strengthening real conversation.':'A1 ready — a calm milestone marker. Keep going.'}
function finishQuiz(){let s=window.quizSession,area=$('quizArea')||$('practiceArea');if(!s||!area)return;let right=0,total=s.questions.length,rows=[];s.questions.forEach((q,i)=>{let val=s.answers&&typeof s.answers[i]!=='undefined'?Number(s.answers[i]):-1;if(val<0){let chosen=document.querySelector(`input[name="quiz_${i}"]:checked`);val=chosen?Number(chosen.value):-1}let ok=val===Number(q.answer);if(ok)right++;nextDueDate(q.id,ok,ok?4:1);markCoverageItem(q.id,ok?'remembered':'practiced');rows.push({q,ok,val})});state.quizRuns=Array.isArray(state.quizRuns)?state.quizRuns:[];state.quizRuns.push({kind:s.kind,level:s.level,right,total,finished:Date.now()});state.quizRuns=state.quizRuns.slice(-40);let pct=total?Math.round((right/total)*100):0,passed=pct>=75;if(s.kind==='milestone'&&passed&&s.level){state.milestonePasses=state.milestonePasses&&typeof state.milestonePasses==='object'?state.milestonePasses:{};state.milestonePasses[s.level]={pct,right,total,passedAt:Date.now()}}save();let milestone=(s.kind==='milestone'&&passed)?`<div class="milestoneMark"><b>${esc(milestonePassText(s.level))}</b><br><span class="muted">This is a practice milestone, not an official exam score.</span></div>`:'';area.innerHTML=`<div class="card"><div class="sectionLabel">Quiz result</div><h2>${right}/${total} correct · ${pct}%</h2><p class="muted">${passed?'Milestone-ready signal. Keep going.':'Review needed. Missed items were sent back into SRS.'}</p>${milestone}<div class="quizResult"><b>${passed?'Ready':'Almost there'}</b><br><span class="muted">Correct answers moved forward; missed answers will resurface.</span></div><div class="list" style="margin-top:12px">${rows.map((r,i)=>`<div class="itemRow"><div><b>${r.ok?'✓':'↻'} Question ${i+1}</b><br><span class="muted">Correct answer: ${r.q.mode==='englishToGreek'?gr(r.q.options[r.q.answer]||''):esc(r.q.options[r.q.answer]||'')}</span></div></div>`).join('')}</div><div class="grid2" style="margin-top:12px"><button class="btn primary" onclick="startQuiz('${esc(s.kind)}','${esc(s.level)}')">Retake similar quiz</button><button class="btn" onclick="renderPractice()">Back to Practice</button></div></div>`;window.quizSession=null}


function renderPractice(){let due=dueItems().length;$('practice').innerHTML=`<div class="card"><div class="sectionLabel">Extra Practice</div><h2>Optional extras, not the required daily path.</h2><p class="muted">Use these buttons when you want to study more. Each button starts the exact activity it names. For the guided path, use Today → Start Today’s Path.</p><div class="browseActionGrid"><button class="btn" aria-label="Search all phrases" onclick="openSearch()">🔍 Search phrases</button><button class="btn primary" onclick="renderSoundDrills()">Alphabet + hard sounds</button><button class="btn" onclick="startDialogueList()">Practice dialogues</button><button class="btn" onclick="startDirectReview('due')">Due reviews (${due})</button><button class="btn" onclick="startPracticeMode('listen')">Listen First library</button><button class="btn" onclick="renderPracticeCategoryBrowser()">Browse categories</button><button class="btn" onclick="renderExamPrep()">Exam prep / import</button><button class="btn" onclick="startSoloPartnerMission()">Practice with app</button><button class="btn" onclick="startRealGreekListeningPractice()">Understanding Real Greek</button><button class="btn" onclick="startConversationMemory('app')">Conversation Memory</button><button class="btn" onclick="renderConfidenceEngine()">Confidence dashboard</button><button class="btn" onclick="nav('home')">Back to Today’s session</button></div></div><div class="card"><div class="sectionLabel">Practice cards</div><h2>Choose one. It starts immediately.</h2><p class="muted">No hidden second step: tap a mode and the first card opens here.</p><div class="grid2">${['listen','recognize','recall','speak','converse'].map(m=>`<button class="btn ${currentMode===m?'primary':''}" onclick="startPracticeMode('${m}')">${labelMode(m)}</button>`).join('')}</div>${practiceModeHowTo()}</div><div id="practiceArea">${practiceLandingHtml()}</div>${dailyConversationCoachCard()}${realGreekListeningCard()}${conversationMemoryCard()}${livingGreeceModeCard()}${a2GrammarGapCard()}${phraseOfDayPanel()}${conversationCaptureCard()}${quizHubPanel()}<div class="card"><div class="sectionLabel">Ellinomatheia A1/A2</div><h2>Import official exam JSON.</h2><p class="muted">Use this for official/tutor-checked A1/A2 reading, listening, writing, speaking, and mock items. The loader shows counts after import.</p><button class="btn primary" onclick="renderExamPrep()">Import verified exam content</button></div>`}

function labelMode(m){return ({recognize:'Recognize',recall:'Recall',speak:'Speak',converse:'Converse',listen:'Listen First'})[m]}
function modeHelp(m){return {recognize:'See English first, then recognize or reveal the Greek.',recall:'Try to remember the Greek before revealing it. This is the delayed mastery check.',speak:'Listen, say the phrase aloud, and use recording or speech check if available.',converse:'Use the phrase inside a small real-life situation.'}[m]}

function renderDialoguePlayback(di,activeIndex=-1,playing=false){let d=(DATA.dialogues||[])[di];if(!d)return;renderPracticeDirect(`<div class="card"><div class="sectionLabel">Full conversation audio · ${esc(dialogueLevel(d))} · ${esc(dialogueReviewLabel(d))}</div><h2>${esc(d.title||d.domain||'Dialogue')}</h2><p class="muted">Listen to the whole exchange in order, with short pauses between turns.</p><div class="grid2"><button class="btn ${playing?'stopBtn':'primary'}" onclick="${playing?'stopDialogueAudio()':'playDialogueConversation('+di+')'}">${playing?'⏸ Stop':'▶ Play conversation'}</button><button class="btn" onclick="startDialogueRehearsal(${di})">🎙 Rehearse</button></div><div class="dialoguePlaybackList">${(d.turns||[]).map((t,i)=>dialogueTurnHtml(t,i,i===activeIndex)).join('')}</div></div>`)}
async function playDialogueConversation(di){let d=(DATA.dialogues||[])[di];if(!d||!Array.isArray(d.turns)||!d.turns.length){toast('Dialogue unavailable.');return}if(!('speechSynthesis' in window)){alert('Audio is not available in this browser.');return}if(dialoguePlaybackActive){toast('Dialogue audio is already playing.');return}stopDialogueAudio(false);dialoguePlaybackActive=true;let token=++dialoguePlaybackToken;refreshGreekVoices();let twoVoices=GREEK_VOICE_CACHE&&GREEK_VOICE_CACHE.them&&GREEK_VOICE_CACHE.you&&GREEK_VOICE_CACHE.them!==GREEK_VOICE_CACHE.you;for(let i=0;i<d.turns.length;i++){if(token!==dialoguePlaybackToken)break;renderDialoguePlayback(di,i,true);let role=d.turns[i].speaker==='you'?'you':'them';let v=voiceForSpeaker(role);let pitch=twoVoices?1:(role==='you'?1.25:0.75);let rate=role==='you'?.9:.78;await speakGreekText(d.turns[i].gr||'',rate,v,pitch);if(token!==dialoguePlaybackToken)break;await wait(1150)}if(token===dialoguePlaybackToken){dialoguePlaybackActive=false;renderDialoguePlayback(di,-1,false);toast('Full conversation complete.')}}

}')">💾 Save only</button><button class="btn primary" onclick="saveRehearsalAndNext('${rid}')">💾 Save + Next</button><button class="btn" onclick="proceedRehearsalNoSave('${rid}')">Next without saving</button><button class="btn warn" onclick="redoRehearsalTurn('${rid}')">↻ Delete + Redo</button></div><div class="recordHint" id="recordHint_${rid}">Record for 4 seconds, or tap Stop recording early. Your practice will stay on this turn.</div></div>`:`<div class="rehearsePrompt dialogueThem speakingNow"><div class="sectionLabel">Their turn</div><div class="english">${esc(t.en||'')}</div><div class="phrase">${gr(t.gr||'')}</div><p class="muted">The app is speaking this line, then it will move to your turn.</p></div>`}</div>`);if(!isYou)runRehearsalThemTurn()}

function recordDb(){return new Promise((resolve,reject)=>{if(!('indexedDB' in window))return reject(new Error('IndexedDB is not available.'));let req=indexedDB.open('kathimerina_recordings_v1',1);req.onupgradeneeded=()=>{let db=req.result;if(!db.objectStoreNames.contains('clips'))db.createObjectStore('clips')};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error||new Error('Cannot open recordings storage.'))})}

async function toggleRecording(id){let rid=safeDomId(id);let p=ensureRecordPanel(rid);if(mediaRecorder&&mediaRecorder.state==='recording'){try{mediaRecorder.stop()}catch(e){}return}try{cancelAppAudioForRecording();if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)throw new Error('Microphone recording is not available in this browser.');if(!window.MediaRecorder)throw new Error('This browser does not support MediaRecorder.');setRecordHint(rid,'Stopping all app audio first… then record only your voice.',false);await wait(350);let stream=await navigator.mediaDevices.getUserMedia({audio:true});recordingChunks=[];let mime=mediaRecorderMime();mediaRecorder=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size)recordingChunks.push(e.data)};mediaRecorder.onerror=()=>setRecordHint(rid,'Recording error. Please try again or use your phone Voice Memos app.',false);mediaRecorder.onstop=async()=>{try{stream.getTracks().forEach(x=>x.stop())}catch(e){}let type=mime||(recordingChunks[0]&&recordingChunks[0].type)||'audio/webm';let blob=new Blob(recordingChunks,{type});recordingBlobs[rid]=blob;if(recordingUrls[rid])URL.revokeObjectURL(recordingUrls[rid]);recordingUrls[rid]=URL.createObjectURL(blob);let audio=$('recordAudio_'+rid);if(audio){audio.src=recordingUrls[rid];audio.style.display='block'}showRecordActions(rid,'ready');setRecordHint(rid,'Recording ready. This is your voice only. Use playback to hear yourself, Hear model separately to compare, then save or delete.',false)};mediaRecorder.start();setRecordHint(rid,'Recording only your voice… speak now. It will stop automatically after 4 seconds.',true);setTimeout(()=>{try{if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop()}catch(e){}},4000)}catch(e){setRecordHint(rid,(e&&e.message?e.message:'Microphone not available.')+' Use HTTPS/Safari/Chrome permission settings, or record in Voice Memos.',false);toast('Microphone not a

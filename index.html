","english":"I don't understand.","casual":"Δεν καταλαβαίνω.","formal":"Δεν καταλαβαίνω.","pronCasual":"then ka-ta-la-VEH-no","pronFormal":"then ka-ta-la-VEH-no","note":""},{"type":"phrase","category":"Conversation Repair","english":"Can you repeat that?","casual":"Μπορείς να το επαναλάβεις;","formal":"Μπορείτε να το επαναλάβετε;","pronCasual":"bo-REES na to e-pa-na-LA-vees","pronFormal":"bo-REE-te na to e-pa-na-LA-ve-te","note":""},{"type":"phrase","category":"Conversation Repair","english":"Can you speak more slowly?","casual":"Μπορείς να μιλάς πιο αργά;","formal":"Μπορείτε να μιλάτε πιο αργά;","pronCasual":"bo-REES na mee-LAS pyo ar-GHA","pronFormal":"bo-REE-te na mee-LA-te pyo ar-GHA","note":""},{"type":"phrase","category":"Conversation Repair","english":"Please use simple words.","casual":"Με απλές λέξεις, παρακαλώ.","formal":"Με απλές λέξεις, παρακαλώ.","pronCasual":"me | a-PLES | LEK-sis | pa-ra-ka-LO","pronFormal":"me | a-PLES | LEK-sis | pa-ra-ka-LO","note":"Use when you need easier words, not just slower speech."},{"type":"phrase","category":"Conversation Repair","english":"Can you say it in English?","casual":"Μπορείς να το πεις στα αγγλικά;","formal":"Μπορείτε να το πείτε στα αγγλικά;","pronCasual":"bo-REES na to pees sta an-glee-KA","pronFormal":"bo-REE-te na to PEE-te sta an-glee-KA","note":""},{"type":"phrase","category":"Conversation Repair","english":"What does this mean?","casual":"Τι σημαίνει αυτό;","formal":"Τι σημαίνει αυτό;","pronCasual":"tee see-MEH-nee af-TO","pronFormal":"tee see-MEH-nee af-TO","note":""},{"type":"phrase","category":"Conversation Repair","english":"How do you say this in Greek?","casual":"Πώς το λένε αυτό στα ελληνικά;","formal":"Πώς λέγεται αυτό στα ελληνικά;","pronCasual":"pos to LEH-ne af-TO sta e-lee-nee-KA","pronFormal":"pos LEH-ye-te af-TO sta e-lee-nee-KA","note":""},{"type":"phrase","category":"Conversation Repair","english":"Please write it down.","casual":"Γράψ’ το, παρακαλώ.","formal":"Γράψτε το, παρακαλώ.","pronC ef-ha-ree-STO poo me ka-lo-SO-ree-ses","pronFormal":"sas ef-ha-ree-STO poo me ka-lo-so-REE-sa-te","note":"Good after arriving at a family home."},{"type":"phrase","category":"Social Warmth","english":"You made me feel at home.","casual":"Με έκανες να νιώσω σαν στο σπίτι μου.","formal":"Με κάνατε να νιώσω σαν στο σπίτι μου.","pronCasual":"me EH-ka-nes na NYO-so san sto SPEE-tee moo","pronFormal":"me KA-na-te na NYO-so san sto SPEE-tee moo","note":"Host-family gratitude."},{"type":"phrase","category":"Social Warmth","english":"How was your day?","casual":"Πώς ήταν η μέρα σου;","formal":"Πώς ήταν η μέρα σας;","pronCasual":"pos EE-tan ee MEH-ra soo","pronFormal":"pos EE-tan ee MEH-ra sas","note":"Warm daily question."},{"type":"phrase","category":"Social Warmth","english":"Did you have a good day?","casual":"Είχες καλή μέρα;","formal":"Είχατε καλή μέρα;","pronCasual":"EE-hes ka-LEE MEH-ra","pronFormal":"EE-ha-te ka-LEE MEH-ra","note":"Friendly check-in."},{"type":"phrase","category":"Social Warmth","english":"I am happy to be here.","casual":"Χαίρομαι που είμαι εδώ.","formal":"Χαίρομαι που είμαι εδώ.","pronCasual":"HEH-ro-me poo EE-me e-THO","pronFormal":"HEH-ro-me poo EE-me e-THO","note":"Simple and heartfelt."},{"type":"phrase","category":"Social Warmth","english":"I am happy to be part of the family.","casual":"Χαίρομαι που είμαι μέρος της οικογένειας.","formal":"Χαίρομαι που είμαι μέρος της οικογένειας.","pronCasual":"HEH-ro-me poo EE-me MEH-ros tees ee-ko-YEH-nee-as","pronFormal":"HEH-ro-me poo EE-me MEH-ros tees ee-ko-YEH-nee-as","note":"Warm but not overly dramatic."},{"type":"phrase","category":"Social Warmth","english":"I appreciate this very much.","casual":"Το εκτιμώ πολύ.","formal":"Το εκτιμώ πολύ.","pronCasual":"to ek-tee-MO po-LEE","pronFormal":"to ek-tee-MO po-LEE","note":"Useful for gratitude beyond ευχαριστώ."},{"type":"phrase","category":"Social Warmth","english":"This means a lot to me.","casual":"Αυτό σημαίνει πολλά για μένα.","formal":"Αυτό σημαίνει πολλά για μένα.","pronCasual":"af-TO see-MEH-nee po-LA ya MEH-na","pronFormal":"af-TO see-MEH-nee po-LA ya MEH-na","note":"Emotional but natural."},{"type":"phrase","category":"Social Warmth","english":"You are very kind.","casual":"Είσαι πολύ καλός.","formal":"Είστε πολύ καλός.","pronCasual":"EE-se po-LEE ka-LOS","pronFormal":"EE-ste po-LEE ka-LOS","note":"To a man; use καλή for a woman."},{"type":"phrase","category":"Social Warmth","english":"She is very kind.","casual":"Είναι πολύ καλή.","formal":"Είναι πολύ καλή.","pronCasual":"EE-ne po-LEE ka-LEE","pronFormal":"EE-ne po-LEE ka-LEE","note":"Useful when complimenting a woman."},{"type":"phrase","category":"Social Warmth","english":"Everything is beautiful.","casual":"Όλα είναι όμορφα.","formal":"Όλα είναι όμορφα.","pronCasual":"O-la EE-ne O-mor-fa","pronFormal":"O-la EE-ne O-mor-fa","note":"For home, table, view, preparations."},{"type":"phrase","category":"Social Warmth","english":"The table is beautiful.","casual":"Το τραπέζι είναι πολύ όμορφο.","formal":"Το τραπέζι είναι πολύ όμορφο.","pronCasual":"to tra-PEH-zee EE-ne po-LEE O-mor-fo","pronFormal":"to tra-PEH-zee EE-ne po-LEE O-mor-fo","note":"Compliment for a Greek table."},{"type":"phrase","category":"Social Warmth","english":"Cheers to our health.","casual":"Στην υγειά μας.","formal":"Στην υγειά μας.","pronCasual":"steen ee-YA mas","pronFormal":"steen ee-YA mas","note":"Classic toast: to our health."},{"type":"phrase","category":"Social Warmth","english":"Cheers to love and family.","casual":"Στην αγάπη και στην οικογένεια.","formal":"Στην αγάπη και στην οικογένεια.","pronCasual":"steen a-GHA-pee ke steen ee-ko-YEH-nee-a","pronFormal":"steen a-GHA-pee ke steen ee-ko-YEH-nee-a","note":"Warm table toast."},{"type":"phrase","category":"Social Warmth","english":"To beautiful moments.","casual":"Στις όμορφες στιγμές.","formal":"Στις όμορφες στιγμές.","pronCasual":"stees O-mor-fes stee-GHmes","pronFormal":"stees O-mor-fes stee-GHmes","note":"Short poetic toast."},{"type":"phrase","category":"Social Warmth","english":"May we always be well.","casual":"Να είμαστε πάντα καλά.","formal":"Να είμαστε πάντα καλά.","pronCasual":"na EE-ma-ste PAN-da ka-LA","pronFormal":"na EE-ma-ste PAN-da ka-LA","note":"Very Greek-feeling warm wish."},{"type":"phrase","category":"Social Warmth","english":"I am full, thank you.","casual":"Έχω χορτάσει, ευχαριστώ.","formal":"Έχω χορτάσει, σας ευχαριστώ.","pronCasual":"EH-ho hor-TA-see ef-ha-ree-STO","pronFormal":"EH-ho hor-TA-see sas ef-ha-ree-STO","note":"Warm way to decline more food."},{"type":"phrase","category":"Social Warmth","english":"It was delicious, but I cannot eat more.","casual":"Ήταν νόστιμο, αλλά δεν μπορώ άλλο.","formal":"Ήταν νόστιμο, αλλά δεν μπορώ άλλο.","pronCasual":"EE-tan NO-stee-mo a-LA then bo-RO A-lo","pronFormal":"EE-tan NO-stee-mo a-LA then bo-RO A-lo","note":"Declines food while complimenting it."},{"type":"phrase","category":"Social Warmth","english":"Maybe a little later.","casual":"Ίσως λίγο αργότερα.","formal":"Ίσως λίγο αργότερα.","pronCasual":"EE-sos LEE-gho ar-GHO-te-ra","pronFormal":"EE-sos LEE-gho ar-GHO-te-ra","note":"Soft decline."},{"type":"phrase","category":"Social Warmth","english":"Thank you, but I am really full.","casual":"Ευχαριστώ, αλλά είμαι πραγματικά χορτάτη.","formal":"Σας ευχαριστώ, αλλά είμαι πραγματικά χορτάτη.","pronCasual":"ef-ha-ree-STO a-LA EE-me prag-ma-tee-KA hor-TA-tee","pronFormal":"sas ef-ha-ree-STO a-LA EE-me prag-ma-tee-KA hor-TA-tee","note":"Female form: χορτάτη."},{"type":"phrase","category":"Social Warmth","english":"I loved this dish.","casual":"Μου άρεσε πολύ αυτό το φαγητό.","formal":"Μου άρεσε πολύ αυτό το φαγητό.","pronCasual":"moo A-re-se po-LEE af-TO to fa-yee-TO","pronFormal":"moo A-re-se po-LEE af-TO to fa-yee-TO","note":"Useful after a meal."},{"type":"phrase","category":"Social Warmth","english":"You made this day special.","casual":"Έκανες αυτή τη μέρα ξεχωριστή.","formal":"Κάνατε αυτή τη μέρα ξεχωριστή.","pronCasual":"EH-ka-nes af-TEE tee MEH-ra kse-ho-ree-STEE","pronFormal":"KA-na-te af-TEE tee MEH-ra kse-ho-ree-STEE","note":"Heartfelt gratitude."},{"type":"phrase","category":"Family & Belonging","english":"I am very happy to meet you.","casual":"Χαίρομαι πολύ που σε γνωρίζω.","formal":"Χαίρομαι πολύ που σας γνωρίζω.","pronCasual":"HEH-ro-me po-LEE poo se ghno-REE-zo","pronFormal":"HEH-ro-me po-LEE poo sas ghno-REE-zo","note":"Use formal for parents/older relatives."},{"type":"phrase","category":"Family & Belonging","english":"Thank you for having me here.","casual":"Ευχαριστώ που με έχετε εδώ.","formal":"Σας ευχαριστώ που με έχετε εδώ.","pronCasual":"ef-ha-ree-STO poo me EH-he-te e-THO","pronFormal":"sas ef-ha-ree-STO poo me EH-he-te e-THO","note":"Warm guest phrase."},{"type":"phrase","category":"Family & Belonging","english":"I am still learning Greek.","casual":"Ακόμα μαθαίνω ελληνικά.","formal":"Ακόμα μαθαίνω ελληνικά.","pronCasual":"a-KO-ma ma-THEH-no e-lee-nee-KA","pronFormal":"a-KO-ma ma-THEH-no e-lee-nee-KA","note":"Honest and simple."},{"type":"phrase","category":"Family & Belonging","english":"Please be patient with my Greek.","casual":"Κάνε υπομονή με τα ελληνικά μου, παρακαλώ.","formal":"Κάντε υπομονή με τα ελληνικά μου, παρακαλώ.","pronCasual":"KA-ne ee-po-mo-NEE me ta e-lee-nee-KA moo pa-ra-ka-LO","pronFormal":"KAN-de ee-po-mo-NEE me ta e-lee-nee-KA moo pa-ra-ka-LO","note":"Useful with family."},{"type":"phrase","category":"Family & Belonging","english":"You speak too fast for me.","casual":"Μιλάς πολύ γρήγορα για μένα.","formal":"Μιλάτε πολύ γρήγορα για μένα.","pronCasual":"mee-LAS po-LEE GHREE-gho-ra ya MEH-na","pronFormal":"mee-LA-te po-LEE GHREE-gho-ra ya MEH-na","note":"Direct but okay if said warmly."},{"type":"phrase","category":"Family & Belonging","english":"Can you say it more slowly?","casual":"Μπορείς να το πεις πιο αργά;","formal":"Μπορείτε να το πείτε πιο αργά;","pronCasual":"bo-REES na to pees pyo ar-GHA","pronFormal":"bo-REE-te na to PEE-te pyo ar-GHA","note":"Better than only asking for repeat."},{"type":"phrase","category":"Family & Belonging","english":"Can you use simpler words?","casual":"Μπορείς να χρησιμοποιήσεις πιο απλές λέξεις;","formal":"Μπορείτε να χρησιμοποιήσετε πιο απλές λέξεις;","pronCasual":"bo-REES na hree-see-mo-pee-EE-sees pyo a-PLES LEK-sees","pronFormal":"bo-REE-te na hree-see-mo-pee-EE-se-te pyo a-PLES LEK-sees","note":"For real comprehension."},{"type":"phrase","category":"Family & Belonging","english":"Did I say that correctly?","casual":"Το είπα σωστά;","formal":"Το είπα σωστά;","pronCasual":"to EE-pa so-STA","pronFormal":"to EE-pa so-STA","note":"Female/male same."},{"type":"phrase","category":"Family & Belonging","english":"Am I doing this correctly?","casual":"Το κάνω σωστά;","formal":"Το κάνω σωστά;","pronCasual":"to KA-no so-STA","pronFormal":"to KA-no so-STA","note":"Useful at the table or in the home."},{"type":"phrase","category":"Family & Belonging","english":"Should I put this here?","casual":"Να το βάλω εδώ;","formal":"Να το βάλω εδώ;","pronCasual":"na to VA-lo e-THO","pronFormal":"na to VA-lo e-THO","note":"Natural household help phrase."},{"type":"phrase","category":"Family & Belonging","english":"Should I take my shoes off?","casual":"Να βγάλω τα παπούτσια μου;","formal":"Να βγάλω τα παπούτσια μου;","pronCasual":"na VGHA-lo ta pa-POO-tsya moo","pronFormal":"na VGHA-lo ta pa-POO-tsya moo","note":"Useful when entering a home."},{"type":"phrase","category":"Family & Belonging","english":"Where should I sit?","casual":"Πού να καθίσω;","formal":"Πού να καθίσω;","pronCasual":"poo na ka-THEE-so","pronFormal":"poo na ka-THEE-so","note":"At table or gathering."},{"type":"phrase","category":"Family & Belonging","english":"I love your family traditions.","casual":"Αγαπώ τις παραδόσεις της οικογένειάς σας.","formal":"Αγαπώ τις παραδόσεις της οικογένειάς σας.","pronCasual":"a-gha-PO tees pa-ra-THO-sees tees ee-ko-yeh-NEE-as sas","pronFormal":"a-gha-PO tees pa-ra-THO-sees tees ee-ko-yeh-NEE-as sas","note":"Formal plural fits family context."},{"type":"phrase","category":"Family & Belonging","english":"This custom is beautiful.","casual":"Αυτό το έθιμο είναι όμορφο.","formal":"Αυτό το έθιμο είναι όμορφο.","pronCasual":"af-TO to EH-thee-mo EE-ne O-mor-fo","pronFormal":"af-TO to EH-thee-mo EE-ne O-mor-fo","note":"Custom = έθιμο."},{"type":"phrase","category":"Family & Belonging","english":"What does this custom mean?","casual":"Τι σημαίνει αυτό το έθιμο;","formal":"Τι σημαίνει αυτό το έθιμο;","pronCasual":"tee see-MEH-nee af-TO to EH-thee-mo","pronFormal":"tee see-MEH-nee af-TO to EH-thee-mo","note":"Respectful curiosity."},{"type":"phrase","category":"Family & Belonging","english":"Can you explain this tradition to me?","casual":"Μπορείς να μου εξηγήσεις αυτή την παράδοση;","formal":"Μπορείτε να μου εξηγήσετε αυτή την παράδοση;","pronCasual":"bo-REES na moo ek-see-GHEE-sees af-TEE teen pa-RA-tho-see","pronFormal":"bo-REE-te na moo ek-see-GHEE-se-te af-TEE teen pa-RA-tho-see","note":"Polite with relatives."},{"type":"phrase","category":"Family & Belonging","english":"I want to understand, not just translate.","casual":"Θέλω να καταλάβω, όχι μόνο να μεταφράσω.","formal":"Θέλω να καταλάβω, όχι μόνο να μεταφράσω.","pronCasual":"THEH-lo na ka-ta-LA-vo OH-hee MO-no na me-ta-FRA-so","pronFormal":"THEH-lo na ka-ta-LA-vo OH-hee MO-no na me-ta-FRA-so","note":"Good learner mindset phrase."},{"type":"phrase","category":"Family & Belonging","english":"It is important to me to respect your family.","casual":"Είναι σημαντικό για μένα να σέβομαι την οικογένειά σας.","formal":"Είναι σημαντικό για μένα να σέβομαι την οικογένειά σας.","pronCasual":"EE-ne see-man-dee-KO ya MEH-na na SEH-vo-me teen ee-ko-yeh-NEE-a sas","pronFormal":"EE-ne see-man-dee-KO ya MEH-na na SEH-vo-me teen ee-ko-yeh-NEE-a sas","note":"Formal plural is natural here."},{"type":"phrase","category":"Family & Belonging","english":"Thank you for making space for me.","casual":"Ευχαριστώ που μου κάνετε χώρο.","formal":"Σας ευχαριστώ που μου κάνετε χώρο.","pronCasual":"ef-ha-ree-STO poo moo KA-ne-te HO-ro","pronFormal":"sas ef-ha-ree-STO poo moo KA-ne-te HO-ro","note":"Means emotional/social space, not only physical room."},{"type":"phrase","category":"Family & Belonging","english":"I feel welcome here.","casual":"Νιώθω καλοδεχούμενη εδώ.","formal":"Νιώθω καλοδεχούμενη εδώ.","pronCasual":"NYO-tho ka-lo-the-HOO-me-nee e-THO","pronFormal":"NYO-tho ka-lo-the-HOO-me-nee e-THO","note":"Female form: καλοδεχούμενη."},{"type":"phrase","category":"Partner & Intimacy","english":"My love.","casual":"Αγάπη μου.","formal":"Αγάπη μου.","pronCasual":"a-GHA-pee moo","pronFormal":"a-GHA-pee moo","note":"Endearment; intimate, not for formal use."},{"type":"phrase","category":"Partner & Intimacy","english":"My sweet one.","casual":"Γλυκό μου.","formal":"Γλυκό μου.","pronCasual":"ghlee-KO moo","pronFormal":"ghlee-KO moo","note":"Tender, playful endearment."},{"type":"phrase","category":"Partner & Intimacy","english":"My soul.","casual":"Ψυχή μου.","formal":"Ψυχή μου.","pronCasual":"psee-HEE moo","pronFormal":"psee-HEE moo","note":"Very affectionate and poetic."},{"type":"phrase","category":"Partner & Intimacy","english":"I am proud of you.","casual":"Είμαι περήφανη για σένα.","formal":"Είμαι περήφανη για εσάς.","pronCasual":"EE-me pe-REE-fa-nee ya SEH-na","pronFormal":"EE-me pe-REE-fa-nee ya e-SAS","note":"Female form: περήφανη."},{"type":"phrase","category":"Partner & Intimacy","english":"I missed you.","casual":"Μου έλειψες.","formal":"Μου λείψατε.","pronCasual":"moo EH-leep-ses","pronFormal":"moo LEEP-sa-te","note":"Casual is for partner; formal is included for pattern consistency."},{"type":"phrase","category":"Partner & Intimacy","english":"You make me happy.","casual":"Με κάνεις χαρούμενη.","formal":"Με κάνετε χαρούμενη.","pronCasual":"me KA-nees ha-ROO-me-nee","pronFormal":"me KA-ne-te ha-ROO-me-nee","note":"Female form: χαρούμενη."},{"type":"phrase","category":"Partner & Intimacy","english":"Good morning, my love.","casual":"Καλημέρα, αγάπη μου.","formal":"Καλημέρα σας.","pronCasual":"ka-lee-MEH-ra a-GHA-pee moo","pronFormal":"ka-lee-MEH-ra sas","note":"Formal is not intimate; use casual with partner."},{"type":"phrase","category":"Partner & Intimacy","english":"Good night, my sweet one.","casual":"Καληνύχτα, γλυκό μου.","formal":"Καληνύχτα σας.","pronCasual":"ka-lee-NEEH-ta ghlee-KO moo","pronFormal":"ka-lee-NEEH-ta sas","note":"Casual is the real partner phrase."},{"type":"phrase","category":"Partner & Intimacy","english":"I love you.","casual":"Σ’ αγαπώ.","formal":"Σας αγαπώ.","pronCasual":"sa-gha-PO","pronFormal":"sas a-gha-PO","note":"Casual for partner; formal only in special respectful contexts."},{"type":"phrase","category":"Partner & Intimacy","english":"I love you very much.","casual":"Σ’ αγαπώ πολύ.","formal":"Σας αγαπώ πολύ.","pronCasual":"sa-gha-PO po-LEE","pronFormal":"sas a-gha-PO po-LEE","note":"Warm everyday version."},{"type":"phrase","category":"Partner & Intimacy","english":"You are teasing me.","casual":"Με πειράζεις.","formal":"Με πειράζετε.","pronCasual":"me pee-RA-zees","pronFormal":"me pee-RA-ze-te","note":"Playful couple language."},{"type":"phrase","category":"Partner & Intimacy","english":"You are impossible, but I love you.","casual":"Είσαι αδύνατος, αλλά σ’ αγαπώ.","formal":"Είστε αδύνατος, αλλά σας αγαπώ.","pronCasual":"EE-se a-THEE-na-tos a-LA sa-gha-PO","pronFormal":"EE-ste a-THEE-na-tos a-LA sas a-gha-PO","note":"Playful to a man; use αδύνατη to a woman."}],"vocab":[{"type":"vocab","category":"Food Basics","english":"food","greek":"φαγητό","pron":"fa-yee-TO","clue":"Picture saying **fa-yee-TO** right before you eat. The ending **-TO** is your “food” trigger."},{"type":"vocab","category":"Food Basics","english":"breakfast","greek":"πρωινό","pron":"pro-ee-NO","clue":"**pro-ee-NO** starts the day. Think “pro morning” = breakfast."},{"type":"vocab","category":"Food Basics","english":"lunch","greek":"με     {speaker:'you',en:'Thank you. I am okay now.',gr:'Ευχαριστώ. Τώρα είμαι καλά.'}
  ]},
  {id:'dlg_w3_04',domain:'With my partner',title:'After his hard day',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'You look exhausted. Was it a hard day?',gr:'Φαίνεσαι εξαντλημένος. Ήταν δύσκολη μέρα;'},
    {speaker:'them',en:'Yes, everything felt heavy today.',gr:'Ναι, όλα μου φάνηκαν βαριά σήμερα.'},
    {speaker:'you',en:'Do you want to talk, or do you need quiet?',gr:'Θέλεις να μιλήσεις ή χρειάζεσαι ησυχία;'},
    {speaker:'them',en:'Maybe quiet for a little while.',gr:'Ίσως λίγη ησυχία για λίγο.'},
    {speaker:'you',en:'Of course. I am here beside you.',gr:'Φυσικά. Είμαι εδώ δίπλα σου.'}
  ]},
  {id:'dlg_w3_05',domain:'With my partner',title:'Being comforted',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Come, sit with me. You do not have to explain everything now.',gr:'Έλα, κάτσε μαζί μου. Δεν χρειάζεται να τα εξηγήσεις όλα τώρα.'},
    {speaker:'you',en:'I am just overwhelmed.',gr:'Απλώς νιώθω καταβεβλημένη.'},
    {speaker:'them',en:'I understand. Breathe a little.',gr:'Καταλαβαίνω. Πάρε μια ανάσα.'},
    {speaker:'you',en:'Thank you for not pushing me.',gr:'Σε ευχαριστώ που δεν με πιέζεις.'},
    {speaker:'them',en:'We will take it slowly.',gr:'Θα το πάμε σιγά σιγά.'}
  ]},
  {id:'dlg_w3_06',domain:'With my partner',title:'Playful teasing',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'You made coffee exactly the way I like it.',gr:'Έκανες τον καφέ ακριβώς όπως μου αρέσει.'},
    {speaker:'you',en:'Of course. I know you better than you think.',gr:'Φυσικά. Σε ξέρω καλύτερα απ’ ό,τι νομίζεις.'},
    {speaker:'them',en:'Should I be worried?',gr:'Να ανησυχώ;'},
    {speaker:'you',en:'Only if you hide the good biscuits from me.',gr:'Μόνο αν μου κρύψεις τα καλά μπισκότα.'},
    {speaker:'them',en:'Never. That would be serious.',gr:'Ποτέ. Αυτό θα ήταν σοβαρό.'}
  ]},
  {id:'dlg_w3_07',domain:'With my partner',title:'Proud of you',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'I am proud of you, you know.',gr:'Είμαι περήφανη για σένα, το ξέρεις;'},
    {speaker:'them',en:'For what?',gr:'Για ποιο πράγμα;'},
    {speaker:'you',en:'For how you keep going, even when things are not easy.',gr:'Για το πώς συνεχίζεις, ακόμα κι όταν τα πράγματα δεν είναι εύκολα.'},
    {speaker:'them',en:'That means a lot coming from you.',gr:'Σημαίνει πολλά που το λες εσύ.'},
    {speaker:'you',en:'I mean it.',gr:'Το εννοώ.'}
  ]},
  {id:'dlg_w3_08',domain:'With my partner',title:'Talking about us',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Do you feel okay with us lately?',gr:'Νιώθεις καλά με εμάς τελευταία;'},
    {speaker:'you',en:'Yes, but I want us to talk more openly.',gr:'Ναι, αλλά θέλω να μιλάμε πιο ανοιχτά.'},
    {speaker:'them',en:'About what?',gr:'Για τι πράγμα;'},
    {speaker:'you',en:'About what we need, not only about what we have to do.',gr:'Για όσα χρειαζόμαστε, όχι μόνο για όσα πρέπει να κάνουμε.'},
    {speaker:'them',en:'That is fair. Let us make space for that.',gr:'Έχεις δίκιο. Ας βρούμε χώρο γι’ αυτό.'}
  ]},
  {id:'dlg_w3_09',domain:'At the family table',title:'A small misunderstanding',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Did you not like the food?',gr:'Δεν σου άρεσε το φαγητό;'},
    {speaker:'you',en:'No, no, I liked it very much. I am just full.',gr:'Όχι, όχι, μου άρεσε πάρα πολύ. Απλώς είμαι χορτάτη.'},
    {speaker:'them',en:'Ah, I thought something was wrong.',gr:'Α, νόμιζα ότι κάτι δεν πήγαινε καλά.'},
    {speaker:'you',en:'Everything is wonderful. I do not want you to misunderstand me.',gr:'Όλα είναι υπέροχα. Δεν θέλω να με παρεξηγήσετε.'},
    {speaker:'them',en:'Do not worry at all.',gr:'Μην ανησυχείς καθόλου.'}
  ]},
  {id:'dlg_w3_10',domain:'At the family table',title:'Genuine gratitude',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'Thank you for having me here again.',gr:'Σας ευχαριστώ που με έχετε πάλι εδώ.'},
    {speaker:'them',en:'You are always welcome.',gr:'Είσαι πάντα ευπρόσδεκτη.'},
    {speaker:'you',en:'It means a lot to me, especially being far from my own family.',gr:'Σημαίνει πολλά για μένα, ειδικά που είμαι μακριά από τη δική μου οικογένεια.'},
    {speaker:'them',en:'Then you have family here too.',gr:'Τότε έχεις οικογένεια κι εδώ.'},
    {speaker:'you',en:'That touches me very much.',gr:'Αυτό με συγκινεί πολύ.'}
  ]},
  {id:'dlg_w3_11',domain:'At the family table',title:'Feeling welcome',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Are you comfortable? Do you need anything?',gr:'Είσαι άνετα; Χρειάζεσαι κάτι;'},
    {speaker:'you',en:'I am very comfortable. You make me feel welcome.',gr:'Είμαι πολύ άνετα. Με κάνετε να νιώθω ευπρόσδεκτη.'},
    {speaker:'them',en:'We are happy you are here.',gr:'Χαιρόμαστε που είσαι εδώ.'},
    {speaker:'you',en:'I am happy too. I feel less like a guest now.',gr:'Κι εγώ χαίρομαι. Νιώθω λιγότερο σαν φιλοξενούμενη τώρα.'},
    {speaker:'them',en:'Good. That is how it should be.',gr:'Ωραία. Έτσι πρέπει.'}
  ]},
  {id:'dlg_w3_12',domain:'At the family table',title:'Family tradition',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'Is this a dish you make for special days?',gr:'Είναι αυτό φαγητό που φτιάχνετε σε ιδιαίτερες μέρες;'},
    {speaker:'them',en:'Yes, usually when the family gathers.',gr:'Ναι, συνήθως όταν μαζεύεται η οικογένεια.'},
    {speaker:'you',en:'I love that. In my family we also connect food with memories.',gr:'Μου αρέσει πολύ αυτό. Και στη δική μου οικογένεια συνδέουμε το φαγητό με αναμνήσεις.'},
    {speaker:'them',en:'Then you understand exactly.',gr:'Τότε καταλαβαίνεις ακριβώς.'},
    {speaker:'you',en:'Yes, I really do.',gr:'Ναι, πραγματικά το καταλαβαίνω.'}
  ]},
  {id:'dlg_w3_13',domain:'At the family table',title:'A moment of belonging',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'You are very quiet tonight.',gr:'Είσαι πολύ ήσυχη απόψε.'},
    {speaker:'you',en:'I am just listening. I like hearing everyone talk together.',gr:'Απλώς ακούω. Μου αρέσει να σας ακούω να μιλάτε όλοι μαζί.'},
    {speaker:'them',en:'Do you understand us when we speak fast?',gr:'Μας καταλαβαίνεις όταν μιλάμε γρήγορα;'},
    {speaker:'you',en:'Some things, not everything. But I feel part of it.',gr:'Κάποια πράγματα, όχι όλα. Αλλά νιώθω μέρος του.'},
    {speaker:'them',en:'That is what matters.',gr:'Αυτό έχει σημασία.'}
  ]},
  {id:'dlg_w3_14',domain:'Feelings and check-ins',title:'I am overwhelmed',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'What is happening inside you right now?',gr:'Τι γίνεται μέσα σου αυτή τη στιγμή;'},
    {speaker:'you',en:'I feel overwhelmed, but I do not want to disappear.',gr:'Νιώθω καταβεβλημένη, αλλά δεν θέλω να χαθώ.'},
    {speaker:'them',en:'What would help?',gr:'Τι θα σε βοηθούσε;'},
    {speaker:'you',en:'Maybe ten quiet minutes and then we can talk.',gr:'Ίσως δέκα ήσυχα λεπτά και μετά μπορούμε να μιλήσουμε.'},
    {speaker:'them',en:'Okay. I will wait.',gr:'Εντάξει. Θα περιμένω.'}
  ]},
  {id:'dlg_w3_15',domain:'Feelings and check-ins',title:'I am grateful',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'I feel grateful today.',gr:'Νιώθω ευγνώμων σήμερα.'},
    {speaker:'them',en:'For what?',gr:'Για τι;'},
    {speaker:'you',en:'For small things. Coffee, quiet, being together.',gr:'Για μικρά πράγματα. Καφέ, ησυχία, το ότι είμαστε μαζί.'},
    {speaker:'them',en:'Those are not small things.',gr:'Αυτά δεν είναι μικρά πράγματα.'},
    {speaker:'you',en:'You are right. Maybe they are the real things.',gr:'Έχεις δίκιο. Ίσως αυτά είναι τα αληθινά.'}
  ]},
  {id:'dlg_w3_16',domain:'Feelings and check-ins',title:'I needed that',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Was the walk good for you?',gr:'Σου έκανε καλό η βόλτα;'},
    {speaker:'you',en:'Yes, I needed that more than I realized.',gr:'Ναι, το χρειαζόμουν περισσότερο απ’ όσο κατάλαβα.'},
    {speaker:'them',en:'You seem lighter now.',gr:'Φαίνεσαι πιο ανάλαφρη τώρα.'},
    {speaker:'you',en:'I feel lighter. Thank you for coming with me.',gr:'Νιώθω πιο ανάλαφρη. Ευχαριστώ που ήρθες μαζί μου.'},
    {speaker:'them',en:'Always.',gr:'Πάντα.'}
  ]},
  {id:'dlg_w3_17',domain:'Feelings and check-ins',title:'What is wrong?',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'Something feels off. What is wrong?',gr:'Κάτι μου φαίνεται περίεργο. Τι συμβαίνει;'},
    {speaker:'them',en:'I am not angry. I am just thinking.',gr:'Δεν είμαι θυμωμένος. Απλώς σκέφτομαι.'},
    {speaker:'you',en:'Do you want to tell me, or should I give you space?',gr:'Θέλεις να μου πεις ή να σου δώσω χώρο;'},
    {speaker:'them',en:'Give me a little space, and then I will tell you.',gr:'Δώσε μου λίγο χώρο και μετά θα σου πω.'},
    {speaker:'you',en:'Okay. I am here.',gr:'Εντάξει. Είμαι εδώ.'}
  ]},
  {id:'dlg_w3_18',domain:'Feelings and check-ins',title:'Reassuring each other',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Are you worried about us?',gr:'Ανησυχείς για εμάς;'},
    {speaker:'you',en:'Sometimes, yes. But I also believe in us.',gr:'Μερικές φορές, ναι. Αλλά πιστεύω και σε εμάς.'},
    {speaker:'them',en:'I do too.',gr:'Κι εγώ.'},
    {speaker:'you',en:'Then let us not guess. Let us keep talking.',gr:'Τότε ας μη μαντεύουμε. Ας συνεχίσουμε να μιλάμε.'},
    {speaker:'them',en:'That sounds right.',gr:'Αυτό μου ακούγεται σωστό.'}
  ]},
  {id:'dlg_w3_19',domain:'Feelings and check-ins',title:'A hard honest moment',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'I need to say something honestly.',gr:'Χρειάζεται να πω κάτι ειλικρινά.'},
    {speaker:'them',en:'Tell me.',gr:'Πες μου.'},
    {speaker:'you',en:'Sometimes I feel alone even when we are in the same room.',gr:'Μερικές φορές νιώθω μόνη ακόμα κι όταν είμαστε στο ίδιο δωμάτιο.'},
    {speaker:'them',en:'I did not realize it felt like that.',gr:'Δεν είχα καταλάβει ότι το νιώθεις έτσι.'},
    {speaker:'you',en:'I know. I am telling you because I want us to come closer.',gr:'Το ξέρω. Σου το λέω γιατί θέλω να έρθουμε πιο κοντά.'},
    {speaker:'them',en:'Thank you for telling me.',gr:'Σε ευχαριστώ που μου το λες.'}
  ]},
  {id:'dlg_w3_20',domain:'Around the home',title:'A small frustration',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Why are you upset about the kitchen?',gr:'Γιατί έχεις στενοχωρηθεί με την κουζίνα;'},
    {speaker:'you',en:'Because I cleaned it earlier and now it is messy again.',gr:'Γιατί την καθάρισα πριν και τώρα είναι πάλι ακατάστατη.'},
    {speaker:'them',en:'You are right. I should have helped more.',gr:'Έχεις δίκιο. Έπρεπε να βοηθήσω περισσότερο.'},
    {speaker:'you',en:'I do not want to fight. I just want us to share it.',gr:'Δεν θέλω να μαλώσουμε. Απλώς θέλω να το μοιραζόμαστε.'},
    {speaker:'them',en:'Let us fix it together now.',gr:'Ας το φτιάξουμε μαζί τώρα.'}
  ]},
  {id:'dlg_w3_21',domain:'Around the home',title:'A tender ordinary moment',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Do you want the blanket?',gr:'Θέλεις την κουβέρτα;'},
    {speaker:'you',en:'Yes, please. I love when the house feels quiet like this.',gr:'Ναι, σε παρακαλώ. Μου αρέσει όταν το σπίτι είναι τόσο ήσυχο.'},
    {speaker:'them',en:'Me too.',gr:'Κι εμένα.'},
    {speaker:'you',en:'These ordinary evenings are becoming precious to me.',gr:'Αυτά τα απλά βράδια γίνονται πολύτιμα για μένα.'},
    {speaker:'them',en:'Then let us not rush them.',gr:'Τότε ας μην τα βιαζόμαστε.'}
  ]},
  {id:'dlg_w3_22',domain:'Around the home',title:'Planning something meaningful',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'Maybe this weekend we can do something that feels ours.',gr:'Ίσως αυτό το Σαββατοκύριακο μπορούμε να κάνουμε κάτι που να μοιάζει δικό μας.'},
    {speaker:'them',en:'What do you have in mind?',gr:'Τι έχεις στο μυαλό σου;'},
    {speaker:'you',en:'Nothing big. A walk, lunch, maybe no phones for a while.',gr:'Τίποτα μεγάλο. Μια βόλτα, φαγητό, ίσως χωρίς κινητά για λίγο.'},
    {speaker:'them',en:'I like that. We need it.',gr:'Μου αρέσει αυτό. Το χρειαζόμαστε.'},
    {speaker:'you',en:'I think so too.',gr:'Κι εγώ έτσι νομίζω.'}
  ]},
  {id:'dlg_w3_23',domain:'Around the home',title:'Winding down',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Do you want to watch something or just sit?',gr:'Θέλεις να δούμε κάτι ή απλώς να καθίσουμε;'},
    {speaker:'you',en:'Maybe just sit. My head is full.',gr:'Ίσως απλώς να καθίσουμε. Το κεφάλι μου είναι γεμάτο.'},
    {speaker:'them',en:'I understand. No need to fill the silence.',gr:'Καταλαβαίνω. Δεν χρειάζεται να γεμίσουμε τη σιωπή.'},
    {speaker:'you',en:'That is exactly what I needed to hear.',gr:'Αυτό ακριβώς χρειαζόμουν να ακούσω.'},
    {speaker:'them',en:'Then we will be quiet together.',gr:'Τότε θα μείνουμε ήσυχοι μαζί.'}
  ]},
  {id:'dlg_w3_24',domain:'Around the home',title:'Grateful for ordinary life',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'Sometimes I look at this ordinary life and feel lucky.',gr:'Μερικές φορές κοιτάζω αυτή την απλή ζωή και νιώθω τυχερή.'},
    {speaker:'them',en:'Even with the dishes and the laundry?',gr:'Ακόμα και με τα πιάτα και τα ρούχα;'},
    {speaker:'you',en:'Especially with those. It feels real.',gr:'Ειδικά με αυτά. Μου φαίνεται αληθινή.'},
    {speaker:'them',en:'I never thought of it that way.',gr:'Δεν το είχα σκεφτεί έτσι.'},
    {speaker:'you',en:'Maybe home is made from small things.',gr:'Ίσως το σπίτι φτιάχνεται από μικρά πράγματα.'}
  ]},
  {id:'dlg_w3_25',domain:'Around the home',title:'After a tense day',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Today felt tense between us.',gr:'Σήμερα υπήρχε ένταση μεταξύ μας.'},
    {speaker:'you',en:'Yes, but I do not want us to sleep with distance.',gr:'Ναι, αλλά δεν θέλω να κοιμηθούμε με απόσταση.'},
    {speaker:'them',en:'Neither do I.',gr:'Ούτε εγώ.'},
    {speaker:'you',en:'Can we start again, even if we are both tired?',gr:'Μπορούμε να ξαναρχίσουμε, ακόμα κι αν είμαστε και οι δύο κουρασμένοι;'},
    {speaker:'them',en:'Yes. Come here.',gr:'Ναι. Έλα εδώ.'}
  ]}

,
  {id:'dlg_w4_01',domain:'Neighbors',title:'Running into a neighbor',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Hello! I have not seen you for a while.',gr:'Γεια σου! Έχω καιρό να σε δω.'},
    {speaker:'you',en:'Yes, we were in the Philippines for a month.',gr:'Ναι, ήμασταν στις Φιλιππίνες έναν μήνα.'},
    {speaker:'them',en:'How nice. Welcome back.',gr:'Τι ωραία. Καλώς ήρθατε πίσω.'},
    {speaker:'you',en:'Thank you. I am happy to be back.',gr:'Ευχαριστώ. Χαίρομαι που γύρισα.'},
    {speaker:'them',en:'If you need anything, tell me.',gr:'Αν χρειαστείς κάτι, πες μου.'}
  ]},
  {id:'dlg_w4_02',domain:'Neighbors',title:'A longer chat',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Are you staying here for long this time?',gr:'Θα μείνετε εδώ για καιρό αυτή τη φορά;'},
    {speaker:'you',en:'I hope so. I want to feel more at home here.',gr:'Το ελπίζω. Θέλω να νιώθω πιο πολύ σαν στο σπίτι μου εδώ.'},
    {speaker:'them',en:'Your Greek is getting better.',gr:'Τα ελληνικά σου γίνονται καλύτερα.'},
    {speaker:'you',en:'Thank you, I try every day.',gr:'Ευχαριστώ, προσπαθώ κάθε μέρα.'},
    {speaker:'them',en:'That is the best way.',gr:'Αυτός είναι ο καλύτερος τρόπος.'}
  ]},
  {id:'dlg_w4_03',domain:'Neighbors',title:'Asked about the Philippines',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Is Manila very different from here?',gr:'Είναι η Μανίλα πολύ διαφορετική από εδώ;'},
    {speaker:'you',en:'Yes, it is much bigger and much busier.',gr:'Ναι, είναι πολύ μεγαλύτερη και πολύ πιο πολυσύχναστη.'},
    {speaker:'them',en:'Do you miss it?',gr:'Σου λείπει;'},
    {speaker:'you',en:'Sometimes, but I also love the quiet here.',gr:'Μερικές φορές, αλλά αγαπώ και την ησυχία εδώ.'},
    {speaker:'them',en:'I understand. Every place has its own heart.',gr:'Καταλαβαίνω. Κάθε μέρος έχει τη δική του καρδιά.'}
  ]},
  {id:'dlg_w4_04',domain:'Neighbors',title:'Offering help',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Do you need help carrying those bags?',gr:'Θέλεις βοήθεια να κουβαλήσεις αυτές τις σακούλες;'},
    {speaker:'you',en:'Thank you, that is very kind of you.',gr:'Ευχαριστώ, είναι πολύ ευγενικό εκ μέρους σου.'},
    {speaker:'them',en:'It is nothing. They look heavy.',gr:'Δεν είναι τίποτα. Φαίνονται βαριές.'},
    {speaker:'you',en:'They are a little heavy, yes.',gr:'Είναι λίγο βαριές, ναι.'},
    {speaker:'them',en:'Come on, I will take one.',gr:'Έλα, θα πάρω εγώ τη μία.'}
  ]},
  {id:'dlg_w4_05',domain:'Neighbors',title:'Introducing yourself',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'I do not think we have met properly.',gr:'Νομίζω ότι δεν έχουμε γνωριστεί κανονικά.'},
    {speaker:'you',en:'You are right. I am Aileen, I am with Achilles.',gr:'Έχεις δίκιο. Είμαι η Aileen, είμαι με τον Αχιλλέα.'},
    {speaker:'them',en:'Nice to meet you. I am Maria from next door.',gr:'Χαίρω πολύ. Είμαι η Μαρία από δίπλα.'},
    {speaker:'you',en:'Nice to meet you too. I have heard good things about you.',gr:'Χαίρομαι κι εγώ. Έχω ακούσει καλά λόγια για σένα.'},
    {speaker:'them',en:'Then we must have coffee one day.',gr:'Τότε πρέπει να πιούμε έναν καφέ μια μέρα.'}
  ]},
  {id:'dlg_w4_06',domain:'The regular shopkeeper',title:'Being recognized',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Good morning. The usual bread today?',gr:'Καλημέρα. Το συνηθισμένο ψωμί σήμερα;'},
    {speaker:'you',en:'Yes, please. I am happy you remember.',gr:'Ναι, παρακαλώ. Χαίρομαι που το θυμάστε.'},
    {speaker:'them',en:'Of course. You come often now.',gr:'Φυσικά. Έρχεστε συχνά τώρα.'},
    {speaker:'you',en:'Yes, little by little I learn the neighborhood.',gr:'Ναι, σιγά σιγά μαθαίνω τη γειτονιά.'},
    {speaker:'them',en:'That is how a place becomes familiar.',gr:'Έτσι γίνεται ένα μέρος οικείο.'}
  ]},
  {id:'dlg_w4_07',domain:'The regular shopkeeper',title:'Light banter',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Today you are early.',gr:'Σήμερα ήρθατε νωρίς.'},
    {speaker:'you',en:'Yes, before I change my mind and stay home.',gr:'Ναι, πριν αλλάξω γνώμη και μείνω σπίτι.'},
    {speaker:'them',en:'That happens to all of us.',gr:'Αυτό συμβαίνει σε όλους μας.'},
    {speaker:'you',en:'At least I came for good coffee.',gr:'Τουλάχιστον ήρθα για καλό καφέ.'},
    {speaker:'them',en:'Then you came to the right place.',gr:'Τότε ήρθατε στο σωστό μέρος.'}
  ]},
  {id:'dlg_w4_08',domain:'The regular shopkeeper',title:'Asking for something specific',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'Do you have the cheese we bought last week?',gr:'Έχετε το τυρί που αγοράσαμε την προηγούμενη εβδομάδα;'},
    {speaker:'them',en:'Yes, I kept some because people ask for it.',gr:'Ναι, κράτησα λίγο γιατί το ζητάνε.'},
    {speaker:'you',en:'Great. I would like a small piece, please.',gr:'Τέλεια. Θα ήθελα ένα μικρό κομμάτι, παρακαλώ.'},
    {speaker:'them',en:'Of course. Is this enough?',gr:'Βεβαίως. Είναι αρκετό αυτό;'},
    {speaker:'you',en:'Yes, that is perfect. Thank you.',gr:'Ναι, είναι τέλειο. Ευχαριστώ.'}
  ]},
  {id:'dlg_w4_09',domain:'The regular shopkeeper',title:'What is fresh today',level:'B1',nativeReview:false,turns:[
    {speaker:'you',en:'What is fresh today?',gr:'Τι είναι φρέσκο σήμερα;'},
    {speaker:'them',en:'The tomatoes are very good, and the peaches too.',gr:'Οι ντομάτες είναι πολύ καλές, και τα ροδάκινα επίσης.'},
    {speaker:'you',en:'Then I will take some tomatoes for dinner.',gr:'Τότε θα πάρω λίγες ντομάτες για το βραδινό.'},
    {speaker:'them',en:'Do you want them ripe or a little firmer?',gr:'Τις θέλετε ώριμες ή λίγο πιο σφιχτές;'},
    {speaker:'you',en:'Ripe, please. We will eat them tonight.',gr:'Ώριμες, παρακαλώ. Θα τις φάμε απόψε.'}
  ]},
  {id:'dlg_w4_10',domain:'Running into someone you know',title:'A quick warm exchange',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Aileen! What a nice surprise.',gr:'Aileen! Τι ωραία έκπληξη.'},
    {speaker:'you',en:'Hello! I was just going to the bakery.',gr:'Γεια σου! Πήγαινα μόλις στον φούρνο.'},
    {speaker:'them',en:'How are things at home?',gr:'Πώς είναι τα πράγματα στο σπίτι;'},
    {speaker:'you',en:'Good, thank you. We are finding our rhythm.',gr:'Καλά, ευχαριστώ. Βρίσκουμε τον ρυθμό μας.'},
    {speaker:'them',en:'That sounds good. Give my greetings to everyone.',gr:'Ακούγεται ωραίο. Δώσε χαιρετίσματα σε όλους.'}
  ]},
  {id:'dlg_w4_11',domain:'Running into someone you know',title:'Making a loose plan',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'We should have coffee one afternoon.',gr:'Πρέπει να πιούμε έναν καφέ ένα απόγευμα.'},
    {speaker:'you',en:'I would like that. Maybe next week?',gr:'Θα μου άρεσε. Ίσως την άλλη εβδομάδα;'},
    {speaker:'them',en:'Yes, send me a message when you are free.',gr:'Ναι, στείλε μου μήνυμα όταν είσαι ελεύθερη.'},
    {speaker:'you',en:'I will. My schedule is still a little messy.',gr:'Θα σου στείλω. Το πρόγραμμά μου είναι ακόμα λίγο μπερδεμένο.'},
    {speaker:'them',en:'No problem. We will find a day.',gr:'Κανένα πρόβλημα. Θα βρούμε μια μέρα.'}
  ]},
  {id:'dlg_w4_12',domain:'Running into someone you know',title:'Catching up briefly',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'How is your Greek going?',gr:'Πώς πάνε τα ελληνικά σου;'},
    {speaker:'you',en:'Better, but I still need more speaking practice.',gr:'Καλύτερα, αλλά χρειάζομαι ακόμα περισσότερη εξάσκηση στην ομιλία.'},
    {speaker:'them',en:'You speak more naturally now.',gr:'Μιλάς πιο φυσικά τώρα.'},
    {speaker:'you',en:'That makes me happy to hear.',gr:'Χαίρομαι πολύ που το ακούω.'},
    {speaker:'them',en:'Keep going. It shows.',gr:'Συνέχισε. Φαίνεται.'}
  ]},
  {id:'dlg_w4_13',domain:'Being included in a group',title:'Joining a conversation',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Come sit with us. We are talking about food.',gr:'Έλα κάτσε μαζί μας. Μιλάμε για φαγητό.'},
    {speaker:'you',en:'Then I came at the right time.',gr:'Τότε ήρθα την κατάλληλη στιγμή.'},
    {speaker:'them',en:'Do you prefer Greek or Filipino food?',gr:'Προτιμάς ελληνικό ή φιλιππινέζικο φαγητό;'},
    {speaker:'you',en:'I love both, but in different ways.',gr:'Αγαπώ και τα δύο, αλλά με διαφορετικό τρόπο.'},
    {speaker:'them',en:'That is a diplomatic answer.',gr:'Αυτή είναι διπλωματική απάντηση.'}
  ]},
  {id:'dlg_w4_14',domain:'Being included in a group',title:'Being asked your opinion',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'What do you think about this plan?',gr:'Τι γνώμη έχεις για αυτό το σχέδιο;'},
    {speaker:'you',en:'I think it is nice, but maybe it needs more time.',gr:'Νομίζω ότι είναι ωραίο, αλλά ίσως χρειάζεται περισσότερο χρόνο.'},
    {speaker:'them',en:'You mean we should not rush?',gr:'Εννοείς ότι δεν πρέπει να βιαστούμε;'},
    {speaker:'you',en:'Yes, exactly. It will be better if we prepare well.',gr:'Ναι, ακριβώς. Θα είναι καλύτερο αν προετοιμαστούμε καλά.'},
    {speaker:'them',en:'That is a fair point.',gr:'Είναι σωστό αυτό που λες.'}
  ]},
  {id:'dlg_w4_15',domain:'Being included in a group',title:'Where are you from',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Where are you from originally?',gr:'Από πού είσαι αρχικά;'},
    {speaker:'you',en:'I am from Manila, but now my life is between two countries.',gr:'Είμαι από τη Μανίλα, αλλά τώρα η ζωή μου είναι ανάμεσα σε δύο χώρες.'},
    {speaker:'them',en:'That must be interesting and difficult.',gr:'Αυτό πρέπει να είναι ενδιαφέρον και δύσκολο.'},
    {speaker:'you',en:'It is both. I learn a lot, but sometimes I miss home.',gr:'Είναι και τα δύο. Μαθαίνω πολλά, αλλά μερικές φορές μου λείπει το σπίτι.'},
    {speaker:'them',en:'That makes sense.',gr:'Λογικό είναι.'}
  ]},
  {id:'dlg_w4_16',domain:'Being included in a group',title:'The new person',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Do you feel comfortable with everyone?',gr:'Νιώθεις άνετα με όλους;'},
    {speaker:'you',en:'Yes, thank you. I am still a little shy in Greek.',gr:'Ναι, ευχαριστώ. Είμαι ακόμα λίγο ντροπαλή στα ελληνικά.'},
    {speaker:'them',en:'Do not worry. We understand you.',gr:'Μην ανησυχείς. Σε καταλαβαίνουμε.'},
    {speaker:'you',en:'That helps me relax.',gr:'Αυτό με βοηθάει να χαλαρώσω.'},
    {speaker:'them',en:'Good. You are part of the conversation.',gr:'Ωραία. Είσαι μέρος της συζήτησης.'}
  ]},
  {id:'dlg_w4_17',domain:'Talking about yourself',title:'My two countries',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Do you feel more Filipino or more Greek now?',gr:'Νιώθεις πιο πολύ Φιλιππινέζα ή πιο πολύ Ελληνίδα τώρα;'},
    {speaker:'you',en:'I feel Filipino, but Greece is becoming part of my life.',gr:'Νιώθω Φιλιππινέζα, αλλά η Ελλάδα γίνεται μέρος της ζωής μου.'},
    {speaker:'them',en:'That is a beautiful way to say it.',gr:'Είναι όμορφος τρόπος να το λες.'},
    {speaker:'you',en:'I do not want to choose one heart over the other.',gr:'Δεν θέλω να διαλέξω τη μία καρδιά αντί για την άλλη.'},
    {speaker:'them',en:'You can carry both.',gr:'Μπορείς να κουβαλάς και τις δύο.'}
  ]},
  {id:'dlg_w4_18',domain:'Talking about yourself',title:'What I do',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'What kind of work do you do?',gr:'Τι δουλειά κάνεις;'},
    {speaker:'you',en:'I work with events and business projects.',gr:'Δουλεύω με εκδηλώσεις και επιχειρηματικά πρότζεκτ.'},
    {speaker:'them',en:'That sounds demanding.',gr:'Ακούγεται απαιτητικό.'},
    {speaker:'you',en:'It is, but I like building something from the beginning.',gr:'Είναι, αλλά μου αρέσει να χτίζω κάτι από την αρχή.'},
    {speaker:'them',en:'Then Greece will give you many stories.',gr:'Τότε η Ελλάδα θα σου δώσει πολλές ιστορίες.'}
  ]},
  {id:'dlg_w4_19',domain:'Talking about yourself',title:'How we met',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'How did you and Achilles meet?',gr:'Πώς γνωριστήκατε εσύ και ο Αχιλλέας;'},
    {speaker:'you',en:'It is a long story, but a good one.',gr:'Είναι μεγάλη ιστορία, αλλά ωραία.'},
    {speaker:'them',en:'Now I want to hear it.',gr:'Τώρα θέλω να την ακούσω.'},
    {speaker:'you',en:'Another time, with coffee. It needs time.',gr:'Άλλη φορά, με καφέ. Θέλει χρόνο.'},
    {speaker:'them',en:'Deal. I will remember that.',gr:'Σύμφωνοι. Θα το θυμάμαι.'}
  ]},
  {id:'dlg_w4_20',domain:'Talking about yourself',title:'Between Manila and Greece',level:'B1',nativeReview:false,turns:[
    {speaker:'them',en:'Is it hard to live between two places?',gr:'Είναι δύσκολο να ζεις ανάμεσα σε δύο μέρη;'},
    {speaker:'you',en:'Sometimes, yes. My heart is often in two directions.',gr:'Μερικές φορές, ναι. Η καρδιά μου είναι συχνά σε δύο κατευθύνσεις.'},
    {speaker:'them',en:'But you seem strong.',gr:'Αλλά φαίνεσαι δυνατή.'},
    {speaker:'you',en:'I try to be. Some days are easier than others.',gr:'Προσπαθώ να είμαι. Κάποιες μέρες είναι πιο εύκολες από άλλες.'},
    {speaker:'them',en:'That is honest. And very human.',gr:'Αυτό είναι ειλικρινές. Και πολύ ανθρώπινο.'}
  ]}


,
  {id:'dlg_w5_01',domain:'Telling a story',title:'About my day',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Tell me about your day, properly.',gr:'Πες μου για τη μέρα σου, με την ησυχία σου.'},
    {speaker:'you',en:'Honestly, it started badly but it got better.',gr:'Για να είμαι ειλικρινής, ξεκίνησε άσχημα αλλά καλυτέρεψε.'},
    {speaker:'them',en:'What happened?',gr:'Τι έγινε;'},
    {speaker:'you',en:'I was running late, but in the end everything worked out.',gr:'Είχα αργήσει, αλλά τελικά όλα πήγαν καλά.'},
    {speaker:'them',en:'I am glad. You handle these things well.',gr:'Χαίρομαι. Τα διαχειρίζεσαι καλά αυτά.'},
    {speaker:'you',en:'I am learning to, little by little.',gr:'Μαθαίνω, σιγά σιγά.'}
  ]},
  {id:'dlg_w5_02',domain:'Telling a story',title:'Something funny happened',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Why are you laughing?',gr:'Γιατί γελάς;'},
    {speaker:'you',en:'Because something funny happened at the shop.',gr:'Γιατί έγινε κάτι αστείο στο μαγαζί.'},
    {speaker:'them',en:'Tell me.',gr:'Πες μου.'},
    {speaker:'you',en:'I asked for one thing and somehow left with three different things.',gr:'Ζήτησα ένα πράγμα και κάπως έφυγα με τρία διαφορετικά πράγματα.'},
    {speaker:'them',en:'That sounds exactly like you.',gr:'Αυτό ακούγεται πολύ δικό σου.'},
    {speaker:'you',en:'I know. At least I made the woman behind the counter laugh.',gr:'Το ξέρω. Τουλάχιστον έκανα τη γυναίκα πίσω από τον πάγκο να γελάσει.'}
  ]},
  {id:'dlg_w5_03',domain:'Telling a story',title:'A small mishap',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'You look like something happened.',gr:'Φαίνεσαι σαν να έγινε κάτι.'},
    {speaker:'you',en:'Nothing serious, but I took the wrong road again.',gr:'Τίποτα σοβαρό, αλλά πήρα πάλι λάθος δρόμο.'},
    {speaker:'them',en:'Again?',gr:'Πάλι;'},
    {speaker:'you',en:'Yes, although I was sure I knew where I was going.',gr:'Ναι, παρόλο που ήμουν σίγουρη ότι ήξερα πού πήγαινα.'},
    {speaker:'them',en:'And how did you find your way?',gr:'Και πώς βρήκες τον δρόμο σου;'},
    {speaker:'you',en:'I asked someone calmly, and in the end it was easier than I thought.',gr:'Ρώτησα κάποιον ήρεμα, και τελικά ήταν πιο εύκολο απ’ ό,τι νόμιζα.'}
  ]},
  {id:'dlg_w5_04',domain:'Telling a story',title:'News from back home',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Did you talk to Manila today?',gr:'Μίλησες σήμερα με τη Μανίλα;'},
    {speaker:'you',en:'Yes, and I got news that made me emotional.',gr:'Ναι, και έμαθα νέα που με συγκίνησαν.'},
    {speaker:'them',en:'Good news or difficult news?',gr:'Καλά νέα ή δύσκολα;'},
    {speaker:'you',en:'Good, mostly, although they made me miss home a little.',gr:'Καλά, κυρίως, αν και με έκαναν να μου λείψει λίγο το σπίτι.'},
    {speaker:'them',en:'That makes sense. Two homes is not simple.',gr:'Λογικό είναι. Τα δύο σπίτια δεν είναι απλό πράγμα.'},
    {speaker:'you',en:'No, but I am learning to hold both without feeling divided.',gr:'Όχι, αλλά μαθαίνω να κρατάω και τα δύο χωρίς να νιώθω μοιρασμένη.'}
  ]},
  {id:'dlg_w5_05',domain:'Giving an opinion',title:'About a film',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'So, what did you think of the film?',gr:'Λοιπόν, τι σου φάνηκε η ταινία;'},
    {speaker:'you',en:'I liked it, although the ending felt a bit rushed.',gr:'Μου άρεσε, αν και το τέλος μού φάνηκε λίγο βιαστικό.'},
    {speaker:'them',en:'Really? I thought it was strong.',gr:'Αλήθεια; Εμένα μου φάνηκε δυνατό.'},
    {speaker:'you',en:'It was strong emotionally, but the story needed a little more space.',gr:'Ήταν δυνατό συναισθηματικά, αλλά η ιστορία χρειαζόταν λίγο περισσότερο χώρο.'},
    {speaker:'them',en:'I see what you mean.',gr:'Καταλαβαίνω τι εννοείς.'},
    {speaker:'you',en:'Still, I would watch it again, especially for the acting.',gr:'Παρ’ όλα αυτά, θα την ξανάβλεπα, ειδικά για τις ερμηνείες.'}
  ]},
  {id:'dlg_w5_06',domain:'Giving an opinion',title:'About food',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Do you prefer this food here or the food back home?',gr:'Προτιμάς αυτό το φαγητό εδώ ή το φαγητό από την πατρίδα σου;'},
    {speaker:'you',en:'That is impossible to answer fairly.',gr:'Είναι αδύνατον να απαντήσω δίκαια.'},
    {speaker:'them',en:'Why?',gr:'Γιατί;'},
    {speaker:'you',en:'Because each one belongs to a different part of my life.',gr:'Επειδή το καθένα ανήκει σε διαφορετικό κομμάτι της ζωής μου.'},
    {speaker:'them',en:'That is a diplomatic answer.',gr:'Αυτή είναι διπλωματική απάντηση.'},
    {speaker:'you',en:'Maybe, but it is also true. I do not want to choose between them.',gr:'Ίσως, αλλά είναι και αλήθεια. Δεν θέλω να διαλέξω ανάμεσά τους.'}
  ]},
  {id:'dlg_w5_07',domain:'Giving an opinion',title:'About a plan',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Do you think this plan will work?',gr:'Πιστεύεις ότι θα πετύχει αυτό το σχέδιο;'},
    {speaker:'you',en:'It can work, as long as we keep it realistic.',gr:'Μπορεί να πετύχει, αρκεί να το κρατήσουμε ρεαλιστικό.'},
    {speaker:'them',en:'What worries you?',gr:'Τι σε ανησυχεί;'},
    {speaker:'you',en:'Mostly the timing. If we try to do everything at once, we will get tired.',gr:'Κυρίως ο χρόνος. Αν προσπαθήσουμε να τα κάνουμε όλα μαζί, θα κουραστούμε.'},
    {speaker:'them',en:'So you want to slow down?',gr:'Δηλαδή θέλεις να πάμε πιο αργά;'},
    {speaker:'you',en:'Not stop. Just move in a way we can actually sustain.',gr:'Όχι να σταματήσουμε. Απλώς να προχωρήσουμε με τρόπο που μπορούμε πραγματικά να αντέξουμε.'}
  ]},
  {id:'dlg_w5_08',domain:'Giving an opinion',title:'Gently disagreeing',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'I think we should decide tonight.',gr:'Νομίζω ότι πρέπει να αποφασίσουμε απόψε.'},
    {speaker:'you',en:'I understand why you say that, but I am not sure I agree.',gr:'Καταλαβαίνω γιατί το λες, αλλά δεν είμαι σίγουρη ότι συμφωνώ.'},
    {speaker:'them',en:'You want more time?',gr:'Θέλεις περισσότερο χρόνο;'},
    {speaker:'you',en:'Yes, because if I answer now, it will be from pressure, not clarity.',gr:'Ναι, γιατί αν απαντήσω τώρα, θα είναι από πίεση, όχι από καθαρότητα.'},
    {speaker:'them',en:'Fair enough. Tomorrow, then?',gr:'Δίκαιο. Αύριο λοιπόν;'},
    {speaker:'you',en:'Yes. Tomorrow I can speak more honestly and calmly.',gr:'Ναι. Αύριο μπορώ να μιλήσω πιο ειλικρινά και ήρεμα.'}
  ]},
  {id:'dlg_w5_09',domain:'The future together',title:'Plans for the year',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'How do you imagine this year?',gr:'Πώς φαντάζεσαι αυτή τη χρονιά;'},
    {speaker:'you',en:'I imagine it busy, but also important for us.',gr:'Τη φαντάζομαι γεμάτη, αλλά και σημαντική για εμάς.'},
    {speaker:'them',en:'Important in what way?',gr:'Σημαντική με ποιον τρόπο;'},
    {speaker:'you',en:'We are building things, even if some days it does not feel obvious.',gr:'Χτίζουμε πράγματα, ακόμα κι αν κάποιες μέρες δεν φαίνεται καθαρά.'},
    {speaker:'them',en:'That is true.',gr:'Αυτό είναι αλήθεια.'},
    {speaker:'you',en:'I just want us to remember why we started.',gr:'Απλώς θέλω να θυμόμαστε γιατί ξεκινήσαμε.'}
  ]},
  {id:'dlg_w5_10',domain:'The future together',title:'A decision together',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'We have to make a decision soon.',gr:'Πρέπει να πάρουμε μια απόφαση σύντομα.'},
    {speaker:'you',en:'I know, and I do not want us to avoid it.',gr:'Το ξέρω, και δεν θέλω να το αποφεύγουμε.'},
    {speaker:'them',en:'Do you already know what you want?',gr:'Ξέρεις ήδη τι θέλεις;'},
    {speaker:'you',en:'More or less, but I want to hear you fully before I decide.',gr:'Πάνω κάτω, αλλά θέλω να σε ακούσω πλήρως πριν αποφασίσω.'},
    {speaker:'them',en:'That means a lot.',gr:'Αυτό σημαίνει πολλά.'},
    {speaker:'you',en:'We are choosing together, so both voices matter.',gr:'Διαλέγουμε μαζί, οπότε μετράνε και οι δύο φωνές.'}
  ]},
  {id:'dlg_w5_11',domain:'The future together',title:'Hopes',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'What do you hope for most?',gr:'Τι ελπίζεις περισσότερο;'},
    {speaker:'you',en:'I hope we create a life that feels honest, not only impressive.',gr:'Ελπίζω να δημιουργήσουμε μια ζωή που να είναι αληθινή, όχι μόνο εντυπωσιακή.'},
    {speaker:'them',en:'What does honest mean to you?',gr:'Τι σημαίνει για σένα αληθινή;'},
    {speaker:'you',en:'That we can speak, rest, disagree, and still feel safe with each other.',gr:'Να μπορούμε να μιλάμε, να ξεκουραζόμαστε, να διαφωνούμε και παρ’ όλα αυτά να νιώθουμε ασφάλεια ο ένας με τον άλλον.'},
    {speaker:'them',en:'That sounds simple, but it is not small.',gr:'Ακούγεται απλό, αλλά δεν είναι μικρό.'},
    {speaker:'you',en:'Exactly. Maybe the simple things are the real work.',gr:'Ακριβώς. Ίσως τα απλά πράγματα να είναι η αληθινή δουλειά.'}
  ]},
  {id:'dlg_w5_12',domain:'The future together',title:'A serious warm talk',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Can we talk seriously for a moment?',gr:'Μπορούμε να μιλήσουμε σοβαρά για μια στιγμή;'},
    {speaker:'you',en:'Of course. Tell me what is on your mind.',gr:'Φυσικά. Πες μου τι έχεις στο μυαλό σου.'},
    {speaker:'them',en:'I want us to be careful with how much we carry.',gr:'Θέλω να προσέχουμε πόσα κουβαλάμε.'},
    {speaker:'you',en:'I agree. Even good things become heavy when there are too many at once.',gr:'Συμφωνώ. Ακόμα και τα καλά πράγματα βαραίνουν όταν είναι πάρα πολλά μαζί.'},
    {speaker:'them',en:'So we choose more slowly?',gr:'Άρα διαλέγουμε πιο αργά;'},
    {speaker:'you',en:'Yes. Slowly, but with intention.',gr:'Ναι. Αργά, αλλά με πρόθεση.'}
  ]},
  {id:'dlg_w5_13',domain:'A real conversation',title:'Deeper feelings',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'You have been quiet today.',gr:'Ήσουν ήσυχη σήμερα.'},
    {speaker:'you',en:'Yes. I was trying to understand what I actually feel.',gr:'Ναι. Προσπαθούσα να καταλάβω τι πραγματικά νιώθω.'},
    {speaker:'them',en:'And did you?',gr:'Και το κατάλαβες;'},
    {speaker:'you',en:'Partly. I am not angry, but I felt unseen for a moment.',gr:'Εν μέρει. Δεν είμαι θυμωμένη, αλλά για μια στιγμή ένιωσα αόρατη.'},
    {speaker:'them',en:'I am sorry. I did not want that.',gr:'Λυπάμαι. Δεν το ήθελα αυτό.'},
    {speaker:'you',en:'I know. That is why I am telling you calmly.',gr:'Το ξέρω. Γι’ αυτό σου το λέω ήρεμα.'}
  ]},
  {id:'dlg_w5_14',domain:'A real conversation',title:'Working through something',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'I think we misunderstood each other.',gr:'Νομίζω ότι παρεξηγηθήκαμε.'},
    {speaker:'you',en:'Yes, and I would rather fix it now than let it grow.',gr:'Ναι, και προτιμώ να το λύσουμε τώρα παρά να το αφήσουμε να μεγαλώσει.'},
    {speaker:'them',en:'What did you hear me saying?',gr:'Τι άκουσες ότι έλεγα;'},
    {speaker:'you',en:'I heard that my effort did not count, even if that is not what you meant.',gr:'Άκουσα ότι η προσπάθειά μου δεν μετρούσε, ακόμα κι αν δεν εννοούσες αυτό.'},
    {speaker:'them',en:'No, that is not what I meant at all.',gr:'Όχι, δεν εννοούσα καθόλου αυτό.'},
    {speaker:'you',en:'Good. Then let us start again from there.',gr:'Ωραία. Τότε ας ξαναρχίσουμε από εκεί.'}
  ]},
  {id:'dlg_w5_15',domain:'A real conversation',title:'An honest reflective exchange',level:'B2',nativeReview:false,turns:[
    {speaker:'them',en:'Do you feel more at home here now?',gr:'Νιώθεις περισσότερο σαν στο σπίτι σου εδώ τώρα;'},
    {speaker:'you',en:'Yes, but not in a simple way.',gr:'Ναι, αλλά όχι με απλό τρόπο.'},
    {speaker:'them',en:'What do you mean?',gr:'Τι εννοείς;'},
    {speaker:'you',en:'I feel at home when I can be myself without explaining every part of me.',gr:'Νιώθω σαν στο σπίτι μου όταν μπορώ να είμαι ο εαυτός μου χωρίς να εξηγώ κάθε κομμάτι μου.'},
    {speaker:'them',en:'And do you feel that with me?',gr:'Και το νιώθεις αυτό μαζί μου;'},
    {speaker:'you',en:'More and more. That is why this place is becoming real for me.',gr:'Όλο και περισσότερο. Γι’ αυτό αυτό το μέρος γίνεται αληθινό για μένα.'}
  ]}
];
DATA.grammar=Array.isArray(DATA.grammar)?DATA.grammar:[{"id":"g-core-a1-001","level":"A1","title":"The three genders: ο, η, το","explanation":"Every Greek noun is masculine (ο), feminine (η), or neuter (το). Learn the article WITH the noun, always — never learn a noun alone. The article is your grammar anchor for everything else.","examples":[{"gr":"ο καφές","en":"the coffee","note":"masculine — most nouns ending in -ος, -ας, -ης, -ες"},{"gr":"η θάλασσα","en":"the sea","note":"feminine — most nouns ending in -α, -η"},{"gr":"το τραπέζι","en":"the table","note":"neuter — most nouns ending in -ο, -ι, -μα"},{"gr":"Ο καφές είναι ζεστός.","en":"The coffee is hot.","note":"adjectives match the gender: ζεστός/ζεστή/ζεστό"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference. Examples use standard Modern Greek — have a tutor or native speaker confirm before marking verified."},{"id":"g-core-a1-002","level":"A1","title":"Plurals: οι, οι, τα","explanation":"Plural articles: masculine ο → οι, feminine η → οι, neuter το → τα. Common noun endings change too: -ος → -οι, -α/-η → -ες, -ο → -α, -ι → -ια.","examples":[{"gr":"ο δρόμος → οι δρόμοι","en":"the road → the roads","note":"-ος → -οι"},{"gr":"η μέρα → οι μέρες","en":"the day → the days","note":"-α → -ες"},{"gr":"το βιβλίο → τα βιβλία","en":"the book → the books","note":"-ο → -α"},{"gr":"το παιδί → τα παιδιά","en":"the child → the children","note":"-ι → -ιά"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-003","level":"A1","title":"είμαι — to be (present)","explanation":"The most important verb. Memorize the full table until it is automatic: είμαι, είσαι, είναι, είμαστε, είστε, είναι. Note that he/she/it and they are the same form (είναι) — context tells you which.","examples":[{"gr":"Είμαι από τις Φιλιππίνες.","en":"I am from the Philippines.","note":"είμαι = I am"},{"gr":"Είσαι κουρασμένη;","en":"Are you tired? (to a woman)","note":"είσαι = you are (casual)"},{"gr":"Είμαστε στο σπίτι.","en":"We are at home.","note":"είμαστε = we are"},{"gr":"Είστε καλά;","en":"Are you well? (formal/plural)","note":"είστε = formal you / you all"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-004","level":"A1","title":"έχω — to have (present)","explanation":"Second essential verb: έχω, έχεις, έχει, έχουμε, έχετε, έχουν. Also used for weather and impersonal expressions (έχει ζέστη = it is hot).","examples":[{"gr":"Έχω μια ερώτηση.","en":"I have a question.","note":""},{"gr":"Έχεις νερό;","en":"Do you have water? (casual)","note":"questions = same word order, rising intonation"},{"gr":"Έχετε τραπέζι για δύο;","en":"Do you have a table for two? (formal)","note":"έχετε = formal — use with staff"},{"gr":"Έχει πολύ ήλιο σήμερα.","en":"It is very sunny today.","note":"impersonal use"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-005","level":"A1","title":"Present tense: -ω verbs","explanation":"Most verbs follow this pattern. Take θέλω (I want): θέλω, θέλεις, θέλει, θέλουμε, θέλετε, θέλουν. The endings -ω, -εις, -ει, -ουμε, -ετε, -ουν work for μένω (live), ξέρω (know), πίνω (drink), and hundreds more.","examples":[{"gr":"Θέλω έναν καφέ.","en":"I want a coffee.","note":"θέλω = I want"},{"gr":"Μένω στη Μανίλα.","en":"I live in Manila.","note":"same endings as θέλω"},{"gr":"Δεν ξέρουμε.","en":"We don't know.","note":"-ουμε = we"},{"gr":"Τι πίνετε;","en":"What are you drinking? (formal)","note":"-ετε = formal you"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-006","level":"A1","title":"Present tense: -άω verbs","explanation":"A second family of verbs stressed on the ending: μιλάω (speak): μιλάω, μιλάς, μιλάει, μιλάμε, μιλάτε, μιλάνε. Same pattern for αγαπάω (love), πεινάω (be hungry), ρωτάω (ask).","examples":[{"gr":"Μιλάω λίγο ελληνικά.","en":"I speak a little Greek.","note":""},{"gr":"Μιλάς πολύ γρήγορα.","en":"You speak very fast. (casual)","note":"μιλάς = casual you"},{"gr":"Πεινάω πολύ.","en":"I am very hungry.","note":"hunger is a verb in Greek"},{"gr":"Αγαπάμε την Ελλάδα.","en":"We love Greece.","note":"-άμε = we"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-007","level":"A1","title":"Negation: δεν before the verb","explanation":"To make any statement negative, put δεν directly before the verb. Nothing else changes.","examples":[{"gr":"Δεν καταλαβαίνω.","en":"I don't understand.","note":"your most useful exam-day sentence"},{"gr":"Δεν έχω χρόνο.","en":"I don't have time.","note":""},{"gr":"Δεν είμαι έτοιμη ακόμα.","en":"I am not ready yet. (female speaker)","note":""},{"gr":"Δεν θέλω ζάχαρη, ευχαριστώ.","en":"I don't want sugar, thank you.","note":""}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-008","level":"A1","title":"Question words","explanation":"Yes/no questions use the same word order as statements with rising intonation. Information questions start with: τι (what), πού (where), πότε (when), πώς (how), πόσο (how much), ποιος/ποια/ποιο (who/which), γιατί (why).","examples":[{"gr":"Πού είναι η τουαλέτα;","en":"Where is the bathroom?","note":"Greek question mark is ; (semicolon)"},{"gr":"Πόσο κάνει αυτό;","en":"How much is this?","note":""},{"gr":"Τι ώρα φεύγουμε;","en":"What time are we leaving?","note":""},{"gr":"Γιατί όχι;","en":"Why not?","note":""}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-009","level":"A1","title":"Possessives: μου, σου, του/της, μας, σας, τους","explanation":"Possessives come AFTER the noun, and the noun keeps its article: το σπίτι μου = my house (literally 'the house of-me'). μου (my), σου (your, casual), του (his), της (her), μας (our), σας (your, formal/plural), τους (their).","examples":[{"gr":"το σπίτι μου","en":"my house","note":"article + noun + possessive"},{"gr":"η οικογένειά σου","en":"your family (casual)","note":""},{"gr":"ο σύντροφός μου","en":"my partner","note":""},{"gr":"Το τηλέφωνό σας, παρακαλώ.","en":"Your phone number, please. (formal)","note":"σας = formal your"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a1-010","level":"A1","title":"The accusative: τον, την, το + σε contractions","explanation":"After most verbs and after prepositions (σε, από, με, για), the article changes: ο → τον, η → την, το → το. Also σε + το = στο, σε + την = στην, σε + τον = στον (at/in/to the).","examples":[{"gr":"Βλέπω τον Νίκο.","en":"I see Nikos.","note":"ο Νίκος → τον Νίκο after a verb"},{"gr":"Πάω στο σπίτι.","en":"I'm going home.","note":"σε + το = στο"},{"gr":"Μένουμε στην Αθήνα.","en":"We live in Athens.","note":"σε + την = στην"},{"gr":"Ένα δώρο για την γιαγιά.","en":"A gift for grandma.","note":"για + accusative"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-001","level":"A2","title":"Future with θα","explanation":"The simplest future: θα + verb. For repeated/ongoing future actions use θα + present form (θα μένω = I will be living). For one-time completed actions the verb often changes stem (θα πάω = I will go, θα φάω = I will eat) — learn these as fixed pairs.","examples":[{"gr":"Θα πάω αύριο.","en":"I will go tomorrow.","note":"πηγαίνω → θα πάω"},{"gr":"Θα φάμε έξω απόψε;","en":"Shall we eat out tonight?","note":"τρώω → θα φάω"},{"gr":"Θα είμαι εκεί στις οκτώ.","en":"I will be there at eight.","note":"είμαι stays the same"},{"gr":"Θα σε πάρω τηλέφωνο.","en":"I will call you.","note":""}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-002","level":"A2","title":"Past tense (aorist): -σα endings + key irregulars","explanation":"Regular past: stem + -σα, -σες, -σε, -σαμε, -σατε, -σαν, with stress moving back (μιλάω → μίλησα). The most common verbs are irregular and must be memorized: πηγαίνω → πήγα, τρώω → έφαγα, βλέπω → είδα, πίνω → ήπια, είμαι → ήμουν, έχω → είχα, λέω → είπα.","examples":[{"gr":"Μίλησα με τη μητέρα μου.","en":"I spoke with my mother.","note":"regular -σα"},{"gr":"Πήγα στην αγορά το πρωί.","en":"I went to the market in the morning.","note":"irregular: πηγαίνω → πήγα"},{"gr":"Φάγαμε πολύ καλά χθες.","en":"We ate very well yesterday.","note":"τρώω → έφαγα/φάγαμε"},{"gr":"Ήμουν κουρασμένη.","en":"I was tired. (female)","note":"είμαι → ήμουν"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-003","level":"A2","title":"Object pronouns before the verb","explanation":"Short object pronouns (με, σε, τον, την, το, μας, σας, τους/τις/τα) go BEFORE the verb: Το ξέρω = I know it. Σε ακούω = I hear you. This is one of the biggest word-order differences from English.","examples":[{"gr":"Το θέλω.","en":"I want it.","note":"not 'θέλω το'"},{"gr":"Σε καταλαβαίνω.","en":"I understand you.","note":""},{"gr":"Δεν την ξέρω.","en":"I don't know her.","note":"δεν + pronoun + verb"},{"gr":"Θα σας βοηθήσω.","en":"I will help you. (formal)","note":"θα + pronoun + verb"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-004","level":"A2","title":"μου αρέσει / μου αρέσουν — liking things","explanation":"Greek says 'it pleases me' instead of 'I like'. Singular thing → μου αρέσει, plural things → μου αρέσουν. Change the pronoun for other people: σου αρέσει (you like), του/της αρέσει (he/she likes).","examples":[{"gr":"Μου αρέσει ο καφές.","en":"I like coffee.","note":"one thing → αρέσει"},{"gr":"Μου αρέσουν τα γλυκά.","en":"I like sweets.","note":"plural → αρέσουν"},{"gr":"Σου αρέσει η Ελλάδα;","en":"Do you like Greece?","note":""},{"gr":"Δεν μου αρέσει πολύ.","en":"I don't like it much.","note":""}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-005","level":"A2","title":"να + verb: wanting and being able to do things","explanation":"To link two verbs, Greek uses να (roughly 'to'): Θέλω να πάω = I want to go. Μπορώ να... = I can... Both verbs conjugate for the same person: Θέλουμε να φάμε = we want to eat.","examples":[{"gr":"Θέλω να πάω σπίτι.","en":"I want to go home.","note":""},{"gr":"Μπορώ να πληρώσω με κάρτα;","en":"Can I pay by card?","note":"your most useful shop question"},{"gr":"Πρέπει να φύγουμε τώρα.","en":"We have to leave now.","note":"πρέπει να = must"},{"gr":"Μπορείτε να μιλάτε πιο αργά;","en":"Can you speak more slowly? (formal)","note":""}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-006","level":"A2","title":"Imperatives: casual vs formal commands","explanation":"Commands have two forms. Casual (one close person): Περίμενε (wait), Έλα (come), Κάτσε (sit). Formal/plural adds -τε and often changes stem: Περιμένετε, Ελάτε, Καθίστε. Always use the formal with staff and elders.","examples":[{"gr":"Έλα εδώ.","en":"Come here. (casual)","note":"for partner/close family"},{"gr":"Περιμένετε, παρακαλώ.","en":"Please wait. (formal)","note":"for staff/strangers"},{"gr":"Καθίστε εδώ.","en":"Sit here. (formal)","note":""},{"gr":"Πες μου.","en":"Tell me. (casual)","note":"λέω → πες"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-007","level":"A2","title":"Comparatives: πιο + adjective + από","explanation":"The easy comparative: πιο (more) before the adjective, από (than) before the compared thing (in accusative). πιο καλός = better, πιο γρήγορα = faster.","examples":[{"gr":"Ο καφές είναι πιο ζεστός από το τσάι.","en":"The coffee is hotter than the tea.","note":""},{"gr":"Μιλάς πιο γρήγορα από μένα.","en":"You speak faster than me.","note":""},{"gr":"Το πρωί είναι καλύτερα για μένα.","en":"The morning is better for me.","note":"καλύτερα = irregular 'better'"},{"gr":"Θέλω κάτι πιο απλό.","en":"I want something simpler.","note":""}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."},{"id":"g-core-a2-008","level":"A2","title":"δεν vs μην","explanation":"Two negatives: δεν negates statements (δεν ξέρω = I don't know). μην negates commands and να-clauses (μην ανησυχείς = don't worry, προσπαθώ να μην αργήσω = I try not to be late).","examples":[{"gr":"Δεν μπορώ σήμερα.","en":"I can't today.","note":"statement → δεν"},{"gr":"Μην ανησυχείς.","en":"Don't worry. (casual)","note":"command → μην"},{"gr":"Μην με περιμένετε.","en":"Don't wait for me. (formal)","note":""},{"gr":"Θέλω να μην αργήσουμε.","en":"I want us not to be late.","note":"να-clause → μην"}],"verified":false,"source":"practice-only","sourceNote":"AI-drafted standard grammar reference — tutor/native confirmation needed before marking verified."}];

const A2_GRAMMAR_GAP_UNITS=[{"id": "g-gap-a2-001", "level": "A2", "title": "A2 gap: genitive for possession and relationship", "explanation": "The genitive often means 'of' or possession: το σπίτι της Μαρίας = Maria's house. At A2, learn fixed useful chunks first, not the entire case system at once.", "examples": [{"gr": "το σπίτι της Μαρίας", "en": "Maria's house / the house of Maria", "note": "της Μαρίας = of Maria"}, {"gr": "η κόρη του Νίκου", "en": "Nikos's daughter", "note": "του Νίκου = of Nikos"}, {"gr": "το όνομα του δρόμου", "en": "the name of the street", "note": "του δρόμου = of the street"}, {"gr": "η διεύθυνση του ξενοδοχείου", "en": "the address of the hotel", "note": "common travel phrase"}], "verified": false, "source": "practice-only", "sourceNote": "Generated A2 grammar-gap practice. Not official CGL content; review with tutor/native speaker before treating as verified."}, {"id": "g-gap-a2-002", "level": "A2", "title": "A2 gap: prepositions with σε / από / με / για", "explanation": "Greek prepositions usually need the accusative. The most useful are σε (to/in/at), από (from), με (with/by), για (for/about). Learn them as sentence patterns.", "examples": [{"gr": "Πάω στο φαρμακείο.", "en": "I am going to the pharmacy.", "note": "σε + το = στο"}, {"gr": "Είμαι από τις Φιλιππίνες.", "en": "I am from the Philippines.", "note": "από = from"}, {"gr": "Θέλω καφέ με γάλα.", "en": "I want coffee with milk.", "note": "με = with"}, {"gr": "Ένα τραπέζι για δύο, παρακαλώ.", "en": "A table for two, please.", "note": "για = for"}], "verified": false, "source": "practice-only", "sourceNote": "Generated A2 grammar-gap practice. Not official CGL content; review with tutor/native speaker before treating as verified."}, {"id": "g-gap-a2-003", "level": "A2", "title": "A2 gap: -μαι verbs you need every day", "explanation": "Many common verbs end in -μαι. You cannot always guess their forms from -ω verbs. Start with a small survival set: έρχομαι, θυμάμαι, κοιμάμαι, χρειάζ
